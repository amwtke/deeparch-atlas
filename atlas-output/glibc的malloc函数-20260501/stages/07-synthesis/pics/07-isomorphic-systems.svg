<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900"
     font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1600" height="900" fill="#0a0c10"/>

  <text x="800" y="32" fill="#e0e0e0" font-size="22" font-weight="bold" text-anchor="middle">5 个跨领域系统的同构骨架(ptmalloc 当方法论案例)</text>
  <text x="800" y="58" fill="#888" font-size="13" text-anchor="middle">同样的 5 维度问题(物理实体 · 索引 · 容器 · "不传完整信息怎么找" · 减锁),5 个系统给出 5 套同源解</text>

  <!-- 列头 -->
  <g font-size="14" font-weight="bold" text-anchor="middle">
    <rect x="20" y="80" width="180" height="50" fill="#1a1d24" stroke="#666" stroke-width="1.5"/>
    <text x="110" y="112" fill="#aaa">维度</text>

    <rect x="200" y="80" width="280" height="50" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
    <text x="340" y="105" fill="#88c0ff">ptmalloc(基线)</text>
    <text x="340" y="122" fill="#aaa" font-size="11" font-weight="normal">用户态 C 库</text>

    <rect x="480" y="80" width="280" height="50" fill="#3a1e5f" stroke="#8040c0" stroke-width="1.5"/>
    <text x="620" y="105" fill="#c088ff">JVM GC heap</text>
    <text x="620" y="122" fill="#aaa" font-size="11" font-weight="normal">语言运行时(GC 整合)</text>

    <rect x="760" y="80" width="280" height="50" fill="#1e5f3a" stroke="#40c060" stroke-width="1.5"/>
    <text x="900" y="105" fill="#88ff88">Linux SLUB</text>
    <text x="900" y="122" fill="#aaa" font-size="11" font-weight="normal">内核态 allocator</text>

    <rect x="1040" y="80" width="280" height="50" fill="#5f3a1e" stroke="#c08040" stroke-width="1.5"/>
    <text x="1180" y="105" fill="#ffaa55">DB buffer pool</text>
    <text x="1180" y="122" fill="#aaa" font-size="11" font-weight="normal">数据库 / 数据存储</text>

    <rect x="1320" y="80" width="260" height="50" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
    <text x="1450" y="105" fill="#ff8888">K8s scheduler</text>
    <text x="1450" y="122" fill="#aaa" font-size="11" font-weight="normal">分布式资源调度</text>
  </g>

  <!-- ============ Row 1: 物理实体 ============ -->
  <g font-size="13">
    <rect x="20" y="140" width="180" height="130" fill="#1a1d24" stroke="#666"/>
    <text x="110" y="180" fill="#e0e0e0" font-weight="bold" text-anchor="middle">① 物理实体</text>
    <text x="110" y="205" fill="#888" font-size="10" text-anchor="middle">(占资源的基本单位)</text>
    <text x="110" y="230" fill="#aaa" font-size="10" font-style="italic" text-anchor="middle">"chunk 是物理"</text>

    <rect x="200" y="140" width="280" height="130" fill="#0a1218" stroke="#4080c0"/>
    <text x="340" y="170" fill="#88c0ff" font-weight="bold" text-anchor="middle">chunk</text>
    <text x="340" y="194" fill="#aaa" font-size="11" text-anchor="middle">heap 上一块连续字节</text>
    <text x="340" y="212" fill="#aaa" font-size="11" text-anchor="middle">16B header + user data</text>
    <text x="340" y="232" fill="#888" font-size="10" font-style="italic" text-anchor="middle">大小可变(任意 size)</text>
    <text x="340" y="252" fill="#88c0ff" font-size="11" text-anchor="middle">malloc(24) → 32B chunk</text>

    <rect x="480" y="140" width="280" height="130" fill="#180a18" stroke="#8040c0"/>
    <text x="620" y="170" fill="#c088ff" font-weight="bold" text-anchor="middle">Object</text>
    <text x="620" y="194" fill="#aaa" font-size="11" text-anchor="middle">Java 对象实例</text>
    <text x="620" y="212" fill="#aaa" font-size="11" text-anchor="middle">header(class ptr)+ fields</text>
    <text x="620" y="232" fill="#888" font-size="10" font-style="italic" text-anchor="middle">大小由 type 决定</text>
    <text x="620" y="252" fill="#c088ff" font-size="11" text-anchor="middle">new Foo() → Object</text>

    <rect x="760" y="140" width="280" height="130" fill="#0a180a" stroke="#40c060"/>
    <text x="900" y="170" fill="#88ff88" font-weight="bold" text-anchor="middle">slab</text>
    <text x="900" y="194" fill="#aaa" font-size="11" text-anchor="middle">per kmem_cache 的 page</text>
    <text x="900" y="212" fill="#aaa" font-size="11" text-anchor="middle">4KB/8KB,内含同 type 对象</text>
    <text x="900" y="232" fill="#888" font-size="10" font-style="italic" text-anchor="middle">大小固定(per cache)</text>
    <text x="900" y="252" fill="#88ff88" font-size="11" text-anchor="middle">kmem_cache_alloc → slab obj</text>

    <rect x="1040" y="140" width="280" height="130" fill="#180e0a" stroke="#c08040"/>
    <text x="1180" y="170" fill="#ffaa55" font-weight="bold" text-anchor="middle">data page</text>
    <text x="1180" y="194" fill="#aaa" font-size="11" text-anchor="middle">磁盘 / 内存中的数据页</text>
    <text x="1180" y="212" fill="#aaa" font-size="11" text-anchor="middle">8KB(InnoDB)/ 16KB(PG)</text>
    <text x="1180" y="232" fill="#888" font-size="10" font-style="italic" text-anchor="middle">大小固定(系统级)</text>
    <text x="1180" y="252" fill="#ffaa55" font-size="11" text-anchor="middle">SELECT → 页加载 buffer pool</text>

    <rect x="1320" y="140" width="260" height="130" fill="#180a0a" stroke="#c04040"/>
    <text x="1450" y="170" fill="#ff8888" font-weight="bold" text-anchor="middle">Pod</text>
    <text x="1450" y="194" fill="#aaa" font-size="11" text-anchor="middle">运行的工作单元</text>
    <text x="1450" y="212" fill="#aaa" font-size="11" text-anchor="middle">CPU + memory 资源请求</text>
    <text x="1450" y="232" fill="#888" font-size="10" font-style="italic" text-anchor="middle">大小可变(spec 决定)</text>
    <text x="1450" y="252" fill="#ff8888" font-size="11" text-anchor="middle">kubectl apply → Pod</text>
  </g>

  <!-- ============ Row 2: 索引 ============ -->
  <g font-size="13">
    <rect x="20" y="270" width="180" height="120" fill="#1a1d24" stroke="#666"/>
    <text x="110" y="310" fill="#e0e0e0" font-weight="bold" text-anchor="middle">② 索引</text>
    <text x="110" y="335" fill="#888" font-size="10" text-anchor="middle">(快速找空闲单位)</text>
    <text x="110" y="360" fill="#aaa" font-size="10" font-style="italic" text-anchor="middle">"bin 是索引"</text>

    <rect x="200" y="270" width="280" height="120" fill="#0a1218" stroke="#4080c0"/>
    <text x="340" y="300" fill="#88c0ff" font-weight="bold" text-anchor="middle">bin</text>
    <text x="340" y="325" fill="#aaa" font-size="11" text-anchor="middle">fastbin(&lt; 64B)</text>
    <text x="340" y="345" fill="#aaa" font-size="11" text-anchor="middle">smallbin / largebin</text>
    <text x="340" y="365" fill="#aaa" font-size="11" text-anchor="middle">unsorted bin</text>

    <rect x="480" y="270" width="280" height="120" fill="#180a18" stroke="#8040c0"/>
    <text x="620" y="300" fill="#c088ff" font-weight="bold" text-anchor="middle">Generation</text>
    <text x="620" y="325" fill="#aaa" font-size="11" text-anchor="middle">Eden(新对象)</text>
    <text x="620" y="345" fill="#aaa" font-size="11" text-anchor="middle">Survivor S0 / S1</text>
    <text x="620" y="365" fill="#aaa" font-size="11" text-anchor="middle">Old(熬过 N 次 GC)</text>

    <rect x="760" y="270" width="280" height="120" fill="#0a180a" stroke="#40c060"/>
    <text x="900" y="300" fill="#88ff88" font-weight="bold" text-anchor="middle">free list</text>
    <text x="900" y="325" fill="#aaa" font-size="11" text-anchor="middle">per kmem_cache 内部</text>
    <text x="900" y="345" fill="#aaa" font-size="11" text-anchor="middle">cpu_slab(per-CPU 快路径)</text>
    <text x="900" y="365" fill="#aaa" font-size="11" text-anchor="middle">partial / full slab list</text>

    <rect x="1040" y="270" width="280" height="120" fill="#180e0a" stroke="#c08040"/>
    <text x="1180" y="300" fill="#ffaa55" font-weight="bold" text-anchor="middle">LRU + hash</text>
    <text x="1180" y="325" fill="#aaa" font-size="11" text-anchor="middle">LRU list(替换淘汰)</text>
    <text x="1180" y="345" fill="#aaa" font-size="11" text-anchor="middle">hash(page_id → frame)</text>
    <text x="1180" y="365" fill="#aaa" font-size="11" text-anchor="middle">free list(空闲 frame)</text>

    <rect x="1320" y="270" width="260" height="120" fill="#180a0a" stroke="#c04040"/>
    <text x="1450" y="300" fill="#ff8888" font-weight="bold" text-anchor="middle">scheduling queue</text>
    <text x="1450" y="325" fill="#aaa" font-size="11" text-anchor="middle">priority class 分桶</text>
    <text x="1450" y="345" fill="#aaa" font-size="11" text-anchor="middle">PreFilter / Filter plugins</text>
    <text x="1450" y="365" fill="#aaa" font-size="11" text-anchor="middle">scheduling framework</text>
  </g>

  <!-- ============ Row 3: 容器 ============ -->
  <g font-size="13">
    <rect x="20" y="390" width="180" height="120" fill="#1a1d24" stroke="#666"/>
    <text x="110" y="430" fill="#e0e0e0" font-weight="bold" text-anchor="middle">③ 容器</text>
    <text x="110" y="455" fill="#888" font-size="10" text-anchor="middle">(资源池 + 锁边界)</text>
    <text x="110" y="480" fill="#aaa" font-size="10" font-style="italic" text-anchor="middle">"arena 是容器"</text>

    <rect x="200" y="390" width="280" height="120" fill="#0a1218" stroke="#4080c0"/>
    <text x="340" y="420" fill="#88c0ff" font-weight="bold" text-anchor="middle">arena</text>
    <text x="340" y="445" fill="#aaa" font-size="11" text-anchor="middle">8 × cores 个池</text>
    <text x="340" y="465" fill="#aaa" font-size="11" text-anchor="middle">每池一把 mutex</text>
    <text x="340" y="485" fill="#aaa" font-size="11" text-anchor="middle">heap 段 + bins + tcache</text>

    <rect x="480" y="390" width="280" height="120" fill="#180a18" stroke="#8040c0"/>
    <text x="620" y="420" fill="#c088ff" font-weight="bold" text-anchor="middle">Heap</text>
    <text x="620" y="445" fill="#aaa" font-size="11" text-anchor="middle">单进程 1 个 heap</text>
    <text x="620" y="465" fill="#aaa" font-size="11" text-anchor="middle">young gen + old gen</text>
    <text x="620" y="485" fill="#aaa" font-size="11" text-anchor="middle">GC stop-the-world 锁</text>

    <rect x="760" y="390" width="280" height="120" fill="#0a180a" stroke="#40c060"/>
    <text x="900" y="420" fill="#88ff88" font-weight="bold" text-anchor="middle">kmem_cache</text>
    <text x="900" y="445" fill="#aaa" font-size="11" text-anchor="middle">per type 池</text>
    <text x="900" y="465" fill="#aaa" font-size="11" text-anchor="middle">(task_struct_cachep 等)</text>
    <text x="900" y="485" fill="#aaa" font-size="11" text-anchor="middle">per-CPU cpu_slab</text>

    <rect x="1040" y="390" width="280" height="120" fill="#180e0a" stroke="#c08040"/>
    <text x="1180" y="420" fill="#ffaa55" font-weight="bold" text-anchor="middle">buffer pool 实例</text>
    <text x="1180" y="445" fill="#aaa" font-size="11" text-anchor="middle">innodb_buffer_pool_instances</text>
    <text x="1180" y="465" fill="#aaa" font-size="11" text-anchor="middle">默认 8(类似 8×cores)</text>
    <text x="1180" y="485" fill="#aaa" font-size="11" text-anchor="middle">每实例 latches 锁</text>

    <rect x="1320" y="390" width="260" height="120" fill="#180a0a" stroke="#c04040"/>
    <text x="1450" y="420" fill="#ff8888" font-weight="bold" text-anchor="middle">Node</text>
    <text x="1450" y="445" fill="#aaa" font-size="11" text-anchor="middle">物理 / 虚拟机</text>
    <text x="1450" y="465" fill="#aaa" font-size="11" text-anchor="middle">CPU + memory 资源池</text>
    <text x="1450" y="485" fill="#aaa" font-size="11" text-anchor="middle">kubelet 管理本地 pod</text>
  </g>

  <!-- ============ Row 4: C5 处理 ============ -->
  <g font-size="13">
    <rect x="20" y="510" width="180" height="120" fill="#1a1d24" stroke="#666"/>
    <text x="110" y="550" fill="#e0e0e0" font-weight="bold" text-anchor="middle">④ C5 处理</text>
    <text x="110" y="572" fill="#888" font-size="10" text-anchor="middle">(不传完整信息</text>
    <text x="110" y="586" fill="#888" font-size="10" text-anchor="middle">怎么找)</text>
    <text x="110" y="608" fill="#aaa" font-size="10" font-style="italic" text-anchor="middle">"反查机制"</text>

    <rect x="200" y="510" width="280" height="120" fill="#0a1218" stroke="#4080c0"/>
    <text x="340" y="540" fill="#88c0ff" font-weight="bold" text-anchor="middle">chunk header 反向偏移</text>
    <text x="340" y="565" fill="#aaa" font-size="11" text-anchor="middle">free(p) 时 p - 16B</text>
    <text x="340" y="585" fill="#aaa" font-size="11" text-anchor="middle">读 size + 标志位</text>
    <text x="340" y="610" fill="#ff8888" font-size="11" text-anchor="middle">⚠️ 背 C5 债</text>

    <rect x="480" y="510" width="280" height="120" fill="#180a18" stroke="#8040c0"/>
    <text x="620" y="540" fill="#c088ff" font-weight="bold" text-anchor="middle">runtime 跟踪 type</text>
    <text x="620" y="565" fill="#aaa" font-size="11" text-anchor="middle">每对象有 class 引用</text>
    <text x="620" y="585" fill="#aaa" font-size="11" text-anchor="middle">GC 自动算 size</text>
    <text x="620" y="610" fill="#88ff88" font-size="11" text-anchor="middle">✓ 完全消解 C5</text>

    <rect x="760" y="510" width="280" height="120" fill="#0a180a" stroke="#40c060"/>
    <text x="900" y="540" fill="#88ff88" font-weight="bold" text-anchor="middle">type-aware</text>
    <text x="900" y="565" fill="#aaa" font-size="11" text-anchor="middle">kmem_cache_free 传 cache</text>
    <text x="900" y="585" fill="#aaa" font-size="11" text-anchor="middle">size 由 cache 决定</text>
    <text x="900" y="610" fill="#88ff88" font-size="11" text-anchor="middle">✓ 完全消解 C5</text>

    <rect x="1040" y="510" width="280" height="120" fill="#180e0a" stroke="#c08040"/>
    <text x="1180" y="540" fill="#ffaa55" font-weight="bold" text-anchor="middle">page id hash 反查</text>
    <text x="1180" y="565" fill="#aaa" font-size="11" text-anchor="middle">page 物理位置由 OS 决定</text>
    <text x="1180" y="585" fill="#aaa" font-size="11" text-anchor="middle">通过 hash 反查 frame</text>
    <text x="1180" y="610" fill="#aaa" font-size="11" text-anchor="middle">~外置元数据(类 jemalloc)</text>

    <rect x="1320" y="510" width="260" height="120" fill="#180a0a" stroke="#c04040"/>
    <text x="1450" y="540" fill="#ff8888" font-weight="bold" text-anchor="middle">API server 知道</text>
    <text x="1450" y="565" fill="#aaa" font-size="11" text-anchor="middle">pod spec 集中存储</text>
    <text x="1450" y="585" fill="#aaa" font-size="11" text-anchor="middle">scheduler 查 etcd</text>
    <text x="1450" y="610" fill="#88ff88" font-size="11" text-anchor="middle">✓ 完全消解 C5</text>
  </g>

  <!-- ============ Row 5: 减锁(C7) ============ -->
  <g font-size="13">
    <rect x="20" y="630" width="180" height="120" fill="#1a1d24" stroke="#666"/>
    <text x="110" y="670" fill="#e0e0e0" font-weight="bold" text-anchor="middle">⑤ 减锁(C7)</text>
    <text x="110" y="695" fill="#888" font-size="10" text-anchor="middle">(多线程并发减抢)</text>
    <text x="110" y="720" fill="#aaa" font-size="10" font-style="italic" text-anchor="middle">"per-X 快路径"</text>

    <rect x="200" y="630" width="280" height="120" fill="#0a1218" stroke="#4080c0"/>
    <text x="340" y="660" fill="#88c0ff" font-weight="bold" text-anchor="middle">tcache + arena</text>
    <text x="340" y="685" fill="#aaa" font-size="11" text-anchor="middle">per-thread tcache 无锁</text>
    <text x="340" y="705" fill="#aaa" font-size="11" text-anchor="middle">+ arena lock 兜底</text>
    <text x="340" y="725" fill="#88c0ff" font-size="11" text-anchor="middle">2 层(tcache 主)</text>

    <rect x="480" y="630" width="280" height="120" fill="#180a18" stroke="#8040c0"/>
    <text x="620" y="660" fill="#c088ff" font-weight="bold" text-anchor="middle">TLAB + safepoint</text>
    <text x="620" y="685" fill="#aaa" font-size="11" text-anchor="middle">Thread-Local Alloc Buffer</text>
    <text x="620" y="705" fill="#aaa" font-size="11" text-anchor="middle">GC stop-the-world 同步</text>
    <text x="620" y="725" fill="#c088ff" font-size="11" text-anchor="middle">早 ptmalloc 21 年(1996+)</text>

    <rect x="760" y="630" width="280" height="120" fill="#0a180a" stroke="#40c060"/>
    <text x="900" y="660" fill="#88ff88" font-weight="bold" text-anchor="middle">cpu_slab(per-CPU)</text>
    <text x="900" y="685" fill="#aaa" font-size="11" text-anchor="middle">每 CPU 一份独立缓存</text>
    <text x="900" y="705" fill="#aaa" font-size="11" text-anchor="middle">本核访问无锁</text>
    <text x="900" y="725" fill="#88ff88" font-size="11" text-anchor="middle">(类 jemalloc per-CPU)</text>

    <rect x="1040" y="630" width="280" height="120" fill="#180e0a" stroke="#c08040"/>
    <text x="1180" y="660" fill="#ffaa55" font-weight="bold" text-anchor="middle">multi buffer pool</text>
    <text x="1180" y="685" fill="#aaa" font-size="11" text-anchor="middle">8 个 buffer pool 实例</text>
    <text x="1180" y="705" fill="#aaa" font-size="11" text-anchor="middle">latches per pool</text>
    <text x="1180" y="725" fill="#ffaa55" font-size="11" text-anchor="middle">同 ptmalloc 多 arena 思路</text>

    <rect x="1320" y="630" width="260" height="120" fill="#180a0a" stroke="#c04040"/>
    <text x="1450" y="660" fill="#ff8888" font-weight="bold" text-anchor="middle">scheduler shards</text>
    <text x="1450" y="685" fill="#aaa" font-size="11" text-anchor="middle">K8s 1.31+ 多 scheduler</text>
    <text x="1450" y="705" fill="#aaa" font-size="11" text-anchor="middle">cache framework 减重复</text>
    <text x="1450" y="725" fill="#ff8888" font-size="11" text-anchor="middle">分布式版的"减锁"</text>
  </g>

  <!-- ============ 元洞察底部 ============ -->
  <rect x="20" y="775" width="1560" height="100" fill="#0d0e15" stroke="#666" stroke-width="1.5"/>
  <text x="800" y="805" fill="#e0e0e0" font-size="14" font-weight="bold" text-anchor="middle">元洞察:5 个领域,同一套设计哲学骨架</text>
  <text x="40" y="828" fill="#aaa" font-size="12">★ 任何"分配资源"的工程问题,都能被这 5 维度解构(物理实体 / 索引 / 容器 / 不传完整信息怎么找 / 减锁)。</text>
  <text x="40" y="848" fill="#aaa" font-size="12">★ "ptmalloc / JVM GC / SLUB / DB buffer pool / K8s scheduler" 不是"长得像" —— 它们解的就是同源工程问题。学会一个 = 学会五个。</text>
  <text x="40" y="868" fill="#88ff88" font-size="12" font-weight="bold">★ 这就是"用 ptmalloc 当方法论案例"的真正价值 —— 学会五维度解构,以后看任何系统都能问对的问题。</text>
</svg>
