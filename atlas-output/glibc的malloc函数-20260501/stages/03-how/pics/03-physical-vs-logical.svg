<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" width="1200" height="540" font-family="JetBrains Mono, Consolas, monospace">

  <!-- 暗色背景 -->
  <rect width="1200" height="540" fill="#0a0c10"/>

  <!-- 物理内存层标签 -->
  <text x="20" y="20" fill="#888" font-size="12">物理内存(heap 段连续字节流)·低地址 ──────→ 高地址</text>

  <!-- chunk A in-use 32B -->
  <rect x="20" y="30" width="100" height="100" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
  <text x="70" y="58" fill="#88c0ff" font-size="14" font-weight="bold" text-anchor="middle">chunk_A</text>
  <text x="70" y="82" fill="#88c0ff" font-size="13" text-anchor="middle">32 B</text>
  <text x="70" y="108" fill="#88c0ff" font-size="11" text-anchor="middle">IN-USE</text>

  <!-- chunk B free 24B -->
  <rect x="120" y="30" width="100" height="100" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
  <text x="170" y="58" fill="#ff8888" font-size="14" font-weight="bold" text-anchor="middle">chunk_B</text>
  <text x="170" y="82" fill="#ff8888" font-size="13" text-anchor="middle">24 B</text>
  <text x="170" y="108" fill="#ff8888" font-size="11" text-anchor="middle">FREE</text>

  <!-- chunk C in-use 48B -->
  <rect x="220" y="30" width="100" height="100" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
  <text x="270" y="58" fill="#88c0ff" font-size="14" font-weight="bold" text-anchor="middle">chunk_C</text>
  <text x="270" y="82" fill="#88c0ff" font-size="13" text-anchor="middle">48 B</text>
  <text x="270" y="108" fill="#88c0ff" font-size="11" text-anchor="middle">IN-USE</text>

  <!-- chunk D free 32B (刚 free) -->
  <rect x="320" y="30" width="100" height="100" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
  <text x="370" y="58" fill="#ff8888" font-size="14" font-weight="bold" text-anchor="middle">chunk_D</text>
  <text x="370" y="82" fill="#ff8888" font-size="13" text-anchor="middle">32 B</text>
  <text x="370" y="108" fill="#ff8888" font-size="10" text-anchor="middle">FREE(刚 free)</text>

  <!-- chunk E in-use 16B -->
  <rect x="420" y="30" width="100" height="100" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
  <text x="470" y="58" fill="#88c0ff" font-size="14" font-weight="bold" text-anchor="middle">chunk_E</text>
  <text x="470" y="82" fill="#88c0ff" font-size="13" text-anchor="middle">16 B</text>
  <text x="470" y="108" fill="#88c0ff" font-size="11" text-anchor="middle">IN-USE</text>

  <!-- chunk F free 80B -->
  <rect x="520" y="30" width="100" height="100" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
  <text x="570" y="58" fill="#ff8888" font-size="14" font-weight="bold" text-anchor="middle">chunk_F</text>
  <text x="570" y="82" fill="#ff8888" font-size="13" text-anchor="middle">80 B</text>
  <text x="570" y="108" fill="#ff8888" font-size="11" text-anchor="middle">FREE</text>

  <!-- chunk G in-use 200B -->
  <rect x="620" y="30" width="100" height="100" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
  <text x="670" y="58" fill="#88c0ff" font-size="14" font-weight="bold" text-anchor="middle">chunk_G</text>
  <text x="670" y="82" fill="#88c0ff" font-size="13" text-anchor="middle">200 B</text>
  <text x="670" y="108" fill="#88c0ff" font-size="11" text-anchor="middle">IN-USE</text>

  <!-- chunk H free 96B -->
  <rect x="720" y="30" width="100" height="100" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
  <text x="770" y="58" fill="#ff8888" font-size="14" font-weight="bold" text-anchor="middle">chunk_H</text>
  <text x="770" y="82" fill="#ff8888" font-size="13" text-anchor="middle">96 B</text>
  <text x="770" y="108" fill="#ff8888" font-size="11" text-anchor="middle">FREE</text>

  <!-- chunk I in-use 600B -->
  <rect x="820" y="30" width="100" height="100" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
  <text x="870" y="58" fill="#88c0ff" font-size="14" font-weight="bold" text-anchor="middle">chunk_I</text>
  <text x="870" y="82" fill="#88c0ff" font-size="13" text-anchor="middle">600 B</text>
  <text x="870" y="108" fill="#88c0ff" font-size="11" text-anchor="middle">IN-USE</text>

  <!-- top_chunk -->
  <rect x="920" y="30" width="260" height="100" fill="#1e5f3a" stroke="#40c060" stroke-width="1.5"/>
  <text x="1050" y="58" fill="#88ff88" font-size="14" font-weight="bold" text-anchor="middle">top_chunk</text>
  <text x="1050" y="82" fill="#88ff88" font-size="13" text-anchor="middle">~ 大段(剩饭)</text>
  <text x="1050" y="108" fill="#88ff88" font-size="11" text-anchor="middle">未切,新分配从这切</text>

  <!-- 物理标签 -->
  <text x="20" y="155" fill="#666" font-size="11" font-style="italic">↑ 物理上 in-use 和 free 交错(这就是"碎片"的原始形态)</text>

  <!-- 箭头从 free chunks 到 bin 槽 -->
  <!-- B → fastbinsY[1] (24B) -->
  <path d="M 170 130 Q 170 250 80 380" stroke="#ff8888" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.85"/>
  <polygon points="80,380 75,370 85,370" fill="#ff8888"/>

  <!-- D → unsorted -->
  <path d="M 370 130 Q 370 250 510 380" stroke="#ff8888" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.85"/>
  <polygon points="510,380 505,370 515,370" fill="#ff8888"/>

  <!-- F → smallbins[5] (80B) -->
  <path d="M 570 130 Q 570 250 910 380" stroke="#ff8888" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.85"/>
  <polygon points="910,380 905,370 915,370" fill="#ff8888"/>

  <!-- H → smallbins[6] (96B) -->
  <path d="M 770 130 Q 770 250 1010 380" stroke="#ff8888" stroke-width="1.5" fill="none" stroke-dasharray="6,4" opacity="0.85"/>
  <polygon points="1010,380 1005,370 1015,370" fill="#ff8888"/>

  <!-- bin 层标签 -->
  <text x="20" y="350" fill="#888" font-size="12">arena bin 元数据(同一组 free chunks 在 bin 链表上的归属)</text>
  <text x="20" y="372" fill="#bbb" font-size="11" font-weight="bold">fastbinsY[10]:</text>

  <!-- fastbinsY[0] 16B null -->
  <rect x="20" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="40" y="398" fill="#999" font-size="10" text-anchor="middle">[0]</text>
  <text x="40" y="413" fill="#999" font-size="10" text-anchor="middle">16B</text>
  <text x="40" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- fastbinsY[1] 24B → B -->
  <rect x="60" y="380" width="40" height="60" fill="#5f3a1e" stroke="#c08040" stroke-width="2"/>
  <text x="80" y="398" fill="#ffaa55" font-size="10" text-anchor="middle">[1]</text>
  <text x="80" y="413" fill="#ffaa55" font-size="10" text-anchor="middle">24B</text>
  <text x="80" y="433" fill="#ff8888" font-size="11" font-weight="bold" text-anchor="middle">→B</text>

  <!-- fastbinsY[2..9] all null -->
  <rect x="100" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="120" y="398" fill="#999" font-size="10" text-anchor="middle">[2]</text>
  <text x="120" y="413" fill="#999" font-size="10" text-anchor="middle">32B</text>
  <text x="120" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="140" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="160" y="398" fill="#999" font-size="10" text-anchor="middle">[3]</text>
  <text x="160" y="413" fill="#999" font-size="10" text-anchor="middle">40B</text>
  <text x="160" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="180" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="200" y="398" fill="#999" font-size="10" text-anchor="middle">[4]</text>
  <text x="200" y="413" fill="#999" font-size="10" text-anchor="middle">48B</text>
  <text x="200" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="220" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="240" y="398" fill="#999" font-size="10" text-anchor="middle">[5]</text>
  <text x="240" y="413" fill="#999" font-size="10" text-anchor="middle">56B</text>
  <text x="240" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="260" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="280" y="398" fill="#999" font-size="10" text-anchor="middle">[6]</text>
  <text x="280" y="413" fill="#999" font-size="10" text-anchor="middle">64B</text>
  <text x="280" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="300" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="320" y="398" fill="#999" font-size="10" text-anchor="middle">[7]</text>
  <text x="320" y="413" fill="#999" font-size="10" text-anchor="middle">72B</text>
  <text x="320" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="340" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="360" y="398" fill="#999" font-size="10" text-anchor="middle">[8]</text>
  <text x="360" y="413" fill="#999" font-size="10" text-anchor="middle">80B</text>
  <text x="360" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <rect x="380" y="380" width="40" height="60" fill="#2a1e0e" stroke="#664020" stroke-width="1"/>
  <text x="400" y="398" fill="#999" font-size="10" text-anchor="middle">[9]</text>
  <text x="400" y="413" fill="#999" font-size="10" text-anchor="middle">88B</text>
  <text x="400" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- bins[] -->
  <text x="460" y="372" fill="#bbb" font-size="11" font-weight="bold">bins[NBINS*2-2 ≈ 254]:</text>

  <!-- unsorted → D -->
  <rect x="460" y="380" width="100" height="60" fill="#3a1e5f" stroke="#8040c0" stroke-width="2"/>
  <text x="510" y="398" fill="#c088ff" font-size="11" text-anchor="middle">unsorted</text>
  <text x="510" y="413" fill="#c088ff" font-size="10" text-anchor="middle">(任意大小)</text>
  <text x="510" y="433" fill="#ff8888" font-size="11" font-weight="bold" text-anchor="middle">→ D (32B)</text>

  <!-- s[2] 32B null -->
  <rect x="560" y="380" width="100" height="60" fill="#1e1530" stroke="#402060" stroke-width="1"/>
  <text x="610" y="398" fill="#999" font-size="11" text-anchor="middle">s[2]</text>
  <text x="610" y="413" fill="#999" font-size="10" text-anchor="middle">32 B</text>
  <text x="610" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- s[3] 48B null -->
  <rect x="660" y="380" width="100" height="60" fill="#1e1530" stroke="#402060" stroke-width="1"/>
  <text x="710" y="398" fill="#999" font-size="11" text-anchor="middle">s[3]</text>
  <text x="710" y="413" fill="#999" font-size="10" text-anchor="middle">48 B</text>
  <text x="710" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- s[4] 64B null -->
  <rect x="760" y="380" width="100" height="60" fill="#1e1530" stroke="#402060" stroke-width="1"/>
  <text x="810" y="398" fill="#999" font-size="11" text-anchor="middle">s[4]</text>
  <text x="810" y="413" fill="#999" font-size="10" text-anchor="middle">64 B</text>
  <text x="810" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- s[5] 80B → F -->
  <rect x="860" y="380" width="100" height="60" fill="#3a1e5f" stroke="#8040c0" stroke-width="2"/>
  <text x="910" y="398" fill="#c088ff" font-size="11" text-anchor="middle">s[5]</text>
  <text x="910" y="413" fill="#c088ff" font-size="10" text-anchor="middle">80 B</text>
  <text x="910" y="433" fill="#ff8888" font-size="11" font-weight="bold" text-anchor="middle">→ F</text>

  <!-- s[6] 96B → H -->
  <rect x="960" y="380" width="100" height="60" fill="#3a1e5f" stroke="#8040c0" stroke-width="2"/>
  <text x="1010" y="398" fill="#c088ff" font-size="11" text-anchor="middle">s[6]</text>
  <text x="1010" y="413" fill="#c088ff" font-size="10" text-anchor="middle">96 B</text>
  <text x="1010" y="433" fill="#ff8888" font-size="11" font-weight="bold" text-anchor="middle">→ H</text>

  <!-- l[64] -->
  <rect x="1060" y="380" width="120" height="60" fill="#1e1530" stroke="#402060" stroke-width="1"/>
  <text x="1120" y="398" fill="#999" font-size="11" text-anchor="middle">l[64]</text>
  <text x="1120" y="413" fill="#999" font-size="10" text-anchor="middle">[512, 576)</text>
  <text x="1120" y="432" fill="#555" font-size="11" text-anchor="middle">∅</text>

  <!-- 逻辑层标签 -->
  <text x="20" y="475" fill="#666" font-size="11" font-style="italic">↑ 逻辑上 free chunk 按大小挂在不同桶(物理位置不变,bin 归属可变)</text>
  <text x="20" y="495" fill="#666" font-size="11" font-style="italic">虚线箭头 = 该 bin 槽指向的 chunk 在物理内存里的实际位置</text>

  <!-- 图例(右上角) -->
  <g transform="translate(900, 510)">
    <rect x="0" y="0" width="14" height="14" fill="#1e3a5f" stroke="#4080c0"/>
    <text x="20" y="11" fill="#88c0ff" font-size="11">IN-USE</text>
    <rect x="80" y="0" width="14" height="14" fill="#5f1e1e" stroke="#c04040"/>
    <text x="100" y="11" fill="#ff8888" font-size="11">FREE</text>
    <rect x="150" y="0" width="14" height="14" fill="#5f3a1e" stroke="#c08040"/>
    <text x="170" y="11" fill="#ffaa55" font-size="11">fastbin</text>
    <rect x="225" y="0" width="14" height="14" fill="#3a1e5f" stroke="#8040c0"/>
    <text x="245" y="11" fill="#c088ff" font-size="11">bins</text>
  </g>
</svg>
