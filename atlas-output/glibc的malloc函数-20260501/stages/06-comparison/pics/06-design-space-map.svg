<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750"
     font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1200" height="750" fill="#0a0c10"/>

  <text x="600" y="32" fill="#e0e0e0" font-size="20" font-weight="bold" text-anchor="middle">用户态 allocator 设计空间地图(2D 投影)</text>
  <text x="600" y="55" fill="#888" font-size="13" text-anchor="middle">横轴 = 对 C5 的处理方式 · 纵轴 = docker/k8s 容器友好性 · 6 个 allocator 占据 5 个不同区域</text>

  <!-- 绘图区边框 -->
  <rect x="120" y="80" width="960" height="540" fill="none" stroke="#666" stroke-width="1.5"/>

  <!-- 网格线(辅助识别区域) -->
  <line x1="600" y1="80" x2="600" y2="620" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="120" y1="350" x2="1080" y2="350" stroke="#333" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 横轴(x) 标签 -->
  <text x="600" y="660" fill="#aaa" font-size="13" font-weight="bold" text-anchor="middle">→ 对 C5 的处理方式 →</text>
  <text x="120" y="640" fill="#888" font-size="11">完全背 C5 债</text>
  <text x="120" y="654" fill="#888" font-size="10" font-style="italic">(chunk header 反向偏移)</text>
  <text x="1080" y="640" fill="#888" font-size="11" text-anchor="end">完全消解 C5</text>
  <text x="1080" y="654" fill="#888" font-size="10" font-style="italic" text-anchor="end">(sized dealloc / type tracking)</text>

  <!-- 纵轴(y) 标签 -->
  <text x="60" y="350" fill="#aaa" font-size="13" font-weight="bold" text-anchor="middle" transform="rotate(-90, 60, 350)">↑ 容器友好性 ↑</text>
  <text x="100" y="610" fill="#888" font-size="11" text-anchor="end">不友好</text>
  <text x="100" y="624" fill="#888" font-size="10" font-style="italic" text-anchor="end">(默认不还)</text>
  <text x="100" y="100" fill="#888" font-size="11" text-anchor="end">cgroup 全自动</text>
  <text x="100" y="114" fill="#888" font-size="10" font-style="italic" text-anchor="end">(GOMEMLIMIT)</text>

  <!-- 4 象限标签(右上 = 完美象限) -->
  <text x="850" y="105" fill="#88ff88" font-size="11" font-style="italic" opacity="0.7">右上"理想象限"</text>
  <text x="850" y="120" fill="#88ff88" font-size="10" font-style="italic" opacity="0.7">(消解 C5 + 容器友好)</text>

  <text x="200" y="600" fill="#ff8888" font-size="11" font-style="italic" opacity="0.7">左下"经典背债"</text>
  <text x="200" y="615" fill="#ff8888" font-size="10" font-style="italic" opacity="0.7">(背 C5 + 不友好)</text>

  <!-- ============ 6 个 allocator 点 ============ -->

  <!-- ptmalloc: x=168, y=566(左下,基线)-->
  <circle cx="168" cy="566" r="20" fill="#1e3a5f" stroke="#4080c0" stroke-width="2.5"/>
  <text x="168" y="572" fill="#88c0ff" font-size="11" font-weight="bold" text-anchor="middle">ptmalloc</text>
  <text x="168" y="600" fill="#88c0ff" font-size="10" text-anchor="middle">基线</text>
  <text x="168" y="612" fill="#888" font-size="9" text-anchor="middle">背 C5 债 + 不友好</text>

  <!-- tcmalloc: x=456, y=431(中)-->
  <circle cx="456" cy="431" r="18" fill="#5f3a1e" stroke="#c08040" stroke-width="2.5"/>
  <text x="456" y="437" fill="#ffaa55" font-size="11" font-weight="bold" text-anchor="middle">tcmalloc</text>
  <text x="456" y="465" fill="#ffaa55" font-size="10" text-anchor="middle">Google 2007</text>
  <text x="456" y="478" fill="#888" font-size="9" text-anchor="middle">radix tree 反查</text>
  <text x="456" y="490" fill="#888" font-size="9" text-anchor="middle">中等友好</text>

  <!-- jemalloc: x=408, y=269(中右上)-->
  <circle cx="408" cy="269" r="20" fill="#5f1e1e" stroke="#c04040" stroke-width="2.5"/>
  <text x="408" y="275" fill="#ff8888" font-size="11" font-weight="bold" text-anchor="middle">jemalloc</text>
  <text x="408" y="240" fill="#ff8888" font-size="10" text-anchor="middle">FreeBSD/FB 2008</text>
  <text x="408" y="227" fill="#888" font-size="9" text-anchor="middle">size class 反查</text>
  <text x="408" y="215" fill="#888" font-size="9" text-anchor="middle">dirty_decay_ms 积极</text>

  <!-- mimalloc: x=504, y=215(中右上,比 jemalloc 略上)-->
  <circle cx="504" cy="215" r="20" fill="#3a1e5f" stroke="#8040c0" stroke-width="2.5"/>
  <text x="504" y="221" fill="#c088ff" font-size="11" font-weight="bold" text-anchor="middle">mimalloc</text>
  <text x="504" y="186" fill="#c088ff" font-size="10" text-anchor="middle">MS 2019</text>
  <text x="504" y="173" fill="#888" font-size="9" text-anchor="middle">sharded free list</text>
  <text x="504" y="161" fill="#888" font-size="9" text-anchor="middle">purge_delay=100ms</text>

  <!-- Go runtime: x=936, y=107(右上)-->
  <circle cx="936" cy="107" r="22" fill="#1e5f3a" stroke="#40c060" stroke-width="3"/>
  <text x="936" y="113" fill="#88ff88" font-size="11" font-weight="bold" text-anchor="middle">Go runtime</text>
  <text x="936" y="148" fill="#88ff88" font-size="10" text-anchor="middle">2009~ · GOMEMLIMIT</text>
  <text x="936" y="161" fill="#888" font-size="9" text-anchor="middle">type tracking 消解 C5</text>
  <text x="936" y="173" fill="#888" font-size="9" text-anchor="middle">cgroup 全自动跟踪</text>

  <!-- Rust Layout: x=1032, y=350(右中,浮动)-->
  <circle cx="1032" cy="350" r="20" fill="#1e5f5f" stroke="#40c0c0" stroke-width="2.5"/>
  <text x="1032" y="356" fill="#88ffff" font-size="11" font-weight="bold" text-anchor="middle">Rust Layout</text>
  <text x="1032" y="320" fill="#88ffff" font-size="10" text-anchor="middle">Rust 2017+</text>
  <text x="1032" y="307" fill="#888" font-size="9" text-anchor="middle">sized dealloc 消解 C5</text>
  <text x="1032" y="382" fill="#888" font-size="9" text-anchor="middle">容器友好取决底层</text>

  <!-- Rust Layout 浮动范围(虚线竖条,y=215~485,展示底层不同时的位置)-->
  <line x1="1032" y1="215" x2="1032" y2="485" stroke="#40c0c0" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <text x="1058" y="218" fill="#40c0c0" font-size="9" font-style="italic" opacity="0.7">+mimalloc</text>
  <text x="1058" y="488" fill="#40c0c0" font-size="9" font-style="italic" opacity="0.7">默认 System</text>

  <!-- ============ 演化路径箭头 ============ -->
  <!-- ptmalloc → tcache 演化(2017 加 tcache) -->
  <path d="M 188 560 Q 250 450 350 350" fill="none" stroke="#666" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="490" fill="#666" font-size="9" font-style="italic">2017 ptmalloc 加 tcache</text>

  <!-- 概念:从经典 ptmalloc 到现代 mimalloc 的"演化方向" -->
  <path d="M 196 540 Q 350 350 480 215" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" marker-end="url(#arrow-evo)"/>

  <!-- 跨 ABI 边界(C 内 vs 新语言) -->
  <line x1="700" y1="80" x2="700" y2="620" stroke="#c04040" stroke-width="1" stroke-dasharray="8,5" opacity="0.5"/>
  <text x="710" y="92" fill="#c04040" font-size="11" font-weight="bold" opacity="0.8">— ABI 锁死边界 —</text>
  <text x="710" y="106" fill="#c04040" font-size="9" font-style="italic" opacity="0.7">左:C ABI 锁死 / 右:新语言改 ABI</text>

  <!-- ============ 图例 ============ -->
  <g transform="translate(120,680)">
    <text x="0" y="0" fill="#aaa" font-size="11" font-weight="bold">图例(每个 allocator 一种颜色)</text>
    <circle cx="7" cy="18" r="8" fill="#1e3a5f" stroke="#4080c0"/>
    <text x="22" y="22" fill="#88c0ff" font-size="10">ptmalloc(蓝,基线)</text>
    <circle cx="167" cy="18" r="8" fill="#5f1e1e" stroke="#c04040"/>
    <text x="182" y="22" fill="#ff8888" font-size="10">jemalloc(红)</text>
    <circle cx="305" cy="18" r="8" fill="#5f3a1e" stroke="#c08040"/>
    <text x="320" y="22" fill="#ffaa55" font-size="10">tcmalloc(橙)</text>
    <circle cx="445" cy="18" r="8" fill="#3a1e5f" stroke="#8040c0"/>
    <text x="460" y="22" fill="#c088ff" font-size="10">mimalloc(紫)</text>
    <circle cx="585" cy="18" r="8" fill="#1e5f3a" stroke="#40c060"/>
    <text x="600" y="22" fill="#88ff88" font-size="10">Go runtime(绿)</text>
    <circle cx="745" cy="18" r="8" fill="#1e5f5f" stroke="#40c0c0"/>
    <text x="760" y="22" fill="#88ffff" font-size="10">Rust Layout(青,浮动)</text>

    <text x="0" y="48" fill="#aaa" font-size="10" font-style="italic">虚线 = 演化路径 · 红虚线 = ABI 锁死边界(左 C ABI / 右 新语言)</text>
  </g>

  <!-- 演化箭头标记 -->
  <defs>
    <marker id="arrow-evo" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#888"/>
    </marker>
  </defs>
</svg>
