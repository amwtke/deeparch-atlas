<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 620"
     font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1200" height="620" fill="#0a0c10"/>

  <text x="600" y="32" fill="#e0e0e0" font-size="20" font-weight="bold" text-anchor="middle">6 个核心机制在 alloc 大小轴上的覆盖与决策</text>
  <text x="600" y="55" fill="#888" font-size="13" text-anchor="middle">多机制覆盖同一区间是常态 · tcache 优先(无锁) · arena 1MB 对齐是空间维度兜底</text>

  <!-- ============ X 轴 size 标尺(log 等距分布) ============ -->
  <line x1="100" y1="105" x2="1100" y2="105" stroke="#888" stroke-width="1.5"/>

  <!-- 标尺刻度位置(log 分布):16B=100, 64B=237, 256B=375, 1KB=512, 4KB=650, 32KB=787, 128KB=925, 1MB=1062 -->
  <g font-size="11" fill="#aaa" text-anchor="middle">
    <line x1="100" y1="100" x2="100" y2="115" stroke="#aaa"/>
    <text x="100" y="92">16 B</text>
    <line x1="237" y1="100" x2="237" y2="115" stroke="#aaa"/>
    <text x="237" y="92">64 B</text>
    <line x1="375" y1="100" x2="375" y2="115" stroke="#aaa"/>
    <text x="375" y="92">256 B</text>
    <line x1="512" y1="100" x2="512" y2="115" stroke="#aaa"/>
    <text x="512" y="92">1 KB</text>
    <line x1="650" y1="100" x2="650" y2="115" stroke="#aaa"/>
    <text x="650" y="92">4 KB</text>
    <line x1="787" y1="100" x2="787" y2="115" stroke="#aaa"/>
    <text x="787" y="92">32 KB</text>
    <line x1="925" y1="100" x2="925" y2="115" stroke="#aaa"/>
    <text x="925" y="92">128 KB</text>
    <line x1="1062" y1="100" x2="1062" y2="115" stroke="#aaa"/>
    <text x="1062" y="92">1 MB</text>
  </g>
  <text x="60" y="109" fill="#666" font-size="11">size →</text>

  <!-- ============ 第一组:size-dependent 机制(优先级从高到低) ============ -->
  <text x="60" y="138" fill="#aaa" font-size="11" font-weight="bold">size 维度</text>

  <!-- M5 tcache: 16B ~ 1032B(无锁,优先级最高) -->
  <g transform="translate(0,140)">
    <rect x="100" y="0" width="412" height="28" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.5"/>
    <text x="306" y="18" fill="#88c0ff" font-size="12" font-weight="bold" text-anchor="middle">M5 tcache (per-thread, 无锁)</text>
    <text x="520" y="18" fill="#88c0ff" font-size="10">优先级 #1 ★ · 16~1032B · 64 桶 × 7 chunk · 反事实 4 候选 (§6)</text>
  </g>

  <!-- M2 fastbin: 16B ~ 64B(arena 锁内 O(1)) -->
  <g transform="translate(0,180)">
    <rect x="100" y="0" width="137" height="28" fill="#5f3a1e" stroke="#c08040" stroke-width="1.5"/>
    <text x="168" y="18" fill="#ffaa55" font-size="12" font-weight="bold" text-anchor="middle">M2 fastbin</text>
    <text x="245" y="18" fill="#ffaa55" font-size="10">优先级 #2 · 16~64B · 不合并 · 反事实 4 候选 (§3)</text>
  </g>

  <!-- smallbin: 64B ~ 512B -->
  <g transform="translate(0,220)">
    <rect x="237" y="0" width="207" height="28" fill="#3a1e5f" stroke="#8040c0" stroke-width="1.5" opacity="0.7"/>
    <text x="340" y="18" fill="#c088ff" font-size="12" text-anchor="middle">smallbin</text>
    <text x="450" y="18" fill="#888" font-size="10">优先级 #3 · 64~512B · 双链表合并(参照对照,非本阶段挑选)</text>
  </g>

  <!-- largebin: 512B ~ 128KB -->
  <g transform="translate(0,260)">
    <rect x="444" y="0" width="481" height="28" fill="#3a1e5f" stroke="#8040c0" stroke-width="1.5" opacity="0.5"/>
    <text x="684" y="18" fill="#c088ff" font-size="12" text-anchor="middle">largebin</text>
    <text x="940" y="18" fill="#888" font-size="10">优先级 #4 · 512B~128KB · size class</text>
  </g>

  <!-- M3 mmap: 128KB+ -->
  <g transform="translate(0,300)">
    <rect x="925" y="0" width="225" height="28" fill="#5f1e1e" stroke="#c04040" stroke-width="1.5"/>
    <text x="1037" y="18" fill="#ff8888" font-size="12" font-weight="bold" text-anchor="middle">M3 mmap (绕 arena)</text>
  </g>
  <text x="100" y="318" fill="#ff8888" font-size="10">M3 M_MMAP_THRESHOLD = 128 KB(动态升级,上限 32 MB) · 反事实 4 候选 (§4)</text>

  <!-- ============ 第二组:跨所有 size 的"空间维度"机制 ============ -->
  <line x1="80" y1="345" x2="1120" y2="345" stroke="#444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="60" y="365" fill="#aaa" font-size="11" font-weight="bold">空间维度</text>
  <text x="60" y="380" fill="#666" font-size="10">(每个 chunk 都用)</text>

  <!-- M1 chunk header 16B(所有 chunk 都有) -->
  <g transform="translate(0,360)">
    <rect x="100" y="0" width="1050" height="22" fill="#1e5f3a" stroke="#40c060" stroke-width="1.5"/>
    <text x="625" y="15" fill="#88ff88" font-size="11" font-weight="bold" text-anchor="middle">M1 chunk header 16B + 低 3 位标志(任何 chunk 都有,反向偏移读元数据) · 反事实 4 候选 (§2)</text>
  </g>

  <!-- M6 arena 64MB 对齐(非 mmap 路径全用) -->
  <g transform="translate(0,395)">
    <rect x="100" y="0" width="825" height="22" fill="#1e5f3a" stroke="#40c060" stroke-width="1.5" opacity="0.85"/>
    <text x="512" y="15" fill="#88ff88" font-size="11" font-weight="bold" text-anchor="middle">M6 arena 64MB 对齐 + 位压缩(非 mmap 路径全靠它 O(1) 找 arena) · 反事实 4 候选 (§7)</text>
  </g>

  <!-- M4 M_ARENA_MAX = 8N(arena 数上限) -->
  <g transform="translate(0,430)">
    <rect x="100" y="0" width="825" height="22" fill="#1e5f3a" stroke="#40c060" stroke-width="1.5" opacity="0.7"/>
    <text x="512" y="15" fill="#88ff88" font-size="11" font-weight="bold" text-anchor="middle">M4 M_ARENA_MAX = 8 × cores(arena 数上限,决定多线程锁竞争) · 反事实 4 候选 (§5)</text>
  </g>

  <!-- ============ 决策示例:malloc(48) 的优先级路径 ============ -->
  <line x1="80" y1="475" x2="1120" y2="475" stroke="#444" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="60" y="495" fill="#aaa" font-size="11" font-weight="bold">malloc(48) 优先路径(从上到下,先命中先返回):</text>

  <g transform="translate(100,505)" font-size="11">
    <text x="0" y="0" fill="#88c0ff">1. tcache[2]?</text>
    <text x="100" y="0" fill="#88c0ff">命中 → 返回(~15 ns)</text>
    <text x="290" y="0" fill="#666">— 90% 应用走这</text>

    <text x="0" y="22" fill="#ffaa55">2. (lock arena) fastbin[2]?</text>
    <text x="200" y="22" fill="#ffaa55">命中 → 填 tcache + 返回(~30 ns)</text>
    <text x="450" y="22" fill="#666">— 8% 应用走这</text>

    <text x="0" y="44" fill="#c088ff">3. unsorted bin?</text>
    <text x="130" y="44" fill="#c088ff">命中 → 切下来 + 返回(~150 ns)</text>
    <text x="380" y="44" fill="#666">— 1.5%</text>

    <text x="0" y="66" fill="#888">4. smallbin[2]? top_chunk 切? brk 扩?</text>
    <text x="320" y="66" fill="#888">慢路径(~500 ns)</text>
    <text x="500" y="66" fill="#666">— 0.5%</text>

    <text x="0" y="88" fill="#ff8888" font-style="italic">size = 48 远小于 128 KB → 不走 mmap 路径</text>
  </g>

  <!-- ============ 图例 ============ -->
  <g transform="translate(100,605)">
    <text x="0" y="0" fill="#666" font-size="10" font-style="italic">总反事实候选数 = 4 × 6 = 24 个,每个候选 §2~§7 都有"违反约束 / 代价 / 现实证据"三栏</text>
  </g>

  <!-- 颜色图例(右上) -->
  <g transform="translate(945,135)">
    <text x="0" y="0" fill="#aaa" font-size="11" font-weight="bold">机制色编码</text>
    <rect x="0" y="8" width="14" height="12" fill="#1e3a5f" stroke="#4080c0"/>
    <text x="20" y="18" fill="#88c0ff" font-size="10">size 维度: tcache(蓝)</text>
    <rect x="0" y="26" width="14" height="12" fill="#5f3a1e" stroke="#c08040"/>
    <text x="20" y="36" fill="#ffaa55" font-size="10">size 维度: fastbin(橙)</text>
    <rect x="0" y="44" width="14" height="12" fill="#3a1e5f" stroke="#8040c0"/>
    <text x="20" y="54" fill="#c088ff" font-size="10">size 维度: small/large(紫)</text>
    <rect x="0" y="62" width="14" height="12" fill="#5f1e1e" stroke="#c04040"/>
    <text x="20" y="72" fill="#ff8888" font-size="10">size 维度: mmap(红)</text>
    <rect x="0" y="80" width="14" height="12" fill="#1e5f3a" stroke="#40c060"/>
    <text x="20" y="90" fill="#88ff88" font-size="10">空间维度: chunk/arena(绿)</text>
  </g>
</svg>
