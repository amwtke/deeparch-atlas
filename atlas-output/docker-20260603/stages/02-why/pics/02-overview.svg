<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="ow" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#c08040"/>
    </marker>
  </defs>
  <rect width="1200" height="640" fill="#0a0c10"/>

  <text x="600" y="38" text-anchor="middle" font-size="25" fill="#e8eef5" font-weight="bold">没有容器的世界:五幕痛史(2000s → 2013)</text>
  <text x="600" y="63" text-anchor="middle" font-size="13" fill="#7a8694">每一幕的"病根"都是一条不可再分的硬约束;暗线是规模浪潮 —— 机器越来越多,人没有变多</text>

  <!-- ===== Act 1 ===== -->
  <rect x="48" y="92" width="205" height="210" rx="9" fill="#1a0e0e" stroke="#c04040" stroke-width="1.8"/>
  <text x="150" y="118" text-anchor="middle" font-size="13.5" fill="#ff8888" font-weight="bold">第一幕 · 裸机合租</text>
  <text x="150" y="145" text-anchor="middle" font-size="10" fill="#d2a0a0">A 要 libssl 0.9.8</text>
  <text x="150" y="162" text-anchor="middle" font-size="10" fill="#d2a0a0">B 要 1.0.x,/usr/lib 只有一个</text>
  <text x="150" y="186" text-anchor="middle" font-size="10" fill="#d2a0a0">A 内存泄漏吃光机器</text>
  <text x="150" y="203" text-anchor="middle" font-size="10" fill="#d2a0a0">B 无辜陪葬(OOM)</text>
  <text x="150" y="227" text-anchor="middle" font-size="10" fill="#d2a0a0">都想监听 80 端口</text>
  <rect x="68" y="252" width="165" height="34" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.5"/>
  <text x="150" y="274" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">病根 → C1② 共享默认互害</text>

  <!-- ===== Act 2 ===== -->
  <rect x="273" y="92" width="205" height="210" rx="9" fill="#1a0e0e" stroke="#c04040" stroke-width="1.8"/>
  <text x="375" y="118" text-anchor="middle" font-size="13.5" fill="#ff8888" font-weight="bold">第二幕 · 一机一应用</text>
  <text x="375" y="145" text-anchor="middle" font-size="10" fill="#d2a0a0">被合租坑怕了:</text>
  <text x="375" y="162" text-anchor="middle" font-size="10" fill="#d2a0a0">每个应用独占一台物理机</text>
  <text x="375" y="186" text-anchor="middle" font-size="10" fill="#d2a0a0">机房 50 台</text>
  <text x="375" y="203" text-anchor="middle" font-size="10" fill="#d2a0a0">平均 CPU 利用率 8%</text>
  <text x="375" y="227" text-anchor="middle" font-size="10" fill="#d2a0a0">老板盯着电费 + 采购单</text>
  <rect x="293" y="252" width="165" height="34" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.5"/>
  <text x="375" y="274" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">病根 → C1① 闲置是浪费</text>

  <!-- ===== Act 3 ===== -->
  <rect x="498" y="92" width="205" height="210" rx="9" fill="#1a0e0e" stroke="#c04040" stroke-width="1.8"/>
  <text x="600" y="118" text-anchor="middle" font-size="13.5" fill="#ff8888" font-weight="bold">第三幕 · VM 救场太重</text>
  <text x="600" y="145" text-anchor="middle" font-size="10" fill="#d2a0a0">隔离是有了,但 ——</text>
  <text x="600" y="162" text-anchor="middle" font-size="10" fill="#d2a0a0">跑个小 web 要从装 OS 开始</text>
  <text x="600" y="186" text-anchor="middle" font-size="10" fill="#d2a0a0">镜像 GB 级 · 启动分钟级</text>
  <text x="600" y="203" text-anchor="middle" font-size="10" fill="#d2a0a0">每台先交"内核税"</text>
  <text x="600" y="227" text-anchor="middle" font-size="10" fill="#d2a0a0">一台物理机塞十几台到头</text>
  <rect x="518" y="252" width="165" height="34" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.5"/>
  <text x="600" y="274" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">病根 → C1③ 隔离太贵=浪费</text>

  <!-- ===== Act 4 ===== -->
  <rect x="723" y="92" width="205" height="210" rx="9" fill="#1a0e0e" stroke="#c04040" stroke-width="1.8"/>
  <text x="825" y="118" text-anchor="middle" font-size="13" fill="#ff8888" font-weight="bold">第四幕 · 在我机器上能跑</text>
  <text x="825" y="145" text-anchor="middle" font-size="10" fill="#d2a0a0">wiki 三页环境文档</text>
  <text x="825" y="162" text-anchor="middle" font-size="10" fill="#d2a0a0">新人照着配 3 天还不对</text>
  <text x="825" y="186" text-anchor="middle" font-size="10" fill="#d2a0a0">dev/staging/prod 各不相同</text>
  <text x="825" y="203" text-anchor="middle" font-size="10" fill="#d2a0a0">雪花服务器:</text>
  <text x="825" y="227" text-anchor="middle" font-size="10" fill="#d2a0a0">没有两台机器一样</text>
  <rect x="743" y="252" width="165" height="34" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.5"/>
  <text x="825" y="274" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">病根 → C2 ★ 环境长在机器上</text>

  <!-- ===== Act 5 (user's, emphasized) ===== -->
  <rect x="948" y="92" width="205" height="210" rx="9" fill="#241010" stroke="#ff6655" stroke-width="2.6"/>
  <text x="1050" y="116" text-anchor="middle" font-size="12.5" fill="#ff8888" font-weight="bold">第五幕 · 凌晨人肉对账</text>
  <text x="1050" y="132" text-anchor="middle" font-size="9.5" fill="#ffaa99">(2009 · 30 万在线 IM · 亲历)</text>
  <text x="1050" y="155" text-anchor="middle" font-size="10" fill="#d2a0a0">几十台对称部署</text>
  <text x="1050" y="172" text-anchor="middle" font-size="10" fill="#d2a0a0">发布窗口 2:00 – 6:00</text>
  <text x="1050" y="192" text-anchor="middle" font-size="10" fill="#d2a0a0">md5 人工对版本</text>
  <text x="1050" y="209" text-anchor="middle" font-size="10" fill="#d2a0a0">反编译验证新功能在不在</text>
  <text x="1050" y="229" text-anchor="middle" font-size="10" fill="#d2a0a0">发现靠人 · 回滚靠人</text>
  <rect x="968" y="252" width="165" height="34" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.5"/>
  <text x="1050" y="266" text-anchor="middle" font-size="10" fill="#ffaa55" font-weight="bold">病根 → C3 人不可扩展</text>
  <text x="1050" y="280" text-anchor="middle" font-size="10" fill="#ffaa55" font-weight="bold">· 字节无身份</text>

  <!-- ===== scale wave (dark thread) ===== -->
  <rect x="48" y="330" width="1105" height="120" rx="9" fill="#11161d" stroke="#2a3340" stroke-width="1.3"/>
  <text x="70" y="356" font-size="12.5" fill="#88c0ff" font-weight="bold">暗线 · 规模浪潮:机器数一直在涨,人没有</text>
  <!-- rising steps -->
  <rect x="90"  y="408" width="150" height="26" rx="4" fill="#142838" stroke="#4080c0" stroke-width="1.4"/>
  <text x="165" y="426" text-anchor="middle" font-size="10.5" fill="#88c0ff">~2003 · 10 台</text>
  <rect x="330" y="396" width="150" height="38" rx="4" fill="#142838" stroke="#4080c0" stroke-width="1.4"/>
  <text x="405" y="420" text-anchor="middle" font-size="10.5" fill="#88c0ff">~2008 · 100 台</text>
  <rect x="570" y="382" width="150" height="52" rx="4" fill="#142838" stroke="#4080c0" stroke-width="1.4"/>
  <text x="645" y="412" text-anchor="middle" font-size="10.5" fill="#88c0ff">~2011 · 几百台</text>
  <rect x="810" y="368" width="170" height="66" rx="4" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="895" y="396" text-anchor="middle" font-size="10.5" fill="#bfe0ff" font-weight="bold">~2013 · 几千台</text>
  <text x="895" y="414" text-anchor="middle" font-size="9" fill="#88c0ff">人肉运维数学上死刑</text>
  <line x1="240" y1="420" x2="328" y2="414" stroke="#4080c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="480" y1="414" x2="568" y2="406" stroke="#4080c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="720" y1="406" x2="808" y2="398" stroke="#4080c0" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="1080" y="400" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">→ C3</text>
  <text x="1080" y="418" text-anchor="middle" font-size="9" fill="#c89868">人力 = O(台数×环境×频率)</text>

  <!-- ===== 2013 spark ===== -->
  <line x1="600" y1="450" x2="600" y2="486" stroke="#c08040" stroke-width="2" marker-end="url(#ow)"/>
  <rect x="240" y="490" width="720" height="106" rx="10" fill="#0e1a12" stroke="#40c060" stroke-width="2.2"/>
  <text x="600" y="518" text-anchor="middle" font-size="15" fill="#88ff88" font-weight="bold">2013 · Docker 出现</text>
  <text x="600" y="543" text-anchor="middle" font-size="11.5" fill="#9bffb5">五幕戏的每一条病根,它都砍了一刀 —— 所以带着伤疤的一代工程师一眼就认出了它</text>
  <text x="600" y="568" text-anchor="middle" font-size="11" fill="#7fd99f" font-style="italic">"13 年看到 Docker 时的兴奋,不亚于现在看到 LLM / Claude Code。" —— 本篇主人公</text>

  <!-- legend -->
  <text x="600" y="624" text-anchor="middle" font-size="10.5" fill="#6a7684">红 = 痛(幕) · 橙 = 病根(约束 Cn) · 蓝 = 规模暗线 · 绿 = 2013 转机 · 第五幕加粗 = 亲历压轴</text>
</svg>
