<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="wpl" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ffaa55"/>
    </marker>
  </defs>
  <rect width="1200" height="660" fill="#0a0c10"/>

  <text x="600" y="36" text-anchor="middle" font-size="24" fill="#e8eef5" font-weight="bold">墙的双视图:内核眼里的真相 vs 容器以为的世界</text>
  <text x="600" y="60" text-anchor="middle" font-size="12.5" fill="#7a8694">物理真相:墙只是 task_struct 上的几个指针 + cgroup 树里的一个目录。逻辑幻觉:两台"独占的机器"</text>

  <line x1="600" y1="80" x2="600" y2="560" stroke="#2a3340" stroke-width="1.5" stroke-dasharray="4,5"/>
  <text x="300" y="102" text-anchor="middle" font-size="15" fill="#88ff88" font-weight="bold">⚙ 物理:内核数据结构</text>
  <text x="900" y="102" text-anchor="middle" font-size="15" fill="#88c0ff" font-weight="bold">💭 逻辑:容器各自以为</text>

  <!-- ===== LEFT physical ===== -->
  <!-- task nginx -->
  <rect x="50" y="130" width="190" height="64" rx="7" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="145" y="154" text-anchor="middle" font-size="11.5" fill="#bfe0ff" font-weight="bold">task_struct · nginx</text>
  <text x="145" y="174" text-anchor="middle" font-size="10" fill="#88c0ff">宿主真 PID:12345</text>
  <!-- nsproxy A -->
  <rect x="290" y="120" width="130" height="90" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.8"/>
  <text x="355" y="140" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">nsproxy → A 组</text>
  <text x="355" y="158" text-anchor="middle" font-size="9" fill="#c89868">pid_ns_A · net_ns_A</text>
  <text x="355" y="173" text-anchor="middle" font-size="9" fill="#c89868">mnt_ns_A · uts_ns_A</text>
  <text x="355" y="188" text-anchor="middle" font-size="9" fill="#c89868">ipc_ns_A (· user_ns_A)</text>
  <text x="355" y="203" text-anchor="middle" font-size="8.5" fill="#9a8868">6 个指针 = 6 扇窗</text>
  <line x1="240" y1="160" x2="288" y2="160" stroke="#ffaa55" stroke-width="1.8" marker-end="url(#wpl)"/>

  <!-- task java -->
  <rect x="50" y="240" width="190" height="64" rx="7" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="145" y="264" text-anchor="middle" font-size="11.5" fill="#bfe0ff" font-weight="bold">task_struct · java</text>
  <text x="145" y="284" text-anchor="middle" font-size="10" fill="#88c0ff">宿主真 PID:12399</text>
  <!-- nsproxy B -->
  <rect x="290" y="230" width="130" height="90" rx="6" fill="#241808" stroke="#c08040" stroke-width="1.8"/>
  <text x="355" y="250" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">nsproxy → B 组</text>
  <text x="355" y="268" text-anchor="middle" font-size="9" fill="#c89868">pid_ns_B · net_ns_B</text>
  <text x="355" y="283" text-anchor="middle" font-size="9" fill="#c89868">mnt_ns_B · uts_ns_B</text>
  <text x="355" y="298" text-anchor="middle" font-size="9" fill="#c89868">ipc_ns_B (· user_ns_B)</text>
  <text x="355" y="313" text-anchor="middle" font-size="8.5" fill="#9a8868">指向不同对象 = 不同屋</text>
  <line x1="240" y1="270" x2="288" y2="270" stroke="#ffaa55" stroke-width="1.8" marker-end="url(#wpl)"/>

  <!-- sshd (host ns) -->
  <rect x="50" y="350" width="190" height="50" rx="7" fill="#161a20" stroke="#4a5568" stroke-width="1.5"/>
  <text x="145" y="371" text-anchor="middle" font-size="10.5" fill="#aab6c4">task_struct · sshd(宿主)</text>
  <text x="145" y="388" text-anchor="middle" font-size="9" fill="#7a8694">nsproxy → 根 namespace 组</text>

  <!-- cgroup tree -->
  <rect x="290" y="350" width="280" height="130" rx="8" fill="#1a1206" stroke="#c08040" stroke-width="1.8"/>
  <text x="430" y="372" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">cgroup v2 树(/sys/fs/cgroup)</text>
  <text x="310" y="394" font-size="9.5" fill="#c89868">└ docker/</text>
  <text x="330" y="412" font-size="9.5" fill="#c89868">├ ctrA/  memory.max=512M  cpu.max=50000</text>
  <text x="330" y="430" font-size="9.5" fill="#c89868">│        cgroup.procs: 12345 ←(nginx 在户口上)</text>
  <text x="330" y="448" font-size="9.5" fill="#c89868">└ ctrB/  memory.max=1G</text>
  <text x="330" y="466" font-size="9.5" fill="#c89868">         cgroup.procs: 12399</text>
  <line x1="190" y1="194" x2="320" y2="408" stroke="#c08040" stroke-width="1.2" stroke-dasharray="4,4"/>

  <!-- kernel base -->
  <rect x="50" y="500" width="520" height="44" rx="7" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="310" y="527" text-anchor="middle" font-size="12" fill="#88ff88" font-weight="bold">同一个内核:三个进程躺在同一张进程表里,平起平坐</text>

  <text x="310" y="576" text-anchor="middle" font-size="11" fill="#ffc48a" font-weight="bold">墙的全部物理实体:几个指针 + 一个目录。没有别的了。</text>

  <!-- ===== RIGHT logical ===== -->
  <rect x="640" y="130" width="520" height="170" rx="12" fill="#0e1a26" stroke="#c08040" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="900" y="156" text-anchor="middle" font-size="12.5" fill="#88c0ff" font-weight="bold">容器 A 以为的世界</text>
  <text x="900" y="182" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"我是 PID 1,这台机器叫 web-a,整台都是我的。"</text>
  <text x="900" y="204" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"我的 / 干干净净,eth0 是我的,172.17.0.2。"</text>
  <text x="900" y="226" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"别的进程?这机器上就我一家。"</text>
  <text x="900" y="252" text-anchor="middle" font-size="10" fill="#5f7488">(ps 只见自己 · hostname 自己的 · 端口随便占)</text>
  <text x="900" y="276" text-anchor="middle" font-size="10" fill="#ffaa55">但 free -m 仍看见宿主 64G —— 谎没撒全(What §4.5)</text>

  <rect x="640" y="330" width="520" height="150" rx="12" fill="#0e1a26" stroke="#c08040" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="900" y="356" text-anchor="middle" font-size="12.5" fill="#88c0ff" font-weight="bold">容器 B 以为的世界</text>
  <text x="900" y="382" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"我也是 PID 1,机器叫 web-b,也整台都是我的。"</text>
  <text x="900" y="404" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"奇怪,内存说好 1G,怎么 free 显示 64G?"</text>
  <text x="900" y="426" text-anchor="middle" font-size="10.5" fill="#7fa8cc">"A?谁是 A?"</text>
  <text x="900" y="452" text-anchor="middle" font-size="10" fill="#5f7488">两个"PID 1"互不知情 —— 同一个谎言,各撒一份</text>

  <rect x="640" y="500" width="520" height="44" rx="7" fill="#11161d" stroke="#c08040" stroke-width="1.6"/>
  <text x="900" y="527" text-anchor="middle" font-size="11.5" fill="#ffc48a" font-weight="bold">docker exec 的原理 = setns():让新进程"串门"到 A 组指针上</text>

  <text x="900" y="576" text-anchor="middle" font-size="11" fill="#9fb4c8">幻觉成本:0 复制、0 虚拟机 —— 改几个指针而已,所以毫秒级</text>

  <text x="600" y="620" text-anchor="middle" font-size="11.5" fill="#6a7684">同一份现实,两种视图:左边是 5 个数据结构,右边是两台"机器" —— 这就是"骗进程比骗 OS 便宜三个数量级"的物理根据</text>
</svg>
