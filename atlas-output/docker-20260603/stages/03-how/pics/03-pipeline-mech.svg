<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1200" height="760" fill="#0a0c10"/>

  <text x="600" y="36" text-anchor="middle" font-size="24" fill="#e8eef5" font-weight="bold">docker run -d -p 80:80 -m 512m nginx —— 十步全流程</text>
  <text x="600" y="60" text-anchor="middle" font-size="12.5" fill="#7a8694">每一步:谁在干 · 干了什么 · 对内核说了什么 · 持哪条约束的出生证。全程零人肉(C3)</text>

  <!-- column headers -->
  <text x="95" y="96" text-anchor="middle" font-size="11" fill="#8a96a4">步</text>
  <text x="225" y="96" text-anchor="middle" font-size="11" fill="#8a96a4">谁</text>
  <text x="660" y="96" text-anchor="middle" font-size="11" fill="#8a96a4">干了什么(机制级)</text>
  <text x="1115" y="96" text-anchor="middle" font-size="11" fill="#8a96a4">出生证</text>

  <!-- row 1 -->
  <rect x="60" y="108" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="134" r="14" fill="#1f1133" stroke="#8040c0" stroke-width="1.6"/><text x="95" y="139" text-anchor="middle" font-size="12" fill="#c088ff">1</text>
  <rect x="140" y="118" width="170" height="32" rx="5" fill="#2a1648" stroke="#8040c0" stroke-width="1.4"/><text x="225" y="139" text-anchor="middle" font-size="10.5" fill="#c088ff">docker CLI</text>
  <text x="330" y="132" font-size="10.5" fill="#cdd6e0">解析命令行 → POST /containers/create</text>
  <text x="330" y="150" font-size="9.5" fill="#7a8694">走 unix socket:/var/run/docker.sock(命令变 API,不是人肉步骤)</text>
  <rect x="1080" y="118" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="138" text-anchor="middle" font-size="10.5" fill="#ffaa55">C3</text>

  <!-- row 2 -->
  <rect x="60" y="166" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="192" r="14" fill="#1f1133" stroke="#8040c0" stroke-width="1.6"/><text x="95" y="197" text-anchor="middle" font-size="12" fill="#c088ff">2</text>
  <rect x="140" y="176" width="170" height="32" rx="5" fill="#2a1648" stroke="#8040c0" stroke-width="1.4"/><text x="225" y="197" text-anchor="middle" font-size="10.5" fill="#c088ff">dockerd</text>
  <text x="330" y="190" font-size="10.5" fill="#cdd6e0">本地无 nginx 镜像 → pull:取 manifest(层清单),逐层下载</text>
  <text x="330" y="208" font-size="9.5" fill="#88ffbb">每层现场算 sha256 对 manifest —— 对不上直接拒收(2009 人肉 md5 在此退役)</text>
  <rect x="1080" y="176" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="196" text-anchor="middle" font-size="10.5" fill="#ffaa55">C3</text>

  <!-- row 3 -->
  <rect x="60" y="224" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="250" r="14" fill="#1f1133" stroke="#8040c0" stroke-width="1.6"/><text x="95" y="255" text-anchor="middle" font-size="12" fill="#c088ff">3</text>
  <rect x="140" y="234" width="170" height="32" rx="5" fill="#2a1648" stroke="#8040c0" stroke-width="1.4"/><text x="225" y="255" text-anchor="middle" font-size="10.5" fill="#c088ff">dockerd→containerd</text>
  <text x="330" y="248" font-size="10.5" fill="#cdd6e0">gRPC(containerd.sock):创建容器对象,移交 OCI 规格</text>
  <text x="330" y="266" font-size="9.5" fill="#7a8694">config.json:要开哪些 namespace、cgroup 限多少、根放哪 —— "施工图"</text>
  <rect x="1080" y="234" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="254" text-anchor="middle" font-size="10.5" fill="#ffaa55">C3</text>

  <!-- row 4 -->
  <rect x="60" y="282" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="308" r="14" fill="#163524" stroke="#40c060" stroke-width="1.6"/><text x="95" y="313" text-anchor="middle" font-size="12" fill="#88ffbb">4</text>
  <rect x="140" y="292" width="170" height="32" rx="5" fill="#13251a" stroke="#40c060" stroke-width="1.4"/><text x="225" y="313" text-anchor="middle" font-size="10.5" fill="#88ffbb">containerd 备行李</text>
  <text x="330" y="306" font-size="10.5" fill="#cdd6e0">snapshotter:只读层原地不动 + 新建空 upper/work 目录</text>
  <text x="330" y="324" font-size="9.5" fill="#7fd99f">预组 overlay(lowerdir=L3:L2:L1, upperdir=新, workdir=新)—— 不解压</text>
  <rect x="1080" y="292" width="56" height="30" rx="5" fill="#1c2a14" stroke="#40c060" stroke-width="1.3"/><text x="1108" y="312" text-anchor="middle" font-size="10.5" fill="#88ffbb">C2★</text>

  <!-- row 5 -->
  <rect x="60" y="340" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="366" r="14" fill="#1f1133" stroke="#8040c0" stroke-width="1.6"/><text x="95" y="371" text-anchor="middle" font-size="12" fill="#c088ff">5</text>
  <rect x="140" y="350" width="170" height="32" rx="5" fill="#2a1648" stroke="#8040c0" stroke-width="1.4"/><text x="225" y="371" text-anchor="middle" font-size="10.5" fill="#c088ff">containerd→shim</text>
  <text x="330" y="364" font-size="10.5" fill="#cdd6e0">起 containerd-shim:这个容器的"常驻监护人"</text>
  <text x="330" y="382" font-size="9.5" fill="#7a8694">以后容器的命挂在 shim 上 —— 重启 dockerd/containerd 容器不死</text>
  <rect x="1080" y="350" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="370" text-anchor="middle" font-size="10.5" fill="#ffaa55">C3</text>

  <!-- row 6 -->
  <rect x="60" y="398" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="424" r="14" fill="#1f1133" stroke="#8040c0" stroke-width="1.6"/><text x="95" y="429" text-anchor="middle" font-size="12" fill="#c088ff">6</text>
  <rect x="140" y="408" width="170" height="32" rx="5" fill="#3a1e5f" stroke="#8040c0" stroke-width="1.8"/><text x="225" y="429" text-anchor="middle" font-size="10.5" fill="#c088ff" font-weight="bold">shim→runc</text>
  <text x="330" y="422" font-size="10.5" fill="#cdd6e0">fork + exec runc(跑一个程序,不是 RPC),runc 读施工图开干</text>
  <text x="330" y="440" font-size="9.5" fill="#7a8694">从这里开始,下面三步是真正"对内核动手"的砌墙现场</text>
  <rect x="1080" y="408" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="428" text-anchor="middle" font-size="10.5" fill="#ffaa55">C3</text>

  <!-- row 7 -->
  <rect x="60" y="456" width="1080" height="52" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="1.4"/>
  <circle cx="95" cy="482" r="14" fill="#241808" stroke="#ffaa55" stroke-width="1.8"/><text x="95" y="487" text-anchor="middle" font-size="12" fill="#ffaa55">7</text>
  <rect x="140" y="466" width="170" height="32" rx="5" fill="#3a2410" stroke="#c08040" stroke-width="1.6"/><text x="225" y="487" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">runc 砌墙①开窗</text>
  <text x="330" y="480" font-size="10.5" fill="#ffd9a8">clone(CLONE_NEWPID|NEWNS|NEWNET|NEWUTS|NEWIPC) → 生子进程</text>
  <text x="330" y="498" font-size="9.5" fill="#c89868">六扇新窗一次开齐:孩子生下来就只看得见墙内(物理上=新 nsproxy 指针)</text>
  <rect x="1080" y="466" width="56" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1108" y="486" text-anchor="middle" font-size="10.5" fill="#ffaa55">C1</text>

  <!-- row 8 -->
  <rect x="60" y="514" width="1080" height="52" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="1.4"/>
  <circle cx="95" cy="540" r="14" fill="#241808" stroke="#ffaa55" stroke-width="1.8"/><text x="95" y="545" text-anchor="middle" font-size="12" fill="#ffaa55">8</text>
  <rect x="140" y="524" width="170" height="32" rx="5" fill="#3a2410" stroke="#c08040" stroke-width="1.6"/><text x="225" y="545" text-anchor="middle" font-size="10.5" fill="#ffaa55" font-weight="bold">runc 砌墙②③</text>
  <text x="330" y="538" font-size="10.5" fill="#ffd9a8">②装表:写 cgroup(memory.max=512M…,孩子 PID 写进 cgroup.procs)</text>
  <text x="330" y="556" font-size="9.5" fill="#88ffbb">③换根:pivot_root 到 merged → 容器的 / 就位(行李落地成地板)</text>
  <rect x="1064" y="524" width="76" height="30" rx="5" fill="#241808" stroke="#c08040" stroke-width="1.3"/><text x="1102" y="544" text-anchor="middle" font-size="9.5" fill="#ffaa55">C1+C2★</text>

  <!-- row 9 -->
  <rect x="60" y="572" width="1080" height="52" rx="7" fill="#11161d" stroke="#2a3340" stroke-width="1"/>
  <circle cx="95" cy="598" r="14" fill="#163524" stroke="#40c060" stroke-width="1.6"/><text x="95" y="603" text-anchor="middle" font-size="12" fill="#88ffbb">9</text>
  <rect x="140" y="582" width="170" height="32" rx="5" fill="#13251a" stroke="#40c060" stroke-width="1.4"/><text x="225" y="603" text-anchor="middle" font-size="10.5" fill="#88ffbb">网络:凿洞</text>
  <text x="330" y="596" font-size="10.5" fill="#cdd6e0">建 veth pair:一端塞进容器 netns 改名 eth0 + 分 IP;另一端插 docker0</text>
  <text x="330" y="614" font-size="9.5" fill="#7fd99f">-p 80:80 → 写一条 iptables DNAT:宿主:80 进来的包改道容器:80</text>
  <rect x="1080" y="582" width="56" height="30" rx="5" fill="#1c2a14" stroke="#40c060" stroke-width="1.3"/><text x="1108" y="602" text-anchor="middle" font-size="10.5" fill="#88ffbb">凿洞</text>

  <!-- row 10 -->
  <rect x="60" y="630" width="1080" height="52" rx="7" fill="#0e1a26" stroke="#4080c0" stroke-width="1.6"/>
  <circle cx="95" cy="656" r="14" fill="#142838" stroke="#4080c0" stroke-width="1.8"/><text x="95" y="661" text-anchor="middle" font-size="12" fill="#88c0ff">10</text>
  <rect x="140" y="640" width="170" height="32" rx="5" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.6"/><text x="225" y="661" text-anchor="middle" font-size="10.5" fill="#bfe0ff" font-weight="bold">住人</text>
  <text x="330" y="654" font-size="10.5" fill="#bfe0ff">runc exec nginx → nginx 成为墙内 PID 1;runc 退出,shim 收养容器</text>
  <text x="330" y="672" font-size="9.5" fill="#7fa8cc">从敲回车到这里:毫秒~秒级(镜像已在本地时)。施工队撤场,楼管留守</text>
  <rect x="1080" y="640" width="56" height="30" rx="5" fill="#16263a" stroke="#4080c0" stroke-width="1.3"/><text x="1108" y="660" text-anchor="middle" font-size="10.5" fill="#88c0ff">完工</text>

  <text x="600" y="716" text-anchor="middle" font-size="11.5" fill="#ffc48a" font-weight="bold">读法:1~6 是"指挥链"(C3 的 API 接力),7~8 是"砌墙现场"(C1 的窗和表 + C2★ 的地板),9 凿洞,10 住人。</text>
  <text x="600" y="738" text-anchor="middle" font-size="10.5" fill="#9a8868">备注:第 9 步的网络配置由 dockerd(libnetwork)在创建期完成,此处按逻辑顺序摆放;真实时序与 7~8 交织。</text>
</svg>
