<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="ov" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#8a96a4"/>
    </marker>
    <marker id="ovb" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#88c0ff"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#0a0c10"/>

  <text x="600" y="38" text-anchor="middle" font-size="25" fill="#e8eef5" font-weight="bold">overlayfs = 一摞透明胶片:底片只读、顶片可写、改时才复制</text>
  <text x="600" y="63" text-anchor="middle" font-size="13" fill="#7a8694">左:印好的底片 + 一张空白顶片,叠起来看是完整图;右:lowerdir / upperdir / merged 的真实结构</text>

  <line x1="560" y1="84" x2="560" y2="600" stroke="#2a3340" stroke-width="1.5" stroke-dasharray="4,5"/>
  <text x="290" y="108" text-anchor="middle" font-size="17" fill="#ffd28a" font-weight="bold">🏠 生活:透明胶片</text>
  <text x="860" y="108" text-anchor="middle" font-size="17" fill="#88c0ff" font-weight="bold">⚙ 技术:overlayfs</text>

  <!-- eye + look-down -->
  <text x="300" y="150" text-anchor="middle" font-size="13" fill="#88ff88">👁 从上往下看</text>
  <line x1="300" y1="158" x2="300" y2="195" stroke="#40c060" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#ov)"/>

  <!-- transparency stack (top blank -> bottom printed) -->
  <!-- top blank writable -->
  <rect x="170" y="200" width="280" height="40" rx="4" fill="#16263a" stroke="#4080c0" stroke-width="2"/>
  <text x="310" y="225" text-anchor="middle" font-size="11.5" fill="#bfe0ff" font-weight="bold">顶片(空白,你只在这写)</text>
  <!-- printed layer 3 -->
  <rect x="150" y="248" width="280" height="38" rx="4" fill="#142f1f" stroke="#40c060" stroke-width="1.6"/>
  <text x="290" y="272" text-anchor="middle" font-size="11" fill="#88ffbb">底片3:你的代码(印好,只读)</text>
  <!-- printed layer 2 -->
  <rect x="130" y="294" width="280" height="38" rx="4" fill="#142f1f" stroke="#40c060" stroke-width="1.6"/>
  <text x="270" y="318" text-anchor="middle" font-size="11" fill="#88ffbb">底片2:apt 依赖(印好,只读)</text>
  <!-- printed layer 1 base -->
  <rect x="110" y="340" width="280" height="38" rx="4" fill="#142f1f" stroke="#40c060" stroke-width="1.6"/>
  <text x="250" y="364" text-anchor="middle" font-size="11" fill="#88ffbb">底片1:debian 根(印好,只读)</text>

  <text x="300" y="404" text-anchor="middle" font-size="11" fill="#7fd99f">四张叠起来,从上往下看 = 一张完整图 = 容器的 /</text>

  <!-- CoW illustration -->
  <rect x="110" y="424" width="340" height="62" rx="7" fill="#0e1a12" stroke="#2a7a44" stroke-width="1.4"/>
  <text x="280" y="446" text-anchor="middle" font-size="11" fill="#9bffb5" font-weight="bold">想改底片上印着的字?擦不掉 ——</text>
  <text x="280" y="466" text-anchor="middle" font-size="10.5" fill="#7fd99f">复制一份到顶片,在顶片上改(= 写时复制 CoW)</text>
  <text x="280" y="481" text-anchor="middle" font-size="9.5" fill="#5f8a6f">底片永远干净,改动全在顶片</text>

  <!-- sharing -->
  <rect x="110" y="498" width="340" height="56" rx="7" fill="#11161d" stroke="#c08040" stroke-width="1.4"/>
  <text x="280" y="519" text-anchor="middle" font-size="11" fill="#ffc48a" font-weight="bold">10 个容器共用同一摞底片</text>
  <text x="280" y="538" text-anchor="middle" font-size="10.5" fill="#c8a878">各扣一张自己的顶片 → 省空间 + 秒级启动</text>

  <!-- ===== RIGHT: overlayfs ===== -->
  <!-- merged -->
  <rect x="610" y="135" width="540" height="40" rx="5" fill="#142838" stroke="#4080c0" stroke-width="2"/>
  <text x="880" y="160" text-anchor="middle" font-size="12.5" fill="#88c0ff" font-weight="bold">merged = 容器看到的 /(挂载点)</text>
  <line x1="880" y1="200" x2="880" y2="177" stroke="#88c0ff" stroke-width="1.8" marker-end="url(#ovb)"/>

  <!-- upperdir -->
  <rect x="610" y="202" width="540" height="50" rx="5" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="625" y="222" font-size="12" fill="#bfe0ff" font-weight="bold">upperdir(可写层)</text>
  <text x="625" y="241" font-size="10" fill="#88c0ff">/var/lib/docker/overlay2/&lt;id&gt;/diff —— 容器所有的写落这</text>

  <!-- lowerdir -->
  <rect x="610" y="260" width="540" height="92" rx="5" fill="#142f1f" stroke="#40c060" stroke-width="1.8"/>
  <text x="625" y="280" font-size="12" fill="#88ffbb" font-weight="bold">lowerdir(只读,冒号分隔,从右往左叠)</text>
  <text x="625" y="300" font-size="10" fill="#7fd99f">lowerdir = L3:L2:L1</text>
  <text x="625" y="318" font-size="10" fill="#7fd99f">L3 你的代码 · L2 apt 依赖 · L1 debian 根</text>
  <text x="625" y="338" font-size="9.5" fill="#5f8a6f">每层就是一个镜像层(image layer),内容寻址、可被多容器共享</text>

  <!-- workdir -->
  <rect x="610" y="360" width="540" height="38" rx="5" fill="#1a1206" stroke="#c08040" stroke-width="1.5"/>
  <text x="625" y="384" font-size="10.5" fill="#ffaa55">workdir:overlay 内部暂存区(copy_up 时中转,用户别碰)</text>

  <!-- mount command -->
  <rect x="610" y="406" width="540" height="56" rx="5" fill="#0d1117" stroke="#3a5168" stroke-width="1.4"/>
  <text x="625" y="427" font-size="9.5" fill="#9fd9a0">mount -t overlay overlay \</text>
  <text x="640" y="443" font-size="9.5" fill="#9fd9a0">-o lowerdir=L3:L2:L1,upperdir=U,workdir=W \</text>
  <text x="640" y="457" font-size="9.5" fill="#9fd9a0">/merged</text>

  <!-- CoW / whiteout -->
  <rect x="610" y="470" width="540" height="78" rx="5" fill="#0e1a12" stroke="#2a7a44" stroke-width="1.4"/>
  <text x="625" y="490" font-size="11" fill="#9bffb5" font-weight="bold">写时复制 + whiteout:</text>
  <text x="625" y="509" font-size="10" fill="#7fd99f">· 改只读层的文件 → 先 copy_up 整文件到 upperdir 再改</text>
  <text x="625" y="527" font-size="10" fill="#7fd99f">· 删只读层的文件 → 在 upperdir 放一个 whiteout(字符设备)遮住它</text>
  <text x="625" y="544" font-size="9.5" fill="#5f8a6f">→ 下层永不变,所以能被 N 个容器安全共享</text>

  <!-- mapping arrows -->
  <line x1="452" y1="220" x2="608" y2="225" stroke="#88c0ff" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#ovb)"/>
  <line x1="432" y1="310" x2="608" y2="305" stroke="#40c060" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#ov)"/>

  <!-- bottom one-liner -->
  <rect x="110" y="616" width="1040" height="50" rx="9" fill="#11161d" stroke="#c08040" stroke-width="1.6"/>
  <text x="630" y="638" text-anchor="middle" font-size="13" fill="#ffc48a" font-weight="bold">日历是"一本账"(单层、只累积);overlayfs 是"一叠可共享的透明片"(多层、可复用、改时才复制)。</text>
  <text x="630" y="657" text-anchor="middle" font-size="10.5" fill="#c8a878">"只读底片可共享 + 只有顶片各自独立" = 秒级启动 + 省磁盘的真正原因。</text>
</svg>
