<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="wm" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#8a96a4"/>
    </marker>
    <marker id="wmg" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#40c060"/>
    </marker>
  </defs>
  <rect width="1200" height="660" fill="#0a0c10"/>

  <text x="600" y="38" text-anchor="middle" font-size="25" fill="#e8eef5" font-weight="bold">网络 = 楼里的管道井 + 接市政的总水管</text>
  <text x="600" y="63" text-anchor="middle" font-size="13" fill="#7a8694">左:两户走管道井互通、出楼走市政总阀门;右:veth + docker0 + iptables NAT 的真结构</text>

  <line x1="580" y1="84" x2="580" y2="582" stroke="#2a3340" stroke-width="1.5" stroke-dasharray="4,5"/>
  <text x="300" y="108" text-anchor="middle" font-size="17" fill="#ffd28a" font-weight="bold">🏠 生活:管道与交换</text>
  <text x="880" y="108" text-anchor="middle" font-size="17" fill="#88ff88" font-weight="bold">⚙ 技术:veth + bridge + NAT</text>

  <!-- ===== Level 1: units / containers ===== -->
  <rect x="70" y="132" width="200" height="66" rx="7" fill="#16120a" stroke="#c08040" stroke-width="2"/>
  <text x="170" y="158" text-anchor="middle" font-size="12.5" fill="#ffc88a" font-weight="bold">车间A · 户内龙头</text>
  <text x="170" y="180" text-anchor="middle" font-size="10" fill="#d2b48c">自己的水表/门牌</text>
  <rect x="310" y="132" width="200" height="66" rx="7" fill="#16120a" stroke="#c08040" stroke-width="2"/>
  <text x="410" y="158" text-anchor="middle" font-size="12.5" fill="#ffc88a" font-weight="bold">车间B · 户内龙头</text>
  <text x="410" y="180" text-anchor="middle" font-size="10" fill="#d2b48c">和A互不打扰</text>

  <rect x="630" y="132" width="200" height="66" rx="7" fill="#0e1a26" stroke="#4080c0" stroke-width="2"/>
  <text x="730" y="156" text-anchor="middle" font-size="12.5" fill="#bfe0ff" font-weight="bold">容器A · eth0</text>
  <text x="730" y="178" text-anchor="middle" font-size="10.5" fill="#88c0ff">172.17.0.2(net ns)</text>
  <rect x="890" y="132" width="200" height="66" rx="7" fill="#0e1a26" stroke="#4080c0" stroke-width="2"/>
  <text x="990" y="156" text-anchor="middle" font-size="12.5" fill="#bfe0ff" font-weight="bold">容器B · eth0</text>
  <text x="990" y="178" text-anchor="middle" font-size="10.5" fill="#88c0ff">172.17.0.3(net ns)</text>

  <!-- ===== Level 2: pipe shaft / veth+bridge ===== -->
  <rect x="120" y="244" width="340" height="64" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="2"/>
  <text x="290" y="270" text-anchor="middle" font-size="12.5" fill="#ffaa55" font-weight="bold">楼内管道井 + 交换机</text>
  <text x="290" y="292" text-anchor="middle" font-size="10" fill="#c89868">两户互通走这里,不出楼</text>
  <line x1="170" y1="198" x2="240" y2="242" stroke="#c08040" stroke-width="1.6"/>
  <line x1="410" y1="198" x2="340" y2="242" stroke="#c08040" stroke-width="1.6"/>

  <rect x="630" y="244" width="460" height="64" rx="7" fill="#13251a" stroke="#40c060" stroke-width="2"/>
  <text x="860" y="266" text-anchor="middle" font-size="12" fill="#88ff88" font-weight="bold">veth pair(管子两头) + docker0 bridge(交换机)</text>
  <text x="860" y="286" text-anchor="middle" font-size="10" fill="#7fd99f">同网桥 172.17.0.0/16 → 容器间二层直通,不出宿主</text>
  <line x1="730" y1="198" x2="780" y2="242" stroke="#40c060" stroke-width="1.6"/>
  <line x1="990" y1="198" x2="940" y2="242" stroke="#40c060" stroke-width="1.6"/>

  <!-- ===== Level 3: city main / NAT ===== -->
  <rect x="120" y="350" width="340" height="64" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="2"/>
  <text x="290" y="376" text-anchor="middle" font-size="12.5" fill="#ffaa55" font-weight="bold">接市政的总阀门</text>
  <text x="290" y="398" text-anchor="middle" font-size="10" fill="#c89868">出楼的水都改记到"总表"名下</text>
  <line x1="290" y1="308" x2="290" y2="348" stroke="#c08040" stroke-width="1.6" marker-end="url(#wm)"/>

  <rect x="630" y="350" width="460" height="64" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="2"/>
  <text x="860" y="372" text-anchor="middle" font-size="11.5" fill="#ffaa55" font-weight="bold">iptables NAT(MASQUERADE)+ 宿主 eth0</text>
  <text x="860" y="392" text-anchor="middle" font-size="8.8" fill="#c89868">-t nat -A POSTROUTING -s 172.17.0.0/16 ! -o docker0 -j MASQUERADE</text>
  <text x="860" y="406" text-anchor="middle" font-size="9.5" fill="#9a8868">出宿主时把容器私网 IP 改写成宿主 IP</text>
  <line x1="860" y1="308" x2="860" y2="348" stroke="#40c060" stroke-width="1.6" marker-end="url(#wmg)"/>

  <!-- ===== Level 4: outside / internet ===== -->
  <rect x="190" y="456" width="200" height="46" rx="23" fill="#161a20" stroke="#4a5568" stroke-width="1.5"/>
  <text x="290" y="484" text-anchor="middle" font-size="12" fill="#aab6c4">外面的世界</text>
  <line x1="290" y1="414" x2="290" y2="454" stroke="#c08040" stroke-width="1.6" marker-end="url(#wm)"/>
  <rect x="760" y="456" width="200" height="46" rx="23" fill="#161a20" stroke="#4a5568" stroke-width="1.5"/>
  <text x="860" y="484" text-anchor="middle" font-size="12" fill="#aab6c4">外网 / Internet</text>
  <line x1="860" y1="414" x2="860" y2="454" stroke="#40c060" stroke-width="1.6" marker-end="url(#wmg)"/>

  <!-- mapping arrows across divider -->
  <line x1="462" y1="276" x2="628" y2="276" stroke="#8a96a4" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#wm)"/>
  <line x1="462" y1="382" x2="628" y2="382" stroke="#8a96a4" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#wm)"/>

  <!-- bottom one-liner -->
  <rect x="110" y="524" width="980" height="56" rx="9" fill="#11161d" stroke="#c08040" stroke-width="1.6"/>
  <text x="600" y="546" text-anchor="middle" font-size="13" fill="#ffc48a" font-weight="bold">隔离 = 每户自己的水表/门牌(net ns);楼内互通 = 管道井+交换机(veth+bridge);出楼 = 市政总阀门改记总表(NAT)。</text>
  <text x="600" y="566" text-anchor="middle" font-size="10.5" fill="#c8a878">"隔离"和"互通"从来是一件事的两面:先用 net ns 关起来,再用 veth/bridge/NAT 选择性接回去。</text>

  <!-- legend -->
  <text x="600" y="606" text-anchor="middle" font-size="11" fill="#6a7684">绿=宿主侧网络基础设施(bridge/NAT/host eth0) · 蓝=容器侧(eth0/net ns) · 橙="接口/阀门"环节</text>
</svg>
