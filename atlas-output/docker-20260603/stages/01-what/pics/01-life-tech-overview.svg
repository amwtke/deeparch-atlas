<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 660" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="om" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#8a96a4"/>
    </marker>
  </defs>
  <rect width="1200" height="660" fill="#0a0c10"/>

  <text x="600" y="38" text-anchor="middle" font-size="25" fill="#e8eef5" font-weight="bold">生活 ↔ 技术 总览:一栋"容器大楼",就是一台主机</text>
  <text x="600" y="63" text-anchor="middle" font-size="13" fill="#7a8694">左边每个画面,右边都有一个精确的技术对应物。共用的地基,就是共用的内核</text>

  <line x1="600" y1="84" x2="600" y2="560" stroke="#2a3340" stroke-width="1.5" stroke-dasharray="4,5"/>
  <text x="300" y="108" text-anchor="middle" font-size="17" fill="#ffd28a" font-weight="bold">🏠 生活:一栋合租楼</text>
  <text x="900" y="108" text-anchor="middle" font-size="17" fill="#88c0ff" font-weight="bold">⚙ 技术:一台 Linux 主机</text>

  <!-- ===== LIFE: building ===== -->
  <!-- room A -->
  <rect x="120" y="130" width="360" height="110" rx="6" fill="#16120a" stroke="#c08040" stroke-width="2.4"/>
  <text x="146" y="151" font-size="11" fill="#ffaa55">隔墙(看不到邻居)</text>
  <circle cx="180" cy="195" r="14" fill="#2a1c0c" stroke="#c08040" stroke-width="1.5"/>
  <text x="180" y="200" text-anchor="middle" font-size="12" fill="#ffc88a">人</text>
  <rect x="215" y="182" width="26" height="24" rx="3" fill="#2a1c0c" stroke="#c08040" stroke-width="1.5"/>
  <text x="228" y="199" text-anchor="middle" font-size="11" fill="#ffc88a">⚙</text>
  <text x="320" y="190" font-size="11" fill="#d2b48c">车间A:工人+机器</text>
  <text x="320" y="208" font-size="10" fill="#9a8868">(造铅笔)</text>
  <rect x="450" y="160" width="20" height="60" rx="2" fill="#3a2410" stroke="#c08040" stroke-width="1.4"/>
  <text x="460" y="232" text-anchor="middle" font-size="9" fill="#ffaa55">水电表</text>

  <!-- room B -->
  <rect x="120" y="258" width="360" height="110" rx="6" fill="#16120a" stroke="#c08040" stroke-width="2.4"/>
  <circle cx="180" cy="320" r="14" fill="#2a1c0c" stroke="#c08040" stroke-width="1.5"/>
  <text x="180" y="325" text-anchor="middle" font-size="12" fill="#ffc88a">人</text>
  <rect x="215" y="307" width="26" height="24" rx="3" fill="#2a1c0c" stroke="#c08040" stroke-width="1.5"/>
  <text x="228" y="324" text-anchor="middle" font-size="11" fill="#ffc88a">⚙</text>
  <text x="320" y="315" font-size="11" fill="#d2b48c">车间B:工人+机器</text>
  <text x="320" y="333" font-size="10" fill="#9a8868">(造橡皮)</text>
  <rect x="450" y="288" width="20" height="60" rx="2" fill="#3a2410" stroke="#c08040" stroke-width="1.4"/>
  <text x="460" y="360" text-anchor="middle" font-size="9" fill="#ffaa55">水电表</text>

  <!-- foundation -->
  <rect x="120" y="386" width="360" height="60" rx="6" fill="#1e5f3a" stroke="#40c060" stroke-width="2.2"/>
  <text x="300" y="412" text-anchor="middle" font-size="13" fill="#88ff88" font-weight="bold">大楼地基 / 承重墙 / 主管道</text>
  <text x="300" y="431" text-anchor="middle" font-size="10.5" fill="#7fd99f">全楼共用 —— 这是"合住"的根</text>

  <!-- ===== TECH: host ===== -->
  <!-- container A -->
  <rect x="720" y="130" width="360" height="110" rx="6" fill="#0e1a26" stroke="#c08040" stroke-width="2.4"/>
  <text x="746" y="151" font-size="11" fill="#ffaa55">namespace(隔离视图)</text>
  <rect x="760" y="170" width="150" height="44" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="835" y="190" text-anchor="middle" font-size="12" fill="#bfe0ff">容器A 进程</text>
  <text x="835" y="206" text-anchor="middle" font-size="10" fill="#88c0ff">nginx + libs</text>
  <rect x="930" y="170" width="130" height="44" rx="6" fill="#3a2410" stroke="#c08040" stroke-width="1.6"/>
  <text x="995" y="190" text-anchor="middle" font-size="10.5" fill="#ffaa55">cgroup</text>
  <text x="995" y="206" text-anchor="middle" font-size="9" fill="#c89868">cpu/mem 配额</text>

  <!-- container B -->
  <rect x="720" y="258" width="360" height="110" rx="6" fill="#0e1a26" stroke="#c08040" stroke-width="2.4"/>
  <rect x="760" y="298" width="150" height="44" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.8"/>
  <text x="835" y="318" text-anchor="middle" font-size="12" fill="#bfe0ff">容器B 进程</text>
  <text x="835" y="334" text-anchor="middle" font-size="10" fill="#88c0ff">java + libs</text>
  <rect x="930" y="298" width="130" height="44" rx="6" fill="#3a2410" stroke="#c08040" stroke-width="1.6"/>
  <text x="995" y="318" text-anchor="middle" font-size="10.5" fill="#ffaa55">cgroup</text>
  <text x="995" y="334" text-anchor="middle" font-size="9" fill="#c89868">cpu/mem 配额</text>

  <!-- kernel -->
  <rect x="720" y="386" width="360" height="60" rx="6" fill="#1e5f3a" stroke="#40c060" stroke-width="2.2"/>
  <text x="900" y="412" text-anchor="middle" font-size="13" fill="#88ff88" font-weight="bold">宿主机 Linux 内核(共用那一个)</text>
  <text x="900" y="431" text-anchor="middle" font-size="10.5" fill="#7fd99f">ns / cgroups / overlayfs 全由它提供</text>

  <!-- mapping arrows -->
  <line x1="482" y1="185" x2="718" y2="185" stroke="#8a96a4" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#om)"/>
  <line x1="482" y1="313" x2="718" y2="313" stroke="#8a96a4" stroke-width="1.4" stroke-dasharray="5,4" marker-end="url(#om)"/>
  <line x1="482" y1="416" x2="718" y2="416" stroke="#40c060" stroke-width="1.8" stroke-dasharray="5,4" marker-end="url(#om)"/>

  <!-- mapping legend table -->
  <rect x="120" y="474" width="960" height="92" rx="8" fill="#0d1117" stroke="#2a3340" stroke-width="1.2"/>
  <text x="135" y="495" font-size="12.5" fill="#e8eef5" font-weight="bold">逐项映射:</text>
  <text x="150" y="517" font-size="11.5" fill="#d2b48c">车间 / 一套房</text>
  <text x="330" y="517" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="360" y="517" font-size="11.5" fill="#88c0ff">一个容器(进程)</text>
  <text x="150" y="539" font-size="11.5" fill="#d2b48c">工人 + 机器</text>
  <text x="330" y="539" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="360" y="539" font-size="11.5" fill="#88c0ff">应用 + 自带依赖 libs</text>
  <text x="150" y="561" font-size="11.5" fill="#d2b48c">隔墙</text>
  <text x="330" y="561" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="360" y="561" font-size="11.5" fill="#ffaa55">namespace</text>
  <text x="620" y="517" font-size="11.5" fill="#d2b48c">水电表</text>
  <text x="800" y="517" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="830" y="517" font-size="11.5" fill="#ffaa55">cgroups(配额)</text>
  <text x="620" y="539" font-size="11.5" fill="#d2b48c">室内装修</text>
  <text x="800" y="539" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="830" y="539" font-size="11.5" fill="#88ffbb">overlayfs 根</text>
  <text x="620" y="561" font-size="11.5" fill="#d2b48c">大楼地基</text>
  <text x="800" y="561" font-size="11.5" fill="#8a96a4">↔</text>
  <text x="830" y="561" font-size="11.5" fill="#88ff88" font-weight="bold">共用内核(本质)</text>

  <!-- bottom one-liner -->
  <rect x="160" y="592" width="880" height="48" rx="9" fill="#11161d" stroke="#c08040" stroke-width="1.6"/>
  <text x="600" y="613" text-anchor="middle" font-size="13.5" fill="#ffc48a" font-weight="bold">合租楼 = 共用一套地基,各家关起门过日子;主机 = 共用一个内核,各容器关起门跑进程。</text>
  <text x="600" y="632" text-anchor="middle" font-size="11" fill="#c8a878">"独门独院的别墅"才是虚拟机 —— 那才自带地基(自带内核)。</text>
</svg>
