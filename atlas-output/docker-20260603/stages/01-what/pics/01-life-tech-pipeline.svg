<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="pm" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#8a96a4"/>
    </marker>
    <marker id="pmp" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c088ff"/>
    </marker>
    <marker id="pmo" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#c08040"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#0a0c10"/>

  <text x="600" y="38" text-anchor="middle" font-size="25" fill="#e8eef5" font-weight="bold">出生流水线 = 物业接单 → 派工 → 砌墙队(撤场)+ 楼管(留守)</text>
  <text x="600" y="63" text-anchor="middle" font-size="13" fill="#7a8694">左:你不自己砌墙,层层外包;右:docker → dockerd → containerd → runc/shim 的真实接力</text>

  <line x1="580" y1="84" x2="580" y2="592" stroke="#2a3340" stroke-width="1.5" stroke-dasharray="4,5"/>
  <text x="300" y="108" text-anchor="middle" font-size="17" fill="#ffd28a" font-weight="bold">🏠 生活:物业接力</text>
  <text x="880" y="108" text-anchor="middle" font-size="17" fill="#c088ff" font-weight="bold">⚙ 技术:守护进程接力</text>

  <!-- LEFT flow -->
  <rect x="140" y="124" width="300" height="50" rx="7" fill="#16120a" stroke="#c08040" stroke-width="1.8"/>
  <text x="290" y="154" text-anchor="middle" font-size="12" fill="#ffc88a">业主填单:要一间造铅笔车间</text>
  <rect x="140" y="196" width="300" height="50" rx="7" fill="#16120a" stroke="#c08040" stroke-width="1.8"/>
  <text x="290" y="226" text-anchor="middle" font-size="12" fill="#ffc88a">物业前台:接单登记</text>
  <rect x="140" y="268" width="300" height="50" rx="7" fill="#16120a" stroke="#c08040" stroke-width="1.8"/>
  <text x="290" y="298" text-anchor="middle" font-size="12" fill="#ffc88a">物业调度中心:派工</text>
  <rect x="60" y="356" width="225" height="70" rx="7" fill="#1a1206" stroke="#c08040" stroke-width="2"/>
  <text x="172" y="380" text-anchor="middle" font-size="12" fill="#ffaa55" font-weight="bold">砌墙施工队</text>
  <text x="172" y="400" text-anchor="middle" font-size="10" fill="#c89868">来砌墙,砌完就撤场</text>
  <text x="172" y="416" text-anchor="middle" font-size="9.5" fill="#9a8868">↩ 干完即走</text>
  <rect x="300" y="356" width="240" height="70" rx="7" fill="#16120a" stroke="#c08040" stroke-width="2"/>
  <text x="420" y="380" text-anchor="middle" font-size="12" fill="#ffc88a" font-weight="bold">楼管</text>
  <text x="420" y="400" text-anchor="middle" font-size="10" fill="#d2b48c">常驻,看着这间车间</text>
  <text x="420" y="416" text-anchor="middle" font-size="9.5" fill="#9a8868">施工队走后接手</text>
  <rect x="140" y="452" width="300" height="50" rx="7" fill="#16120a" stroke="#c08040" stroke-width="1.8"/>
  <text x="290" y="482" text-anchor="middle" font-size="12" fill="#ffc88a">车间开张:工人进场造铅笔</text>

  <line x1="290" y1="174" x2="290" y2="194" stroke="#c08040" stroke-width="1.6" marker-end="url(#pmo)"/>
  <line x1="290" y1="246" x2="290" y2="266" stroke="#c08040" stroke-width="1.6" marker-end="url(#pmo)"/>
  <line x1="290" y1="318" x2="220" y2="354" stroke="#c08040" stroke-width="1.6" marker-end="url(#pmo)"/>
  <line x1="290" y1="318" x2="400" y2="354" stroke="#c08040" stroke-width="1.6" marker-end="url(#pmo)"/>
  <line x1="172" y1="426" x2="270" y2="452" stroke="#c08040" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="420" y1="426" x2="330" y2="452" stroke="#c08040" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- RIGHT flow -->
  <rect x="660" y="124" width="340" height="50" rx="7" fill="#1f1133" stroke="#8040c0" stroke-width="1.8"/>
  <text x="830" y="154" text-anchor="middle" font-size="12" fill="#c088ff">$ docker run -d nginx</text>
  <rect x="660" y="196" width="430" height="50" rx="7" fill="#1f1133" stroke="#8040c0" stroke-width="1.8"/>
  <text x="875" y="220" text-anchor="middle" font-size="12" fill="#c088ff" font-weight="bold">dockerd</text>
  <text x="875" y="237" text-anchor="middle" font-size="9.5" fill="#a888d0">REST · /var/run/docker.sock</text>
  <rect x="660" y="268" width="430" height="50" rx="7" fill="#1f1133" stroke="#8040c0" stroke-width="1.8"/>
  <text x="875" y="292" text-anchor="middle" font-size="12" fill="#c088ff" font-weight="bold">containerd</text>
  <text x="875" y="309" text-anchor="middle" font-size="9.5" fill="#a888d0">gRPC · /run/containerd/containerd.sock</text>
  <rect x="635" y="356" width="245" height="70" rx="7" fill="#2a1648" stroke="#8040c0" stroke-width="2.4"/>
  <text x="757" y="378" text-anchor="middle" font-size="12" fill="#c088ff" font-weight="bold">runc</text>
  <text x="757" y="396" text-anchor="middle" font-size="8.6" fill="#ffaa55">clone(CLONE_NEW*) + cgroups + pivot_root</text>
  <text x="757" y="412" text-anchor="middle" font-size="9.5" fill="#a070d0">↩ 砌完 exit(用完即退)</text>
  <rect x="895" y="356" width="235" height="70" rx="7" fill="#1f1133" stroke="#8040c0" stroke-width="2"/>
  <text x="1012" y="378" text-anchor="middle" font-size="11.5" fill="#c088ff" font-weight="bold">containerd-shim</text>
  <text x="1012" y="397" text-anchor="middle" font-size="9.5" fill="#a888d0">常驻,收养容器</text>
  <text x="1012" y="413" text-anchor="middle" font-size="9" fill="#8a96a4">重启 dockerd 容器不死</text>
  <rect x="660" y="452" width="430" height="50" rx="7" fill="#142838" stroke="#4080c0" stroke-width="1.8"/>
  <text x="875" y="482" text-anchor="middle" font-size="12" fill="#88c0ff" font-weight="bold">容器进程 PID 1 · nginx</text>

  <line x1="830" y1="174" x2="830" y2="194" stroke="#8040c0" stroke-width="1.6" marker-end="url(#pmp)"/>
  <text x="990" y="189" font-size="8.5" fill="#7a6090">REST</text>
  <line x1="875" y1="246" x2="875" y2="266" stroke="#8040c0" stroke-width="1.6" marker-end="url(#pmp)"/>
  <text x="1010" y="261" font-size="8.5" fill="#7a6090">gRPC</text>
  <line x1="875" y1="318" x2="757" y2="354" stroke="#8040c0" stroke-width="1.6" marker-end="url(#pmp)"/>
  <line x1="875" y1="318" x2="1012" y2="354" stroke="#8040c0" stroke-width="1.6" marker-end="url(#pmp)"/>
  <text x="760" y="340" font-size="8.5" fill="#7a6090">fork+exec runc</text>
  <line x1="757" y1="426" x2="850" y2="452" stroke="#4080c0" stroke-width="1.4" stroke-dasharray="4,3"/>
  <line x1="1012" y1="426" x2="920" y2="452" stroke="#8040c0" stroke-width="1.4" stroke-dasharray="4,3"/>

  <!-- mapping arrows across divider -->
  <line x1="442" y1="149" x2="658" y2="149" stroke="#8a96a4" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#pm)"/>
  <line x1="442" y1="221" x2="658" y2="221" stroke="#8a96a4" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#pm)"/>
  <line x1="442" y1="293" x2="658" y2="293" stroke="#8a96a4" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#pm)"/>
  <line x1="287" y1="391" x2="633" y2="391" stroke="#8a96a4" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#pm)"/>
  <line x1="542" y1="391" x2="893" y2="391" stroke="#8a96a4" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#pm)"/>

  <!-- bottom one-liner -->
  <rect x="110" y="524" width="980" height="56" rx="9" fill="#11161d" stroke="#c08040" stroke-width="1.6"/>
  <text x="600" y="546" text-anchor="middle" font-size="13" fill="#ffc48a" font-weight="bold">你不自己砌墙,层层外包;真正动手的 runc 砌完就撤场,留下常驻的 shim 看店。</text>
  <text x="600" y="566" text-anchor="middle" font-size="10.5" fill="#c8a878">所以"重启 dockerd 容器不死":容器的命挂在 shim(楼管)身上,不挂在 dockerd(物业总部)身上。</text>

  <text x="600" y="606" text-anchor="middle" font-size="11" fill="#6a7684">紫=运行时守护进程链 · 橙="施工/接口/接单"环节 · 蓝=最终容器进程</text>
</svg>
