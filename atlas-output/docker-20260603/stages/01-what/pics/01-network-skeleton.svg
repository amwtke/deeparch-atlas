<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" font-family="JetBrains Mono, Consolas, monospace">
  <defs>
    <marker id="nb" markerWidth="11" markerHeight="11" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#40c060"/>
    </marker>
    <marker id="nbb" markerWidth="11" markerHeight="11" refX="4" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#40c060"/>
    </marker>
  </defs>

  <rect width="1200" height="680" fill="#0a0c10"/>

  <text x="600" y="40" text-anchor="middle" font-size="26" fill="#e8eef5" font-weight="bold">网络:隔离与互通是同一个故事的两面</text>
  <text x="600" y="66" text-anchor="middle" font-size="13.5" fill="#7a8694">net namespace 把每个容器的网络栈关进小黑屋;veth pair + bridge 再给它接一根网线出来</text>

  <!-- ====== Container A ====== -->
  <rect x="110" y="100" width="320" height="150" rx="12" fill="none" stroke="#c08040" stroke-width="2.2" stroke-dasharray="8,5"/>
  <text x="270" y="92" text-anchor="middle" font-size="12" fill="#ffaa55">容器 A 的 net namespace(自带网卡 / 路由表 / iptables)</text>
  <rect x="135" y="120" width="270" height="50" rx="7" fill="#142838" stroke="#4080c0" stroke-width="1.8"/>
  <text x="270" y="150" text-anchor="middle" font-size="14" fill="#88c0ff" font-weight="bold">容器 A  (nginx)</text>
  <rect x="170" y="186" width="200" height="44" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.6"/>
  <text x="270" y="205" text-anchor="middle" font-size="12.5" fill="#bfe0ff">eth0</text>
  <text x="270" y="222" text-anchor="middle" font-size="11.5" fill="#88c0ff">172.17.0.2</text>

  <!-- ====== Container B ====== -->
  <rect x="770" y="100" width="320" height="150" rx="12" fill="none" stroke="#c08040" stroke-width="2.2" stroke-dasharray="8,5"/>
  <text x="930" y="92" text-anchor="middle" font-size="12" fill="#ffaa55">容器 B 的 net namespace(各自独立,互相看不见)</text>
  <rect x="795" y="120" width="270" height="50" rx="7" fill="#142838" stroke="#4080c0" stroke-width="1.8"/>
  <text x="930" y="150" text-anchor="middle" font-size="14" fill="#88c0ff" font-weight="bold">容器 B  (java)</text>
  <rect x="830" y="186" width="200" height="44" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="1.6"/>
  <text x="930" y="205" text-anchor="middle" font-size="12.5" fill="#bfe0ff">eth0</text>
  <text x="930" y="222" text-anchor="middle" font-size="11.5" fill="#88c0ff">172.17.0.3</text>

  <!-- veth host ends -->
  <rect x="195" y="300" width="150" height="42" rx="6" fill="#173b2a" stroke="#40c060" stroke-width="1.6"/>
  <text x="270" y="319" text-anchor="middle" font-size="11.5" fill="#88ffbb">veth-a</text>
  <text x="270" y="335" text-anchor="middle" font-size="9.5" fill="#7fd99f">(host 端)</text>
  <rect x="855" y="300" width="150" height="42" rx="6" fill="#173b2a" stroke="#40c060" stroke-width="1.6"/>
  <text x="930" y="319" text-anchor="middle" font-size="11.5" fill="#88ffbb">veth-b</text>
  <text x="930" y="335" text-anchor="middle" font-size="9.5" fill="#7fd99f">(host 端)</text>

  <!-- veth pair "cable": container eth0 <-> host veth -->
  <line x1="270" y1="230" x2="270" y2="298" stroke="#4080c0" stroke-width="2.4"/>
  <line x1="930" y1="230" x2="930" y2="298" stroke="#4080c0" stroke-width="2.4"/>
  <text x="300" y="270" font-size="10" fill="#7fa8cc">veth pair</text>
  <text x="300" y="284" font-size="9" fill="#5f7488">一根虚拟网线两头</text>
  <text x="960" y="270" font-size="10" fill="#7fa8cc">veth pair</text>

  <!-- ====== docker0 bridge ====== -->
  <rect x="360" y="392" width="480" height="60" rx="9" fill="#1e5f3a" stroke="#40c060" stroke-width="2.4"/>
  <text x="600" y="416" text-anchor="middle" font-size="15" fill="#88ff88" font-weight="bold">docker0  bridge(虚拟交换机)</text>
  <text x="600" y="437" text-anchor="middle" font-size="11.5" fill="#7fd99f">网关 172.17.0.1 · 同一网桥上的容器天然同网段,二层直接互通</text>

  <!-- veth -> bridge -->
  <line x1="270" y1="342" x2="430" y2="390" stroke="#40c060" stroke-width="2" marker-end="url(#nb)"/>
  <line x1="930" y1="342" x2="770" y2="390" stroke="#40c060" stroke-width="2" marker-end="url(#nb)"/>

  <!-- A <-> B talk path (curved, via bridge) -->
  <path d="M 270 175 C 270 60, 930 60, 930 175" fill="none" stroke="#c088ff" stroke-width="1.8" stroke-dasharray="6,4"/>
  <text x="600" y="48" text-anchor="middle" font-size="11.5" fill="#c088ff">A 找 B:包从 eth0 → veth-a → docker0 → veth-b → B.eth0(全程不出宿主机)</text>

  <!-- ====== host stack: eth0 + NAT ====== -->
  <rect x="430" y="498" width="340" height="56" rx="8" fill="#11161d" stroke="#c08040" stroke-width="1.8"/>
  <text x="600" y="520" text-anchor="middle" font-size="12.5" fill="#ffaa55" font-weight="bold">iptables NAT(MASQUERADE / SNAT)</text>
  <text x="600" y="539" text-anchor="middle" font-size="10.5" fill="#c89868">出宿主时把容器私网 IP 改写成宿主 IP</text>
  <line x1="600" y1="452" x2="600" y2="496" stroke="#40c060" stroke-width="2" marker-end="url(#nb)"/>

  <rect x="470" y="576" width="260" height="48" rx="7" fill="#173b2a" stroke="#40c060" stroke-width="1.8"/>
  <text x="600" y="597" text-anchor="middle" font-size="12.5" fill="#88ff88" font-weight="bold">宿主 eth0  192.168.1.10</text>
  <text x="600" y="614" text-anchor="middle" font-size="10.5" fill="#7fd99f">真正连物理网络的那块网卡</text>
  <line x1="600" y1="554" x2="600" y2="574" stroke="#40c060" stroke-width="2" marker-end="url(#nb)"/>

  <!-- internet -->
  <rect x="500" y="642" width="200" height="30" rx="15" fill="#161a20" stroke="#4a5568" stroke-width="1.4"/>
  <text x="600" y="662" text-anchor="middle" font-size="12" fill="#aab6c4">外部网络 / Internet</text>
  <line x1="600" y1="624" x2="600" y2="640" stroke="#40c060" stroke-width="1.8" marker-end="url(#nb)"/>

  <!-- side annotations -->
  <rect x="40" y="392" width="300" height="120" rx="8" fill="#241808" stroke="#7a5a2a" stroke-width="1.3"/>
  <text x="55" y="414" font-size="13" fill="#ffaa55" font-weight="bold">隔离(net namespace)</text>
  <text x="55" y="436" font-size="11" fill="#c89868">每个容器有自己独立的:</text>
  <text x="55" y="456" font-size="11" fill="#c89868">· 网卡(看不到宿主的真网卡)</text>
  <text x="55" y="474" font-size="11" fill="#c89868">· IP / 路由表 / iptables</text>
  <text x="55" y="492" font-size="11" fill="#c89868">· 端口空间(容器里的 80 ≠ 宿主 80)</text>

  <rect x="860" y="476" width="310" height="120" rx="8" fill="#0e1a12" stroke="#2a7a44" stroke-width="1.3"/>
  <text x="875" y="498" font-size="13" fill="#88ff88" font-weight="bold">互通(veth + bridge)</text>
  <text x="875" y="520" font-size="11" fill="#7fd99f">· veth pair:一头在容器,一头在宿主</text>
  <text x="875" y="538" font-size="11" fill="#7fd99f">· bridge:把所有 veth 插在一起的交换机</text>
  <text x="875" y="556" font-size="11" fill="#7fd99f">· 容器间:同网桥 → 直接通</text>
  <text x="875" y="574" font-size="11" fill="#7fd99f">· 容器到外网:经 NAT 改写源 IP</text>

  <!-- legend -->
  <rect x="40" y="100" width="56" height="56" rx="6" fill="#0d1117" stroke="#2a3340" stroke-width="1"/>
  <rect x="48" y="110" width="12" height="12" rx="2" fill="#1e3a5f" stroke="#4080c0"/>
  <rect x="48" y="126" width="12" height="12" rx="2" fill="#1e5f3a" stroke="#40c060"/>
  <rect x="48" y="142" width="12" height="12" rx="2" fill="none" stroke="#c08040" stroke-dasharray="3,2"/>
</svg>
