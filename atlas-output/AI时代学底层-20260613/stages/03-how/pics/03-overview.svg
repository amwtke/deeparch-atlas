<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1200" height="600" fill="#0a0c10"/>

  <text x="600" y="42" fill="#e6edf3" font-size="23" text-anchor="middle" font-weight="bold">一张图谱，用三次：底层认知 → 参照系 → 驾驭 AI</text>

  <!-- the reference graph node = 底层认知（技术 + 需求） -->
  <rect x="390" y="78" width="420" height="86" rx="10" fill="#3a1e5f" stroke="#8040c0" stroke-width="2.5"/>
  <text x="600" y="116" fill="#c088ff" font-size="19" text-anchor="middle" font-weight="bold">底层认知：技术 + 需求</text>
  <text x="600" y="143" fill="#a878d8" font-size="13" text-anchor="middle">＝ 你的「尺子」（参照系 · 非八股）</text>

  <!-- three dashed arrows from cognition to the three touchpoints -->
  <line x1="500" y1="164" x2="200" y2="396" stroke="#8040c0" stroke-width="1.6" stroke-dasharray="6,4"/>
  <line x1="600" y1="164" x2="420" y2="396" stroke="#8040c0" stroke-width="1.6" stroke-dasharray="6,4"/>
  <line x1="710" y1="164" x2="920" y2="396" stroke="#8040c0" stroke-width="1.6" stroke-dasharray="6,4"/>
  <text x="320" y="272" fill="#c088ff" font-size="13" text-anchor="middle">① 消化</text>
  <text x="535" y="272" fill="#c088ff" font-size="13" text-anchor="middle">② 掌舵</text>
  <text x="835" y="272" fill="#c088ff" font-size="13" text-anchor="middle">③ 验证</text>

  <!-- pipeline -->
  <rect x="65"  y="398" width="220" height="78" rx="8" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="175" y="430" fill="#88ff88" font-size="15" text-anchor="middle">① 理解需求底层逻辑</text>
  <text x="175" y="453" fill="#5fa87a" font-size="12" text-anchor="middle">把模糊 → 精确</text>

  <rect x="320" y="398" width="200" height="78" rx="8" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="420" y="430" fill="#88ff88" font-size="16" text-anchor="middle">② 架构师思维</text>
  <text x="420" y="453" fill="#5fa87a" font-size="12" text-anchor="middle">分层 + 掌舵方案</text>

  <rect x="560" y="398" width="170" height="78" rx="8" fill="#1e3a5f" stroke="#4080c0" stroke-width="2.5"/>
  <text x="645" y="442" fill="#88c0ff" font-size="16" text-anchor="middle" font-weight="bold">AI 生成</text>

  <rect x="770" y="398" width="310" height="78" rx="8" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="925" y="430" fill="#88ff88" font-size="16" text-anchor="middle">③ 对账验证 + 兜底</text>
  <text x="925" y="453" fill="#5fa87a" font-size="12" text-anchor="middle">幻觉 / 劣解 量出来</text>

  <text x="302" y="443" fill="#8b949e" font-size="22" text-anchor="middle">→</text>
  <text x="540" y="443" fill="#8b949e" font-size="22" text-anchor="middle">→</text>
  <text x="750" y="443" fill="#8b949e" font-size="22" text-anchor="middle">→</text>

  <!-- info-theory caption -->
  <rect x="110" y="508" width="980" height="62" rx="8" fill="#11161c" stroke="#30363d" stroke-width="1"/>
  <text x="600" y="533" fill="#c9d1d9" font-size="14" text-anchor="middle">信息论视角：驾驭 AI ＝ 用信息消除它的不确定性；</text>
  <text x="600" y="555" fill="#ffaa55" font-size="14" text-anchor="middle">而「什么是信息、什么是噪音」，要靠底层认知才分得清。</text>
</svg>
