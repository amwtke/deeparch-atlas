<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="JetBrains Mono, Consolas, monospace">
  <rect width="1200" height="600" fill="#0a0c10"/>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerUnits="strokeWidth" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
  </defs>

  <text x="600" y="32" text-anchor="middle" fill="#e0e0e0" font-size="20" font-weight="bold">11 条原则的尺度地图 —— 各管什么、什么时候用</text>
  <text x="600" y="55" text-anchor="middle" fill="#888" font-size="12">两个正交的轴 + 每个尺度对应的规则</text>

  <text x="80" y="92" fill="#e0e0e0" font-size="14" font-weight="bold">轴 1:打包粒度轴(物理 —— 代码怎么打包发布)</text>

  <rect x="80" y="108" width="280" height="55" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="2"/>
  <text x="220" y="133" text-anchor="middle" fill="#88c0ff" font-size="16" font-weight="bold">类</text>
  <text x="220" y="153" text-anchor="middle" fill="#88c0ff" font-size="11">(class)</text>

  <line x1="370" y1="135" x2="395" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="405" y="108" width="385" height="55" rx="6" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="597" y="133" text-anchor="middle" fill="#88ff88" font-size="16" font-weight="bold">组件</text>
  <text x="597" y="153" text-anchor="middle" fill="#88ff88" font-size="11">(jar / package / microservice)</text>

  <line x1="800" y1="135" x2="825" y2="135" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="835" y="108" width="285" height="55" rx="6" fill="#5f3a1e" stroke="#c08040" stroke-width="2"/>
  <text x="977" y="133" text-anchor="middle" fill="#ffaa55" font-size="16" font-weight="bold">系统</text>
  <text x="977" y="153" text-anchor="middle" fill="#ffaa55" font-size="11">(整个应用)</text>

  <text x="220" y="190" text-anchor="middle" fill="#88c0ff" font-size="13" font-weight="bold">适用 SOLID 5 条</text>
  <text x="220" y="208" text-anchor="middle" fill="#aaa" font-size="10">SRP / OCP / LSP / ISP / DIP</text>

  <text x="597" y="190" text-anchor="middle" fill="#88ff88" font-size="13" font-weight="bold">适用组件 6 条</text>
  <text x="597" y="208" text-anchor="middle" fill="#aaa" font-size="10">REP / CCP / CRP / ADP / SDP / SAP</text>

  <text x="977" y="190" text-anchor="middle" fill="#ffaa55" font-size="13" font-weight="bold">同心圆 + 依赖规则</text>
  <text x="977" y="208" text-anchor="middle" fill="#aaa" font-size="10">依赖箭头永远从外朝内</text>

  <line x1="80" y1="235" x2="1120" y2="235" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="80" y="262" fill="#e0e0e0" font-size="14" font-weight="bold">轴 2:架构关注点轴(逻辑 —— 代码在管哪类业务)</text>

  <rect x="80" y="278" width="220" height="55" rx="6" fill="#1e3a5f" stroke="#4080c0" stroke-width="2"/>
  <text x="190" y="303" text-anchor="middle" fill="#88c0ff" font-size="14" font-weight="bold">Entity</text>
  <text x="190" y="323" text-anchor="middle" fill="#88c0ff" font-size="10">企业业务规则</text>

  <line x1="305" y1="305" x2="330" y2="305" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="340" y="278" width="220" height="55" rx="6" fill="#1e5f3a" stroke="#40c060" stroke-width="2"/>
  <text x="450" y="303" text-anchor="middle" fill="#88ff88" font-size="14" font-weight="bold">Use Case</text>
  <text x="450" y="323" text-anchor="middle" fill="#88ff88" font-size="10">应用业务规则(流程)</text>

  <line x1="565" y1="305" x2="590" y2="305" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="600" y="278" width="220" height="55" rx="6" fill="#5f3a1e" stroke="#c08040" stroke-width="2"/>
  <text x="710" y="303" text-anchor="middle" fill="#ffaa55" font-size="14" font-weight="bold">Adapter</text>
  <text x="710" y="323" text-anchor="middle" fill="#ffaa55" font-size="10">翻译层 (HTTP/SQL ↔ 领域)</text>

  <line x1="825" y1="305" x2="850" y2="305" stroke="#888" stroke-width="2" marker-end="url(#arr)"/>

  <rect x="860" y="278" width="220" height="55" rx="6" fill="#3a1e5f" stroke="#8040c0" stroke-width="2"/>
  <text x="970" y="303" text-anchor="middle" fill="#c088ff" font-size="14" font-weight="bold">Framework</text>
  <text x="970" y="323" text-anchor="middle" fill="#c088ff" font-size="10">具体技术 (Spring / Oracle...)</text>

  <text x="600" y="358" text-anchor="middle" fill="#ff8888" font-size="11" font-style="italic">依赖箭头永远从外(右)朝内(左)—— 不论它在打包粒度轴的哪个位置</text>

  <line x1="80" y1="383" x2="1120" y2="383" stroke="#333" stroke-width="1" stroke-dasharray="4,3"/>

  <text x="600" y="408" text-anchor="middle" fill="#e0e0e0" font-size="14" font-weight="bold">两轴正交 —— 任何代码都同时在两轴上有位置</text>

  <rect x="80" y="426" width="510" height="155" rx="8" fill="#1a1a25" stroke="#444" stroke-width="1"/>
  <text x="335" y="451" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">例 1:你的 WorkOrder 类</text>
  <text x="100" y="481" fill="#88c0ff" font-size="11">• 打包粒度轴:位于"类" → 适用 SOLID</text>
  <text x="100" y="503" fill="#c088ff" font-size="11">• 架构关注点轴:位于"Entity" → 不依赖 Spring/MyBatis</text>
  <text x="100" y="546" fill="#aaa" font-size="11">→ 既要遵守 SOLID(类内部规则),</text>
  <text x="100" y="564" fill="#aaa" font-size="11">  又要遵守 Entity 层的依赖规则(同心圆)</text>

  <rect x="610" y="426" width="510" height="155" rx="8" fill="#1a1a25" stroke="#444" stroke-width="1"/>
  <text x="865" y="451" text-anchor="middle" fill="#e0e0e0" font-size="13" font-weight="bold">例 2:你的 dispatch-workflow.jar 组件</text>
  <text x="630" y="481" fill="#88ff88" font-size="11">• 打包粒度轴:位于"组件" → 适用组件 6 条</text>
  <text x="630" y="503" fill="#c088ff" font-size="11">• 架构关注点轴:位于"Use Case" → 调 Entity 接口,不知 Adapter</text>
  <text x="630" y="546" fill="#aaa" font-size="11">→ 既要遵守组件 6 条(REP/CCP/CRP/ADP/SDP/SAP),</text>
  <text x="630" y="564" fill="#aaa" font-size="11">  又要遵守 Use Case 层的依赖规则(同心圆)</text>
</svg>
