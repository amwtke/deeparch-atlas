# 《架构整洁之道》| atlas 综合长文

> Bob 大叔(Robert C. Martin)2017 年这本书的设计哲学与可落地方法 —— 7 阶段第一性原理拆解 + 2024 AI 时代命运转折的完整论证。

## 导读地图

本文是关于 **Bob 大叔《架构整洁之道》** 的综合长文,围绕**第一性原理**展开,陪伴读者一个阶段一个阶段把这本书搞透。

**灵魂问题**(从 Discovery 收集):

> "完整理解《架构整洁之道》的设计哲学与可落地方法"

**覆盖阶段**:
- ✅ **What**(它是什么)—— 框架是配件 / SOLID 5 原则 / 组件 6 原则 / 同心圆 4 层 / 信创真实案例
- ✅ **Why**(为什么必须存在)—— C1~C5 5 条约束清单建立 + 屎山级联演化
- ✅ **How**(大致怎么工作)—— 同心圆 + Java 包映射 / 依赖向内而生 / 教科书派 vs 务实派
- ✅ **Origin**(它怎么来的)—— Bob 大叔合 4 套架构(Hexagonal/Onion/BCE/DCI)为同心圆 + 5 条人性短板 + 2 条组织/经济约束 + 社会性反转最终命题
- ✅ **Deep**(实操重构)—— 订单系统 α → β → γ 三步增量 + 内心戏 + 5 个难度落点
- ✅ **Comparison**(横向对照)—— Clean Arch vs DDD 同构/差异/选用建议 + 单体 vs 微服务 + DDD 失败 = 人性问题(Q&A)
- ✅ **Synthesis**(设计哲学与时代命运)—— AI 抹平 7 条约束 + 1968 以来软件工程最大利好 + 卓越从奢侈品变成默认

## 约束清单速查(C0~C5)

> 这 6 条约束是全文的脊梁。Why 阶段建立 C1~C5,Origin 阶段反向发现 C0(隐性元元约束)。后续每一节都引用这些约束,理解清楚再读后文。

#### C0 — 人不自律(Origin §7 反向发现的隐性元元约束)
方法论假设了"理性程序员",但人不自律 + 行业激励惩罚自律。
**口诀**:工具不解决人的问题,但 AI 时代第一次可能让 C0 在工程实践中失效

#### C1 — OCP 失败陷阱
新需求持续到来,加新需求常被迫改老代码 → 引入回归。
**口诀**:必须留扩展点

#### C2 — 技术栈/供应商不可控
技术栈和供应商的演化不在你控制中(政策、市场、信创)。
**口诀**:业务核心不依赖 framework

#### C3 — 复杂度涌现
系统复杂度增长时,"超级方法/超级类"必然涌现(除非架构对抗)。
**口诀**:必须主动对抗熵增

#### C4 — 测试反馈速度
测试反馈速度决定生产力("无 UT → 上线即调试" 自我强化负螺旋)。
**口诀**:核心必须快速可测

#### C5 — 改动代价 ∝ 波及面 (元约束)
改一处的代价跟波及面成正比。
**口诀**:控制波及面 = 控制总成本

# 阶段 1:《架构整洁之道》是什么

> **What 阶段的本分** —— 这是骨架认知。读完后,你能用一句话跟同事说清楚这本书在讲什么、长什么样,11 条原则各管什么事。**不深入机制、不讲历史、不展开源码** —— 那些是后面 Why / How / Origin / Deep 阶段的事。

---

## §1 一句话定义

> **业务核心独立于框架、数据库、UI —— 它们都是可替换的配件,依赖方向永远从外朝内。**

(28 字)

为什么这一句话就够 —— 它一次性给出三个关键命题:

1. **"业务核心"是主角** —— 你的"投诉 / 工单 / 派单流程"才是系统的灵魂,不是 Spring,不是 Oracle
2. **框架 / 数据库 / UI 是配件** —— BOB 大叔英文用 `detail`,意思是把它们**当成配件、不是主角**:就像汽车的**轮胎 / 音响 / 内饰**可以换品牌换型号,但**动力系统(发动机 / 变速箱 / 底盘)**这个核心毫不受影响
3. **依赖方向永远从外朝内** —— 整本书最硬的硬规矩,违反它的项目最终都会变成你眼前这种屎山

读完这一节剩下所有内容,都是在解释**这一句话的每一个字到底意味着什么**。

---

> 💡 **身份测试 —— 一把日常都能用的尺子**:
>
> **"如果换掉它,系统还是'同一个东西'吗?"**
>
> - 把电商系统的"订单业务规则"换了 —— 系统**不是**这个电商了 → **核心**(应该独立,不依赖任何技术)
> - 把电商系统从 Spring(Java)换成 FastAPI(Python)甚至换成 Go —— 业务规则还在,系统**还是**这个电商 → **配件**
>
> 把这把尺子套到任何一段代码上,问一句:**"换了它,这还是同一个产品吗?"**,回答 **NO = 核心**,**YES = 配件**。
>
> (这跟 BOB 大叔在原书第 5 章的核心论点 "Business rules ARE the system" 是同一句话的两种说法。)

---

> 🎯 **真实案例 —— 信创(国产化)把"框架是配件"变成法律级硬约束**:
>
> 当下中国软件行业的国产化转型(Oracle → 达梦 / 人大金仓;Spring Boot → 东方通 / 金蝶 Apusic;全套中间件换装),正在让所有有一定年纪的项目**集体被迫做一次"身份测试"**。
>
> | | 按 Clean Architecture 建的项目 | 业务核心被框架渗透的项目 |
> |---|---|---|
> | **Entity**(业务核心规则) | 0 改动 | 改:Spring/MyBatis 注解长在领域类上,换 Spring 等于改 Entity |
> | **Use Case**(应用流程) | 0 改动 | 改:流程方法直接调 Mapper,换 MyBatis 等于改流程 |
> | **Adapter**(适配层) | **全部重写**(工作量有边界、可估算) | 改:边界塌掉,改一处牵动十处 |
> | **Framework** | 全部换装(底盘切换) | 改:Oracle 方言 SQL 散落业务代码,满世界翻 |
> | **总代价** | ~10-20% 代码 | ~80-90% 代码 + 不可控风险 |
>
> **差距是 5-10 倍工作量**。这就是 BOB 大叔反复警告"框架是配件"的**工程经济价值** —— 不是哲学,是**真金白银的迁移代价**。
>
> 而 BOB 大叔自己 2017 年写书时,根本没想到中国会有"信创政策"这种**国家级硬约束**,直接把"也许有一天你想换框架"变成"必须换,而且是法律要求"。

## §2 跨领域类比 —— 把这套架构当成一个电商订单系统

(挑电商订单,因为"创建订单 / 查询 / 更新 / 取消"是几乎所有程序员第一天就熟的概念,而且**能直接示范**"业务规则不依赖任何具体技术"这个最关键的命题。)

电商订单系统里,从内到外也是四层:

| 层 | 是什么 | 关键属性 |
|---|---|---|
| **订单业务规则**(最里 = Entity) | "订单包含哪些字段"、"订单状态机(待支付/已支付/已发货/已完成/已取消)"、"订单总金额 = 商品单价 × 数量 - 优惠券"、"已发货的订单不能直接取消" | **不依赖任何技术** —— Java / .NET / Python 都能表达,MySQL / Oracle / MongoDB 都能存,前端用 React 还是 Vue 完全无关 |
| **订单流程**(Use Case) | "用户下单 → 校验库存 → 创建订单 → 调用支付 → 发货 → 完成" | 这些步骤跨电商平台**几乎相同**(淘宝 / 京东 / 拼多多核心流程一致),只在表单字段 / UI 样式 / 风控细节上略有差异 |
| **接口适配层**(Adapter) | REST Controller、订单 DTO、订单 Repository 的具体实现、Kafka 消息适配器 | **每家公司不同**(用 Spring 的、用 FastAPI 的、用 Express 的);但表达的内容一样 |
| **框架与基础设施**(Framework) | Spring Boot / .NET Core / Django / Express / MySQL / Oracle / Redis / Kafka | **每家公司、每个时代完全不同** —— 但订单业务规则不依赖于这些 |

**核心观察:依赖方向永远从外朝内** ——

- Spring 的 `OrderController` **依赖于**"订单流程"(它要按流程组织 API 路由)
- 但"订单流程"**完全不依赖于** Spring(理论上你换成 Python + FastAPI,流程一样跑)
- 同理,订单流程依赖于"订单业务规则"(它必须知道状态机才能驱动);但业务规则**不依赖于**流程 —— 即使没人写"用户下单"这个用例,"订单的状态机"也独立成立

---

**一个程序员都能立刻感知的对照** —— 想象你写一个 `Order` 类,有 `创建 / 取消 / 标记发货` 这三个动作。两种写法:

❌ **绑死框架的写法**(你屎山里的常见样子):

```java
@Service
public class OrderService {
    @Autowired JdbcTemplate jdbc;
    public void cancel(Long id) {
        jdbc.update(
            "UPDATE t_order SET status='CANCELLED' WHERE id=? AND status!='SHIPPED'",
            id
        );
        // 业务规则跟 SQL 拼成一坨,跟 Spring + Oracle 绑死。
        // 想换 PostgreSQL?方言要改。
        // 想跑单元测试?必须起一个数据库。
    }
}
```

✅ **业务规则独立的写法**:

```java
public class Order {                  // 普通 POJO,无任何注解
    private OrderStatus status;

    public void cancel() {
        if (this.status == OrderStatus.SHIPPED) {
            throw new IllegalStateException("已发货订单不能取消");
        }
        this.status = OrderStatus.CANCELLED;
    }
}
// 持久化交给外层 Repository 实现去管;
// Order 类本身能在没有数据库的情况下跑单元测试,
// 能从 Java 移植到 Kotlin / Python / Go,业务规则不变。
```

第二种写法的 `Order`,**就是 Entity 层应该长的样子**。这就是"业务核心独立于一切技术细节"。

---

**对照你的环境监测系统**(此时此刻):

| 同心圆四层 | 在你的项目里对应 |
|---|---|
| **Entity**(订单业务规则) | 投诉是什么、工单是什么、"派单需在 N 小时内响应"、"已派单的工单不能直接关闭" 这些核心业务规则 —— 跟用什么数据库 / 什么 UI 都没关系 |
| **Use Case**(订单流程) | "市民投诉 → 平台接到 → 派单到区级 → 区级处理 → 反馈给小程序" 这个流程 —— 你说项目初期有的"通用流程模板"就在这一层 |
| **Adapter**(接口适配层) | Spring 的 REST Controller、MyBatis 的 Mapper、Vue 的页面、小程序的 API 适配器 —— 它们是**翻译官**,把外部世界的输入(HTTP 请求 / SQL 行 / 用户点击)翻译成 Use Case 能懂的领域语言 |
| **Framework**(框架与基础设施) | Spring Boot、Oracle、MyBatis、Vue、微信开放平台、大屏展示 —— **全是配件** |

—— BOB 大叔说**"框架是配件"**(英文原话 "framework is a detail"),在你的项目里翻译成大白话:

> **Spring Boot 不是你项目的本体,它只是你目前选择的"承载容器"而已。**

理论上 Spring 关门了你也能用别的框架重写一份,业务规则照常跑。(理论上。**实际上你的屎山现在做不到** —— 这正是这本书要诊断的病。)

## §3 一张全景图 —— 著名的"同心圆"

![Clean Architecture 同心圆](stages/01-what/pics/01-overview.svg)

**从图上能直接读出来的 5 件事**:

1. **四层从内到外**:Entity(实体) → Use Case(用例) → Adapter(适配器) → Framework & Driver(框架与驱动)
2. **越内层越稳定** —— Entity 是企业级业务规则,几十年不变;Framework 是流行技术,5 年换一茬
3. **依赖箭头永远朝内**(虚线红箭头) —— 外层知道内层的存在,内层**完全不知道**外层
4. **每一层只跟相邻层打交道** —— 跨层调用要绕,这是 boundary(边界)的存在意义
5. **图右侧是你的环境监测系统的对照** —— Spring/Oracle/MyBatis 在最外层,通用流程模板在 Use Case 层,投诉/工单这些核心概念在 Entity 中心

(这张图在原书第 22 章。BOB 大叔自己说:**"所有架构图最终都会归结到这一张同心圆。"**)

## §4 关键词速查表(8 条会反复出现的术语)

下面 8 个词在后续所有阶段都会反复出现。先建立"听到能反应"的肌肉记忆:

| 术语 | 一句话 |
|---|---|
| **Entity / 实体** | 企业级核心业务规则的载体 —— 跨多个 Use Case 复用、跨应用复用,生命周期最长 |
| **Use Case / 用例** | 应用级业务规则,描述"系统要做某件具体事时的步骤"。对应你的"派单流程"、"投诉受理流程" |
| **Adapter / 适配器** | 翻译官 —— 把外部世界(HTTP / SQL / UI 事件)的格式转成 Use Case 能懂的领域对象,反向亦然 |
| **Framework & Driver / 框架与驱动** | 最外层的具体技术 —— Spring Boot / Oracle / Vue / 操作系统 / 第三方 SDK,**都是配件** |
| **Boundary / 边界** | 层与层之间的"接口契约"。跨边界要走预先约好的形状,不能直接穿透 |
| **Plugin / 插件架构** | 整本书最重要的隐喻 —— 把所有配件都当成可热插拔的插件挂在业务核心上 |
| **依赖反转(DIP)** | 让高层模块**不依赖**低层模块 —— 双方都依赖于一个**抽象**(通常是接口),抽象由**高层**来定义 |
| **配件 / detail** | 一切"具体技术选型" —— 数据库、Web 框架、UI 框架、第三方服务都是配件。BOB 大叔英文用 `detail`,中文用"配件"翻译,本意是**非主角的、可替换的部分** |

## §5 SOLID 五原则速览

(SOLID 是面向对象设计的 5 条基础原则,Robert C. Martin 2000 年首次系统提出。整本《架构整洁之道》大量使用,组件原则也建立在它们之上。每条按"全称 + 中文 + 一句核心命题 + 一个直觉反例"展开。)

### **S** — Single Responsibility Principle / 单一职责原则

> **一个模块应该只对一个**类型的"变化来源"(actor)负责。**

不是"一个模块只做一件事",这是常见误解。BOB 大叔在书里反复强调:

- **"职责"** = "**变化的理由**"
- **"变化的理由"** = "**提需求的那群人**(actor)"

**反例(直接钉在你的屎山)**:

你那个 5000 行的 `XXXManager` 同时被三方频繁改:

- **产品方**:要新加一个"投诉自动分类"字段
- **运维方**:要改某个连接池配置
- **统计方**:要在派单时偷偷写一行埋点日志

这就是 SRP 灾难 —— 三个 actor 同时改同一个类,合并冲突 + 互相破坏 + 测试爆炸都是必然。**正确的做法**:把这个类拆成 3 个,每个只对一个 actor 负责。

---

### **O** — Open-Closed Principle / 开闭原则

> **对扩展开放,对修改关闭。**

加新功能不靠改老代码,靠**加新代码**实现。

**反例(钉你的屎山)**:

A 区代码整片 copy 到 B 区然后改 —— 这就是**因为没找到扩展点、只能靠"修改"**。如果当初有 OCP 思维,**B 区的差异应该是一个"插入点"**:写一个"区域定制化"接口,A 区有自己的实现,B 区写一个新实现挂上去 —— A 区的代码**一行都不该被改**。

(这个原则是你后面学 plugin 架构的精神祖父,后面 How / Deep 阶段会反复重温。)

---

### **L** — Liskov Substitution Principle / 里氏替换原则

> **子类(或实现)必须能透明替换父类(或接口),不破坏行为。**

(Barbara Liskov 1987 年的论文。是 OOP 继承的"健康守门员"。BOB 大叔后来把它**升华**了 —— 不只是"子类替换父类",广义上是**任何"可替换"场景的契约**:接口的多个实现之间、microservice 的 v1/v2 之间、不同数据库驱动之间都适用。)

LSP 比表面看起来难懂,因为它**不只是**"方法签名一样",而是要求子类(或实现)的**行为契约**必须包含父类(或接口)的**行为契约**。这个契约有 4 个维度:

| 契约维度 | 父类的承诺 | 子类不能破坏的方式 |
|---|---|---|
| **前置条件**(precondition) | "传 ≥ 0 的数我都接受" | 子类**不能加严**:不能要求"必须 ≥ 10" |
| **后置条件**(postcondition) | "我保证返回 Optional,不抛异常" | 子类**不能弱化**:不能改成"找不到时抛异常" |
| **不变量**(invariant) | "我的内部状态永远满足 X" | 子类不能让 X 偶尔不满足 |
| **历史约束**(history constraint) | "调用某方法后,某些字段不该被改" | 子类不能让"额外字段被偷偷改" |

---

**最贴你处境的例子(直接连接你的国产化迁移)**:

```java
// 接口:放在业务层,Use Case 依赖它,不知道具体实现
public interface WorkOrderRepository {
    Optional<WorkOrder> findById(Long id);   // 契约:不存在时返回 empty,不抛异常
    void save(WorkOrder order);
    List<WorkOrder> findByStatus(Status s);  // 契约:无匹配时返回空 List,不返回 null
}

// Oracle 实现(遵守契约)
public class OracleWorkOrderRepository implements WorkOrderRepository {
    public Optional<WorkOrder> findById(Long id) {
        try {
            WorkOrder o = jdbc.queryForObject("...", id);
            return Optional.ofNullable(o);                  // 符合契约 ✓
        } catch (EmptyResultDataAccessException e) {
            return Optional.empty();                        // Spring 抛这个时吞掉,return empty
        }
    }
}

// 达梦实现 —— LSP 违反!
public class DamengWorkOrderRepository implements WorkOrderRepository {
    public Optional<WorkOrder> findById(Long id) {
        // 达梦驱动在某些 corner case 抛 SQLException,而不是返回 null/empty
        // 这违反了"不存在时返回 empty,不抛异常"的后置条件契约 ✗
        WorkOrder o = jdbc.queryForObject("...", id);   // 抛 SQLException 逃逸出去
        return Optional.ofNullable(o);
    }
}
```

调用方(Use Case)代码:

```java
// 这段业务代码不知道下面是 Oracle 还是达梦
public void processWorkOrder(Long id) {
    WorkOrder o = repo.findById(id).orElseThrow(() -> new NotFoundException(id));
    // ...
}
```

- **Oracle 时**:`findById(不存在的 id)` → returns empty → `orElseThrow` 抛 NotFoundException → 业务正常
- **达梦时**:`findById(不存在的 id)` → **直接抛 SQLException** → 调用方没准备处理 → **业务崩**

—— **LSP 失败最可怕的地方**:**编译通过、单元测试通过(因为单测用 Oracle 实现)、上线后被达梦实现的微妙差异杀死**。换数据库供应商时,**LSP 违反是最难发现的隐蔽 bug**。

---

**LSP 直接连接你的国产化迁移**:

如果你的 Repository 接口 + 所有实现**严格遵守 LSP** —— 即所有实现遵守相同的"行为契约"(空值处理、异常类型、事务边界、时区处理等) —— 那么 Oracle → 达梦只需**重写实现**,业务代码一行不动。

如果不遵守 LSP —— 实现间的微妙差异散落各处 —— 那么换数据库时,**业务代码也要跟着改**(因为它们暗中依赖了"Oracle 实现的特定行为")。这就是你"举步维艰"的一个具体来源。

(经典玩具例子:`Rectangle` / `Square` —— Square 看似是 Rectangle 子类但 `setWidth / setHeight` 行为不同。**那个例子好懂但脱离实战;真实世界的 LSP 大多发生在你刚看到的接口实现替换、driver 切换、microservice 版本升级**。)

---

### **I** — Interface Segregation Principle / 接口隔离原则

> **客户端不应该被迫依赖它不使用的方法。**

不要做"上帝接口"(God Interface) —— 把 30 个方法塞一个 interface 里。每个调用者只用其中 2~3 个,但被迫**依赖**整个 interface 的稳定性。任何一个方法签名变化,所有调用者都被牵动。

**反例**:某个 `IUserService` 接口塞了 40 个方法(查、改、统计、导入、导出、消息推送 ……)。给前端用的只调 5 个查询方法,却必须等整个接口编译通过才能用。改一个统计方法的签名,前端编译挂掉 —— 这就是 ISP 失败。

---

> 💡 **SRP vs ISP —— 它们的区别**(常见混淆):
>
> 直觉上感觉这两条都在说"一个东西做太多事",**但关注角度不同**:
>
> | 角度 | SRP(单一职责) | ISP(接口隔离) |
> |---|---|---|
> | **看的对象** | 一个**类**(实现) | 一个**接口**(契约) |
> | **谁的视角** | "变化的来源(actor)" —— 谁要求改这个类 | "调用者依赖什么" —— 谁在用这个接口 |
> | **判断标准** | 一个 actor 一个类 | 调用者用什么就给什么(只暴露调用者需要的方法) |
> | **失败长啥样** | 一个类被多个 actor 改,合并冲突、互相破坏 | 调用者被迫依赖不用的方法,接口改一处所有调用者牵动 |
> | **主战场** | 类**实现**的内部凝聚 | 接口**对外**的契约暴露 |
>
> **它们可以独立成立**(这是 BOB 自己强调的):
>
> - 一个类**可以**违反 SRP(被 3 个 actor 改)**但**接口拆得很细 → ISP 没违反
> - 一个类**可以**遵守 SRP(只有 1 个 actor)**但**接口塞 30 个方法 → 违反 ISP
>
> 重叠区是"**God class + God interface 一起**"。BOB 大叔自己也说过 "ISP 在某种意义上是 SRP 的另一面" —— 但两条原则的**主战场不同**(类的实现 vs 接口的对外契约)。

---

### **D** — Dependency Inversion Principle / 依赖反转原则

> **高层模块不应依赖低层模块,二者都应依赖于抽象;抽象不应依赖于细节,细节应依赖于抽象。**

**先澄清:"高层"和"底层"具体指什么?**

- **高层模块** = 离业务策略更近的(policy-defining)→ 在 Clean Architecture 里就是 **Entity + Use Case**
- **底层模块** = 离机制实现更近的(mechanism-providing)→ 在 Clean Architecture 里就是 **Adapter + Framework**(以及更广义的:数据库、Web 框架、UI、第三方 SDK 等所有"配件")

所以**直觉理解**:**高层 = 业务模块,底层 = 框架 / 数据库 / UI 等配件**。完全对。

(严格说,"高/底层"是相对的 —— 一个模块相对它依赖的具体模块是"高层",相对依赖它的更抽象模块就是"底层"。但在 Clean Architecture 同心圆体系里,简化映射就是"**内层 = 高层,外层 = 底层**"。)

整本《架构整洁之道》的**根脉**。同心圆的"依赖箭头永远朝内",底层就是 DIP 在起作用。

**直觉表述**:让"业务规则"(高层)反过来定义它需要从"数据库 / 框架"(低层)拿什么 —— 写成接口,放在高层模块里;低层模块**实现**这个接口。这样依赖箭头就**反转**了 —— 不再是业务依赖数据库,而是数据库实现业务定义的接口。

**反例(钉你的屎山)**:

你的派单 Service 直接 `import` 了 MyBatis 的 Mapper,Mapper 又直接拼 SQL 查 Oracle —— 派单业务规则**直接依赖**数据库实现。如果 Oracle 换成 PostgreSQL,你的派单业务规则代码全要改。

**正确的做法**:派单 Service 定义一个 `WorkOrderRepository` 接口(只描述业务需要的查询/写入语义),MyBatis 那一套**实现**这个接口;派单 Service **完全不知道** Oracle 的存在。

---

> ⚠️ **DIP 最容易被误解的关键点 —— 抽象的定义权**:
>
> **接口必须由高层定义、放在高层模块里**。"加了接口" **≠** "做了 DIP" —— 还要看这个接口**谁定义、放哪里**。
>
> | 形式 | 接口由谁定义 | 是真 DIP 吗? |
> |---|---|---|
> | 业务 Service `import org.springframework.data.repository.JpaRepository<T, ID>` 然后直接用 | 框架(底层) | ❌ 业务依赖**框架定义的**抽象,换框架 = 改业务 |
> | 业务模块自己定义 `WorkOrderRepository` interface,放在业务 jar 里;MyBatis 在 framework jar 实现它 | 业务(高层) | ✓ 真 DIP |
>
> **对你的国产化迁移直接相关**:你的屎山如果"加了接口但接口都是 Spring / MyBatis 定义的",那 Oracle → 达梦时**接口本身也要换** —— 业务代码还得跟着改。真 DIP 是"**接口在业务 jar 里、实现在 framework jar 里**",换 framework 时业务**一行不动**。

---

## §6 组件 6 条原则速览(聚合 3 + 耦合 3)

(SOLID 是"类内部"的设计原则;组件 6 条是把同样思想**升一层**到"组件之间"。一个组件 = 一个 jar / 一个 npm package / 一个 microservice / 一个独立可发布单元。)

### 11 条原则的尺度对照 —— 它们之间到底是什么关系?

(很容易问的一个问题:**SOLID 5 条和组件 6 条,是公理 vs 推论吗?**)

**精确回答**:不完全是公理-推论关系,**更像同一组思想在两个尺度上的体现 + 一条组件级独有原则**。

| SOLID(类层面) | 对应的组件级原则 | 共同思想 |
|---|---|---|
| **SRP** 单一职责 | **CCP** 共同闭包 | "按变化的来源聚拢" —— 只是聚拢的单位不同(SRP 聚拢类内方法,CCP 聚拢组件内类) |
| **OCP** 开闭 | **ADP + SDP** | "扩展不改既有":需要无环依赖 + 依赖方向稳定,扩展才能不污染稳定层 |
| **LSP** 里氏替换 | (在所有"可替换"场景隐含,无单独编号) | 行为契约的可替换性 |
| **ISP** 接口隔离 | **CRP** 共同复用 | "不要被迫依赖你不用的" —— 类层面是不被迫依赖方法,组件层面是不被迫依赖类 |
| **DIP** 依赖反转 | **SAP + SDP** | "稳定的应该是抽象的、被具体依赖" |
| (无对应) | **REP** 复用-发布等价 | 这条是组件级**特有**(SOLID 里没有"发布粒度"这个概念) |

**两个方向的因果**:

- 类层面遵守 SOLID 是组件层面遵守 6 原则的**必要条件**(微观不及格,宏观难做到)
- 反向也成立:组件级 SDP/SAP 的硬要求,会**逼着**类级遵守 DIP(否则稳定组件无法干净地依赖具体)
- **唯一不能从 SOLID 推出的是 REP** —— 它涉及"发布粒度"这个 SOLID 看不到的尺度

所以"公理 vs 推论"的直觉**部分对**(SOLID 是更基础的微观保证),但更准确的关系是 **"两个尺度的同构 + 一条组件级独有原则"**。

---

> ⚠️ **重要澄清:组件 ≠ Use Case 层**
>
> 容易混淆的一点:**组件 6 原则跟同心圆四层(Entity / Use Case / Adapter / Framework)是正交的(垂直的两件事)**,不是同一回事。
>
> | 轴 | 关注什么 | 单位 / 层级 | 适用规则 |
> |---|---|---|---|
> | **打包粒度轴**(物理) | "代码怎么打包发布" | 类 → 组件(jar / package / microservice)→ 系统 | 类 = SOLID;组件 = 组件 6 条 |
> | **架构关注点轴**(逻辑) | "代码在管哪类业务关注点" | Entity / Use Case / Adapter / Framework | 同心圆 + 依赖箭头永远朝内 |
>
> 具体说:
>
> - 一个 **Entity 组件**(只装 Entity 类的 jar)要遵守组件 6 条
> - 一个 **Use Case 组件**(只装 Use Case 类的 jar)**也**要遵守组件 6 条
> - 一个 **Adapter 组件**(只装 MyBatis Repository 实现的 jar)**还是**要遵守组件 6 条
> - 而每个组件内部的每个**类**,无论它属于同心圆哪一层,**都**要遵守 SOLID
>
> 一句话总结:
>
> > **SOLID 在每一层的每个类上都适用;组件 6 条在每一层的每个组件上都适用。两者跟"同心圆四层"是正交关系,不是同一个东西。**

---

### 聚合 3 条 —— 决定"一个组件应该包含哪些类"

#### **REP** — Reuse-Release Equivalence Principle / 复用-发布等价原则

> **复用粒度 = 发布粒度。**

一个组件能被别人**复用**,前提是它能被**独立发布**(打包、版本化、追踪兼容性)。如果一坨代码不能独立发布,它就不能被真正复用。

**反例**:你说 A 区代码 copy 到 B 区 —— 这就是**没有 REP**。"通用流程模板"应该是一个**独立发布的组件**(如 `workflow-core-1.2.3.jar`),A 区 / B 区 / C 区都依赖它。但你们没把它独立发布,所以"复用"只能靠 copy。

---

#### **CCP** — Common Closure Principle / 共同闭包原则

> **一起变化的类应该放在同一个组件里;不一起变化的类应该分开。**

CCP 是 SRP 升一层到组件级。判断标准:**变化的来源相同**(同一群人、在同一个原因下改它们) → 放一起。

**直觉表述**:打开一个组件,如果你发现"加一个新字段要改 5 个组件",就是 CCP 失败 —— 5 个组件里都有跟这个字段相关的代码,本应放一起。

---

#### **CRP** — Common Reuse Principle / 共同复用原则

> **不在一起被复用的类,不要放在一个组件里。**

CRP 是 ISP(接口隔离)升一层。**反向表述**:依赖一个组件,等于依赖它的**全部**类 —— 即使你只用了一个。所以不要塞太多"用户用不到的"类进去,会污染所有依赖者。

---

#### 三条聚合原则的张力

REP / CCP / CRP **互相拉扯**,不可能都满足:

- REP 推动你**做大**:复用单位要够大,才有发布价值
- CCP 推动你**按变化分组**:一起变化的塞一起
- CRP 推动你**做小**:不在一起被复用的剔出去

BOB 大叔说:**"项目不同阶段在三角形里的位置不同。"** 新项目偏 CCP(快速迭代);成熟项目偏 CRP(稳定复用);谁都没法永远在中心 —— 这是工程现实。

---

### 耦合 3 条 —— 决定"组件之间应该如何依赖"

#### **ADP** — Acyclic Dependencies Principle / 无环依赖原则

> **组件依赖图必须是 DAG —— 不能出现环。**

如果组件 A 依赖 B,B 依赖 C,C 又依赖 A —— 你就不能独立发布任何一个,改一个就全部要重测。**这是组件级的死结**。

**反例**:屎山项目里常见的"我改了 `commons-utils`,结果发现 `commons-utils` 反过来 `import` 了 `user-service` 的某个类" —— 环。

---

#### **SDP** — Stable Dependencies Principle / 稳定依赖原则

> **依赖方向永远指向更稳定的组件。**

不稳定的组件可以依赖稳定的;**反过来不行**。如果一个稳定组件依赖了不稳定组件,前者就被后者污染、不再稳定。

**直觉表述**:同心圆的"依赖箭头朝内",在组件级就是 SDP —— 内层(Entity)是最稳定的,所以所有外层都可以依赖它;但 Entity 不能依赖任何外层。

---

#### **SAP** — Stable Abstractions Principle / 稳定抽象原则

> **稳定的组件应该是抽象的;不稳定的组件应该是具体的。**

SDP 说"稳定的不能依赖不稳定的"。但稳定 ≠ 不能扩展 —— 那不是死了么?**SAP 的解决方案**:让稳定组件**全是抽象**(接口、抽象类),不稳定组件提供**具体实现**。这样稳定组件**通过抽象**来"依赖"具体细节(实际是细节实现稳定组件定义的接口),依赖方向反转,SDP 守住,扩展性也守住。

—— **SAP + SDP + DIP 三件事其实是同一件事在不同层级的体现**:让"稳定且抽象的核心"被"不稳定且具体的细节"依赖,而不是反过来。

---

## §7 它在系统/技术栈里的位置

Clean Architecture **不是孤立创新**。它站在一个有 30 年历史的"业务核心独立于技术细节"思想脉络里。看看它的"邻居":

| 流派 | 谁提出 | 何时 | 核心隐喻 | 跟 Clean Architecture 的关系 |
|---|---|---|---|---|
| **Hexagonal Architecture / 六边形架构** | Alistair Cockburn | 2005 | "应用作为六边形,Port 接收输入、Adapter 转换" | **几乎同构** —— Port = boundary,Adapter 概念几乎一致 |
| **Onion Architecture / 洋葱架构** | Jeffrey Palermo | 2008 | 同心圆,业务核心在中心,基础设施在外层 | **完全同构** —— 只是换了个画法,精神一致 |
| **DDD / 领域驱动设计** | Eric Evans | 2003 | 领域模型为核心,基础设施可替换 | **互补而非重叠** —— DDD 教你怎么**建模业务核心**(战略 + 战术);Clean 教你怎么**摆放代码** |
| **经典三层(Controller/Service/DAO)** | (业界惯例) | 90s 末~ | 上下三层,UI → 业务 → 数据 | **常被以为是 Clean 的简化版,实际方向相反** —— 经典三层里 Service 直接依赖 DAO,DAO 依赖具体数据库;Clean 里依赖方向反过来 |

**关键洞察**:

> Clean Architecture / Hexagonal / Onion 三者是**同一个思想的三种叙事**,差异主要在画图方式和侧重词。BOB 大叔在书里第 22 章自己也承认 —— 他说"我把它叫做 Clean Architecture,但你也可以叫它 Onion 或 Hexagonal,内核是一样的"。

(这就是为什么后面 Comparison 阶段如果你有兴趣,可以拉这三个来一对比 —— 你会发现它们就像三个画家画同一个模特。)

你的灵魂问题是"完整理解《架构整洁之道》的设计哲学与可落地方法"。What 阶段不能完整回答,但**它给了你一把打开后续阶段的钥匙** —— 同心圆 + 11 条原则的词汇表。

让我用这把钥匙先做一次**诊断**,看看你那座屎山在 Clean Architecture 框架下长什么样:

**诊断结论**:

> 你的项目当前状态是 —— **"四层全部塌缩成一坨"**。Entity / Use Case / Adapter / Framework 之间的边界**不存在**或**反向**(框架在指挥业务,而不是业务在使用框架)。

这就是为什么你"加一个功能、修改一个 bug 都十分窝火":

- **没有清晰的边界** → 你不知道改一处会不会触发其他地方
- **没有独立的业务核心** → 你不能脱离 Spring + Oracle 跑测试
- **没有发布单元** → A 区到 B 区只能靠 copy

**接下来 Why 这一节会做的事**:从这些"窝火的具体瞬间"出发,反推出一份**约束清单(C1, C2, ...)** —— 软件架构这件事到底在跟什么做斗争。这份清单会成为后续所有阶段的脊梁:每一条原则、每一个组件,都是为了应对清单上的某条约束才存在的。

# 阶段 2:《架构整洁之道》为什么必须存在

> **Why 阶段的本分** —— 这一节立起本套件的脊梁:**5 条不可再分的约束(C1~C5)**。后面所有讨论(How / Origin / Deep / Comparison / Synthesis)都会**反复回到这份清单**:每讲一个机制、每引入一个原则,都要回答**"它在解决清单上的哪几条"**。**没引用约束的机制 = 开发者偏好,不是架构必然**。

---

## §0 从 What 走到 Why:三件事记住

What 阶段我们建立了"**什么是 Clean Architecture**" —— 同心圆四层、依赖朝内、11 条原则、plugin 架构。但**没有回答 BOB 大叔为什么要发明这套东西**。

这一节就回答这件事。我们不去描述"理想的架构长什么样"(那是 What),也不去说"具体怎么实现"(那是 How)。我们去挖**任何软件项目都在跟什么打架** —— 不是 Spring 项目独有的痛、也不是中国信创独有的痛,而是**所有软件,从 1968 年 Software Crisis 至今 60 年,都在跟同一组物理约束做斗争**。

Clean Architecture 是这场斗争里的一种**工程响应** —— 不是天才的灵光一现,是对硬约束的**精确反应**。

### 三件事记住

**事 ①:5 条约束都是物理事实 / 工程定律 / 经济现实,不是 BOB 大叔的个人偏好**

| 约束 | 来源 |
|---|---|
| **C1** | **Lehman 定律**(1980,Manny Lehman):软件系统必须持续演化,否则就死 |
| **C2** | 经济 + 政策事实:供应商市场结构 + 国家级政策约束(信创就是最强证据) |
| **C3** | **路径依赖**效应 + **Miller's Law**(1956,人脑短期记忆 7±2 块) |
| **C4** | 经验循环:测试塌方反馈环路(Michael Feathers 整本《修改代码的艺术》的论点起点) |
| **C5** | 软件工程经济学:Boehm COCOMO 模型 + Brooks《人月神话》+ 信息论(联合熵增长) |

—— **不是 BOB 大叔说的,是事实**。BOB 只是把这些事实精炼成了 11 条原则。

这一点很关键 —— 当未来你听到"Clean Architecture 过时了 / 是 OOP 的产物 / 不适用 X 场景",问一句:**"那这 5 条约束你打算怎么办?"**。如果没有更好的答案,Clean Architecture 仍然是最优解。

**事 ②:5 条约束之间互为因果,构成"变化压力管理"框架**

```
变化的来源(C1 + C2)            ← 你必须 absorb 的压力源
        ↓
承受变化的能力(C3 + C4)         ← 决定代码会不会僵化
        ↓
单次变化的代价(C5)              ← 经济基础(总成本 ∝ 波及面)
        ↓
   Clean Architecture 是工程响应
```

5 条不是孤立的事实,是一个**完整的因果链**:

- **C1 + C2 是输入**(变化压力 —— 业务变 + 技术变)
- **C3 + C4 是滤波器**(决定压力会不会摧毁系统)
- **C5 是经济约束**(决定每次变化的成本上限)

任何架构理论,都是在回答**"输入这么大压力 + 承受能力这么有限 + 单次代价这么贵,代码该怎么组织才能活下去"**。Clean Architecture 是一种回答,DDD 是另一种,Hexagonal 又是另一种 —— **它们都在回答同一组问题**。

**事 ③:Clean Architecture 全部 11 条原则 + 4 层同心圆 + 依赖朝内 + plugin —— 都是对 C1~C5 的工程响应**

这是 §5 会详细映射的内容,这里先 preview 一下:

| 约束 | 主要对策 |
|---|---|
| **C1**(新需求 + OCP 失败陷阱) | OCP + plugin 架构(寻找扩展点,加新代码而非改老代码) |
| **C2**(供应商不可控演化) | DIP + 业务核心独立 + 同心圆依赖朝内 |
| **C3**(超级类必然涌现) | SRP + CCP + 同心圆边界(给 god class 涌现踩刹车) |
| **C4**(测试反馈速度) | DIP + 业务核心可独立测试(不起 Spring/Oracle 也能跑) |
| **C5**(波及面 ∝ 代价) | **统领所有 11 条原则** —— 控制不同尺度的波及面 |

读到这里你应该已经能感觉到:**Clean Architecture 不是孤立创新,是 60 年软件工程经验对 5 条物理约束的精炼回应**。

## §2 没有 Clean Architecture 的世界

如果你用一句话给一个非程序员朋友描述"软件没有架构会怎样",可以这么说:**"代码会变成你眼前这座屎山"**。但这句话太抽象,我们具体描述 4 个场景。

### §2.1 场景 A:加新需求要改老代码 → 上线 bug 雪崩

**现实样本(你的项目)**:
- 产品方提出"投诉自动分类"新需求
- 你打开代码,**没有任何"插入点"**可以单独添加这个功能
- 你被迫修改 `XXXManager` 类的 `processComplaint` 方法,加入新分支
- 测试通过了 7 个,有 1 个失败 —— 你查了 3 天,发现是另一个流程在偷偷读你修改的字段
- 上线后,B 区客户报了一个跟"投诉分类"完全无关的 bug —— 因为你改的代码触发了**另一个分支的回归**

—— 你说**"加 B 需求 A 又挂了"**,就是这个场景。这是 **C1 失败**。

### §2.2 场景 B:技术栈/供应商被强制更换 → 业务代码全部牵动

**现实样本(你的项目)**:
- 公司下达国产化指令:Oracle → 达梦,Spring Boot → 东方通
- 你打开代码,发现 `@Entity / @Service / @Autowired` 长在领域类上 —— **Spring 渗透到业务核心**
- Oracle 方言 SQL(`ROWNUM` / `NVL` / `CONNECT BY`)散落在 200+ 个 DAO 里
- MyBatis Mapper 直接被 Service 类 `import`,**业务流程跟 MyBatis 绑死**

—— 国产化"举步维艰",**改全部代码 ~80-90%**,差距是 Clean Architecture 项目的 5-10 倍。这是 **C2 失败**。

### §2.3 场景 C:超级类涌现 → 新人 3 周才能上手

**现实样本(你的项目)**:
- `XXXManager` 类 5000 行,谁都不敢动
- 新人入职第 1 周:打开 IDE,看到 `XXXManager` 不知从哪开始读
- 新人入职第 2 周:终于读完一遍,但忘了第 1 周看的部分
- 新人入职第 3 周:终于能跟着改一个小 bug 了
- 而 5000 行的"超级类"**不是有人故意设计成这样的** —— 是 5 年里"反正再加几行"的累积

—— "老人离开,新人窝火",**bus factor = 1 已死**。这是 **C3 失败**。

### §2.4 场景 D:无 UT、上线即调试 → 进入"不敢改"循环

**现实样本(你的项目)**:
- 没有单元测试(你说过)
- 改完代码,直接上线
- 上线发现 bug,在生产环境调试
- 修完 bug 不补测试 —— 因为补测试要起 Spring + Oracle + Redis + Kafka,本地 30 秒一轮
- 下次改代码,**因为没测试,心理上不敢改**
- 不敢改,代码就僵化;僵化,业务方更急;更急,你更乱改;更乱改,bug 更多

—— **这是个负反馈深渊**。你已经掉进去了。这是 **C4 失败**。

---

**4 个场景合起来 = 你眼前的屎山**。每个场景都对应清单里的一条约束。

注意:**你的屎山不是因为团队水平差**(你描述的是一个有过良好初期架构、被业务速度 + 领导口味 + 老人离职碾压的项目)。它是因为 5 条约束**没人主动对抗**。

Lehman 定律继续发动需求压力,Miller 定律继续逼超级类涌现,测试塌方循环继续发酵,波及面继续放大 —— 这是**默认状态**。**没有架构主动对抗的项目,默认就会变成屎山**。

---

## §3 不可再分约束清单(C1~C5 详细展开)

每条约束按"约束本身 / 不可再分性 / 来源 / Clean Architecture 对策 / 对照你的屎山"五段式展开。

---

### §3.1 C1 — 新需求持续到来,加新需求常被迫改老代码 → 引入回归

**约束本身**:

> 新需求会**不断到来**(这是软件存在的目的),而且改老代码就**有引入回归**的风险。这一对约束的合体形成 **"OCP 失败陷阱"** —— 加新需求时,如果没找到扩展点,就只能改老代码 → 引入回归。

**为什么不可再分**:

- "需求会变" → Lehman 定律,无法消除(系统不变化就死了)
- "改老代码引入回归" → 任何系统都有不完美的测试覆盖,改老代码必然有未知风险
- 两者合并 → 你**必须**让"加新需求"路径上有扩展点,否则就要付回归代价

**来源**:Lehman's Law of Software Evolution(1980)+ OCP(BOB 大叔 1988 总结自 Bertrand Meyer 1987)

**Clean Architecture 对策**:

- **OCP**(开闭原则):对扩展开放,对修改关闭
- **plugin 架构**:把"差异点"做成可热插拔的插件
- **同心圆边界**:扩展点放在 Adapter 层(适配器层),Entity / Use Case 不动

**对照你的屎山**:A 区代码 copy 到 B 区 → 没找到"扩展点",只能 copy + 修改。如果当初有 OCP 思维,**B 区差异应该是一个 plugin**:写一个"区域定制化"接口,A 区有自己实现,B 区写新实现挂上去 —— A 区代码**一行都不该被改**。

---

### §3.2 C2 — 技术栈/供应商的不可控演化

**约束本身**:

> Spring / Oracle / 任何第三方 SDK 都不是你能控制的:它们可能被并购、停服、被强制替换(信创就是法律级证据)。架构必须能在它们换装时**让业务存活**。

**为什么不可再分**:

- "供应商不可控" → 经济 + 政策事实,无法消除
- "技术栈演化速率 > 业务规则演化速率" → 业务核心(投诉/工单的本质)几十年不变,Spring 5 年换一茬
- 两者合并 → 你**必须**让业务核心不依赖于 framework,否则换 framework 等于改业务

**来源**:Lehman 演化模型 + 经济现实(供应商市场)+ 政策约束(信创)

**Clean Architecture 对策**:

- **DIP**(依赖反转):接口由高层(业务)定义,framework 实现接口
- **业务核心独立于框架**:Entity 类是 POJO,无任何框架注解
- **同心圆依赖朝内**:framework 在最外层,所有人依赖业务核心,业务核心不知道 framework 存在

**对照你的国产化**:你正在经历的这个迁移,如果当初按 Clean Architecture 建,**只改最外两层(Adapter + Framework)**,业务一行不动 → ~10-20% 代码改;现在的"举步维艰" → ~80-90% 代码改。**差距 5-10 倍是这条约束失败的成本**。

---

### §3.3 C3 — 系统复杂度增长时,"超级方法/超级类"必然涌现(除非架构主动对抗)

**约束本身**:

> 加新功能成本最低的路径就是 **"塞进已有的类"** —— 测试现成、调用方现成、不用想新边界。这种**路径依赖**日积月累,**god class 必然涌现** —— 哪怕没人故意。

**为什么不可再分**:

- "加新功能时倾向于塞进已有类" → 物理事实(认知带宽 + 路径阻力最小化)
- 这种倾向**不会自动停止** → **没有外力对抗,熵增是默认状态**
- 两者合并 → 你**必须**有架构作为外部强制,否则 god class 必然涌现

**来源**:Miller's Law(1956)+ 软件熵增定律 + 路径依赖经济学

**Clean Architecture 对策**:

- **SRP**(单一职责):每个类只对一个 actor 负责
- **CCP**(共同闭包原则):一起变化的类放一起
- **同心圆边界**:每层只关心自己的关注点
- **可测试性**(隐性对策):写测试逼着你拆类,不拆就难写测试

**对照你的屎山**:5000 行的 `XXXManager` 没人故意,是 5 年里"再加几行"的累积。新人 3 周才上手,因为认知带宽超载。bus factor = 1,因为隐性知识只在原作者脑子里 —— **三个症状都是同一条约束的失败**。

---

### §3.4 C4 — 测试反馈速度决定生产力

**约束本身**:

> 测试越慢 → 越不写 → 不敢重构 → 代码僵化死亡(**测试塌方正反馈循环**)。一旦掉进去就难爬出来,因为爬出来要先补测试,而补测试在屎山项目里成本巨大(要起一堆基础设施)。

**为什么不可再分**:

- "慢测试不爱写" → 心理事实(短期成本 vs 长期收益的折现率不对称)
- "不写测试就不敢改" → 风险管理事实(没安全网就保守)
- "不敢改就僵化" → 业务事实(僵化的代码不能 absorb 新需求)
- 三者合并 → 一个**自我强化的负螺旋**

**来源**:Michael Feathers《Working Effectively with Legacy Code》(2004)整本书的论点起点 + 软件工程经济学(Boehm)

**Clean Architecture 对策**:

- **DIP**:让业务核心可被 mock 隔离,不起 Spring/Oracle 也能跑测试
- **业务核心独立于框架**:Entity 类的测试是纯 Java,毫秒级
- **boundary 接口**:跨边界的依赖都通过接口,可以 stub

**对照你的屎山**:你说 **"无 UT、上线即调试"** —— 你已经站在这个深渊**最深处**。爬出来的路径(增量补测试 + 隔离 framework + 找到 seams)是 Michael Feathers 那本书的主题,Clean Architecture 提供 destination,Feathers 提供 path。

---

### §3.5 C5 — 改一处的代价跟波及面成正比

**约束本身**:

> 经济约束:**一次改动总成本 = 改动量 + 风险评估 + 测试 + 沟通**,各项跟波及面正相关。**统领所有 11 条原则的元约束** —— 因为 SRP / OCP / LSP / ISP / DIP / REP / CCP / CRP / ADP / SDP / SAP **每一条最终都在控制"波及面"**。

**为什么不可再分**:

- "改一处要改动" → 改动成本本身,无法消除
- "改动有风险,要评估" → 风险评估时间 ∝ 影响面大小
- "改完要测试" → 测试时间 ∝ 影响面大小
- "改动要通知别人" → 沟通成本 ∝ 涉及的团队/模块数量
- 四项合一 → **总成本 ∝ 波及面**,这是经济铁律

**来源**:Boehm COCOMO 模型 + Brooks《人月神话》+ 信息论(联合熵增长)

**Clean Architecture 对策**:

> **所有 11 条原则的最终目标都是控制波及面**:
>
> | 原则 | 控制什么尺度的波及 |
> |---|---|
> | **SRP** — Single Responsibility Principle / 单一职责原则 | 类内部的波及(改一个 actor 的逻辑不波及其他 actor) |
> | **OCP** — Open-Closed Principle / 开闭原则 | 扩展时的波及(加新代码不动老代码) |
> | **LSP** — Liskov Substitution Principle / 里氏替换原则 | 替换时的波及(换实现不动调用方) |
> | **ISP** — Interface Segregation Principle / 接口隔离原则 | 接口的波及(接口拆细,改方法不波及不用它的调用方) |
> | **DIP** — Dependency Inversion Principle / 依赖反转原则 | 依赖方向的波及(高层不被低层污染) |
> | **REP** — Reuse-Release Equivalence Principle / 复用-发布等价原则 | 发布的波及(独立发布单元,版本独立演化) |
> | **CCP** — Common Closure Principle / 共同闭包原则 | 变化的波及(一起变化的放一起 → 改动不跨组件) |
> | **CRP** — Common Reuse Principle / 共同复用原则 | 依赖的波及(只依赖你需要的) |
> | **ADP** — Acyclic Dependencies Principle / 无环依赖原则 | 循环依赖的波及(无环 → 局部改动真的局部) |
> | **SDP** — Stable Dependencies Principle / 稳定依赖原则 | 依赖方向的波及(稳定方向) |
> | **SAP** — Stable Abstractions Principle / 稳定抽象原则 | 扩展点的波及(稳定的应该是抽象的) |

**对照你的屎山**:**所有你的痛点最终都是 C5 的失败** —— 改一字段触发 8 测试失败、加 B 需求 A 挂了、国产化举步维艰、改 X 要打开 8 个文件 —— **全是波及面失控**。

---

### §3.6 5 条约束的级联关系 —— 屎山的时间演化

5 条约束**有两种看法,都对**:

**看法 A:层级看(物理维度)** —— 已在 §0 事 ② 讲过

```
变化来源(C1 + C2) → 承受能力(C3 + C4) → 单次代价(C5,统领)
```

这是 **BOB 大叔写书的视角** —— 从物理事实推理工程响应。

**看法 B:级联看(时间维度)** —— 屎山是怎么"长成"的:

```
C1: 项目运行,新需求持续到来,架构不合理 → 加新需求触发回归
        ↓
C3: 改老代码不便,堆砌逻辑到现有类 → 超级类 / 超级方法涌现
        ↓
C4: 没 UT,回归测试靠手工 / 上线发现 → 改一处时间成本爆炸
        ↓
C2: 几年后技术栈强制更换(信创等)→ 全部业务被 framework 绑死,迁移地狱
        ↓
综合崩溃: 团队一片哀鸿
```

这是 **工程师亲历屎山的视角** —— 从 entry point 到综合崩溃的时间序。

---

**两种看法 reflect different things**:

| 视角 | 解释什么 | 谁的视角 | 实战意义 |
|---|---|---|---|
| **A 层级看(物理)** | 5 条约束的物理模型(为什么是 Lehman / Miller / 经济铁律) | BOB 大叔 / 架构师 | **回答 "为什么 Clean Architecture 是合理的"** |
| **B 级联看(时间)** | 5 条约束在真实项目里按时间序如何展开 | 工程师 / 屎山亲历者 | **回答 "屎山要救援该从哪下手"** |

---

**视角 B 的关键洞察 —— 屎山 evolution 的 entry point 是 C1**:

> 如果你想**救一个屎山项目**,**把刹车踩在 C1 是最早期、最便宜的**。等到 C2(技术栈强制更换)才动,那已经是末期 —— 全部代码都已经被 C3、C4 摧毁过一轮,救援代价指数级增大。
>
> **具体踩刹车的工程动作**:在加每一个新需求时,**强制问一次** —— "**这是改老代码,还是加新代码**(OCP)?如果是改老代码,**有没有可能改成加新代码**?"。这一个问题如果坚持问 6 个月,屎山演化就会显著放缓。

—— 这正是 **OCP 作为 C1 对策**的工程化形式。What 阶段我们说 OCP 是"对扩展开放对修改关闭",听起来抽象;接到这条 cascade 后,**OCP 变成了"屎山演化第一道刹车"**,具体到每次写代码的瞬间。

## §4 核心 insight

把 5 条约束抽象成一句话,就是 Clean Architecture 全套的灵魂:

> **"软件架构是对'变化压力'的工程响应 —— 让局部改动真的局部,即使在持续演化的系统里。"**

或者用更紧凑的形式:

> **"用'依赖方向'换'波及面控制'。"**

这是 Clean Architecture 整套思想的**一句话浓缩**。所有具体原则、4 层同心圆、依赖朝内、plugin 架构,都是这句话的展开。

**为什么"依赖方向"是关键交换物**:

- 依赖方向决定了"谁知道谁的存在" —— 这是波及面的边界
- 朝错了方向,波及面就跨过该有的边界(底层一变,高层全炸)
- 朝对了方向,波及面就被局限在该有的范围(底层变,高层不知,因为高层定义抽象)
- **DIP / SDP / SAP 三件事的灵魂都是这件事**:让"稳定且抽象的核心"被"不稳定且具体的细节"依赖,而不是反过来

把这句话记下来,后面 How / Origin / Deep 阶段每讲一个机制,都能拿这句话去拷问"它在以什么方式控制波及面"。

---

## §5 这个 insight 怎么解决了 5 条约束(约束 ↔ 对策映射)

| 约束 | 主要对策 | 工程化体现 |
|---|---|---|
| **C1**(新需求持续到来 + OCP 失败陷阱) | OCP + plugin 架构 | 把差异做成可插拔的 plugin,加新需求 = 加新代码 |
| **C2**(技术栈/供应商不可控演化) | DIP + 业务核心独立 + 同心圆依赖朝内 | 接口在业务 jar 里,framework 实现接口 |
| **C3**(超级类必然涌现) | SRP + CCP + 同心圆边界 | 每个类一个 actor,一起变化的放一起 |
| **C4**(测试反馈速度决定生产力) | DIP + 业务核心可独立测试 | Entity 是 POJO,纯 Java 毫秒级测试 |
| **C5**(改一处代价 ∝ 波及面)| **统领** —— 所有 11 条原则 | 每一条都在控制不同尺度的波及面 |

**注意 C5 是元约束** —— 它不是"被某条原则解决",而是**所有原则共同服务的目标**。其他 4 条约束(C1~C4)是 C5 的具体表现形式(在不同场景下波及面失控的样子)。

# 阶段 3:整洁架构 大致怎么工作

> 把 Why 阶段建立的 5 条约束(C1~C5)精确化成 **3 个核心结构**(同心圆四层 / 依赖规则 / DIP 反转),落到 Java 包。

## §0 从 Why 走到 How:三件事记住

Why 阶段建立了 5 条约束,但**约束本身没告诉你"代码该长什么样"**。从 Why 走到 How,要把 5 条约束精确化成 **3 个具体可落地的结构**。

### §0.1 同心圆四层结构

**因为 [C3](#c3--复杂度涌现) + [C5](#c5--改动代价--波及面-元约束)**(复杂度涌现 + 改动 ∝ 波及面)
   ↓
**要解决**:复杂度增长时,得有一个"先天的隔板",防止任何一处的修改无限蔓延
   ↓
**所以引入 同心圆四层**(Entity / Use Case / Adapter / Framework):每层只能用更内圈的东西。改一层最多波及它和它外圈;改 Entity 是地震,改 Framework 是地皮 — **改动代价跟"哪一层"绑死**。

| 层 | 装的是 | 例子(工单系统) |
|---|---|---|
| **Entity**(最内) | 企业业务规则,跨用例都不变的东西 | `WorkOrder` 自身的状态机:已关闭单不能再扭 |
| **Use Case** | 应用业务规则,本应用特有的工作流 | "派单人才能扭转 + 时间窗校验 + 通知关联人" |
| **Adapter** | 翻译层 | `WorkOrderController`(HTTP→入参)/ `OracleWorkOrderRepository`(SQL←Entity) |
| **Framework**(最外) | Spring Boot / JPA / Tomcat / 东方通 | `application.yml`、`SpringBootApplication` 启动器 |

### §0.2 依赖规则

**因为 [C2](#c2--技术栈供应商不可控) + [C5](#c5--改动代价--波及面-元约束)**(技术栈不可控 + 改动 ∝ 波及面)
   ↓！
**要解决**:外层(框架/数据库/UI)注定会变,变化的代价不能传染到内层
   ↓
**所以引入 依赖规则**:**同心圆的依赖只能向内而生 —— 外层可以依赖内层,但内层绝对不能依赖外层**。具体到代码:同心圆任意一层的 `import` / 引用,**只能指向更内的层**,绝不能反向。

#### §0.2.0 「依赖」到底是什么意思?(物理本质)

谈"依赖"之前,要把这个词钉死。最朴素也最准确的定义:

> **A 依赖 B = A 的 `.java` 文件里有 `import B` 语句;B 不存在,A 编译不过。**

这是**物理事实**,不是抽象比喻。所以"依赖向内而生"(外层依赖内层,内层绝不依赖外层)不是设计美学偏好,而是**编译顺序的物理约束**:

```
Entity      ← 不 import 任何外层 → 第 1 个能编译
   ↑
Use Case    ← 只 import Entity   → 第 2 个能编译
   ↑
Adapter     ← import Entity + Use Case + 框架标准接口 → 第 3 个能编译
   ↑
Framework   ← import 所有内层 → 第 4 个(最后一个)能编译
```

这是个 **DAG 拓扑序**。一旦出现 cycle —— 比如 `.usecase` 和 `.adapter` 互相 import —— **多模块 Maven 项目会编译失败**。

##### 反例:循环依赖怎么形成 + 怎么断开

**真循环的物理形态**(朴素方案常见):

```java
// .usecase/TransitionWorkOrderUseCase.java
import com.workorder.adapter.persistence.OracleWorkOrderRepository;  // ❌ 直接 import 实现类

// .adapter.web/WorkOrderController.java
import com.workorder.usecase.TransitionWorkOrderUseCase;  // ← 这条本身没问题
```

⚠️ 现在 `.usecase` ↔ `.adapter` **双向 import** —— Maven 多模块直接编译失败。

**整洁架构怎么断开**(通过 DIP 反转,§0.3):接口在内层定义,实现在外层 → `.usecase` → `.adapter` 那条 import 不存在了 → cycle 断开。

##### 记忆口诀

> **依赖 = `import` = 编译顺序 = 谁能没有谁活下来**

##### 自检方法:你的项目算不算干净?(两个物理实验)

**实验 1:classpath 移除测试**

> 把 `spring-boot-*.jar`、`spring-*.jar`、`mysql-connector-*.jar`、`kafka-clients-*.jar` 等框架/驱动 jar **从 `.entity` 和 `.usecase` 模块的 classpath 移除**,然后 `mvn compile` 看能不能编译过。
>
> - ✅ 编译过 = **干净** —— 业务核心代码完全独立,不依赖任何框架
> - ❌ 编译报错 = **不干净**,业务核心已被框架污染

**实验 2:独立 jar 发布测试**

> 把 `.entity` + `.usecase` 这两个包**单独打成 jar**(`workorder-core.jar`),发布到 Maven 仓库。
>
> - 这个 jar 应该**只依赖 JDK 标准库**,体积通常 < 100KB
> - 其他项目想接入这套业务核心 → 直接 `<dependency>workorder-core</dependency>` 就行

这是 Why 阶段 11 条原则中 **REP(Reuse-Release Equivalence Principle)** 在整洁架构里的物理实现 —— **业务核心 = 一个可独立发布的单元 = 跨项目可复用**。

> 💬 用户原话(2026-05-06):
> "怎么识别或者检验呢?就是如果去掉 springboot 或者 spring 的依赖,在 classpath 上去掉,那么核心的代码还是否能编译过?"
> "核心业务流程可以单独发布 jar 包,来共享。"

#### §0.2.1 依赖规则的具体形态(Java import 限制)

- `.entity` 包内:**不能 import 任何外层**(Spring、JPA、Jackson 都不行)
- `.usecase` 包内:可以 import `.entity`,但**不能 import** `.adapter` / `.framework`
- `.adapter` 包内:可以 import `.entity` 和 `.usecase`,可以用框架标准接口(`javax.servlet.HttpServletRequest`)
- `.framework` 在最外:可以装配所有内层

### §0.3 边界 + DIP 反转

**因为 [C1](#c1--ocp-失败陷阱) + [C2](#c2--技术栈供应商不可控)**(OCP 失败 + 技术栈不可控)
   ↓
**要解决**:Use Case 一定需要"持久化"/"调外部 API"等外层能力,但又不能引用外层 — 看似矛盾
   ↓
**所以引入 DIP 反转**:Use Case 自己**定义接口**(称作"输出边界" / Output Boundary),Adapter 层**实现这个接口**;依赖箭头是 Adapter→UseCase,不是 UseCase→Adapter。

```java
// 在 .usecase 包(内层) — 接口定义
public interface WorkOrderRepository {
    WorkOrder findById(Long id);
    void save(WorkOrder w);
}

// 在 .adapter.persistence 包(外层) — 实现内层定义的接口
public class OracleWorkOrderRepository implements WorkOrderRepository { ... }
public class DmWorkOrderRepository    implements WorkOrderRepository { ... }
```

**国产化切换** = 加一个 `DmWorkOrderRepository` + 改 `application.yml`,**内层零修改**。这是 DIP 的工程价值,§2.3 信创对照表会展开。

### 三件事对照

| 第 X 件事 | 是什么 | 为什么存在(出自哪条约束) |
|---|---|---|
| **同心圆四层** | 把代码分到 4 个圈,内圈最稳、外圈最易变 | [C3](#c3--复杂度涌现) + [C5](#c5--改动代价--波及面-元约束) |
| **依赖规则** | **依赖向内而生** —— 任何 `import` / 引用只能指向更内的层(外层可依赖内层,内层绝不依赖外层) | [C2](#c2--技术栈供应商不可控) + [C5](#c5--改动代价--波及面-元约束) |
| **边界 + DIP 反转** | 内层定义接口,外层实现接口 | [C1](#c1--ocp-失败陷阱) + [C2](#c2--技术栈供应商不可控) |

**三件事如何嵌套**:同心圆是**容器**(代码摆在哪一格);依赖规则是**铁律**(格之间怎么连);DIP 是**穿越规则的合法通道**(没有它,内层就被外层卡住没法工作)。

## §2 同心圆四层细看

### §2.0 核心命题:Entity + Use Case 是业务内核,可单独编译

整个整洁架构的工程价值都从这一句出来。下面 4 层各自的职责,围绕这一句展开:

- **Entity + Use Case(内核)**:不依赖 spring/jpa/mysql/kafka,删掉外层 jar,这两层仍能 `javac` 通过(参见 §0.2.0 自检实验)
- **Adapter + Framework(外圈)**:跟具体技术栈 / 框架 / 容器绑定;它们是**为内核服务的**,不是反过来

判断"层级是否分清"的最简单测试:**把 `.entity` + `.usecase` 单独打 jar,能不能跨项目复用?能 = 内核成立;不能 = 业务跟框架混在一起了。**

### §2.1 Entity 层(最内,最稳定)

- **装**:**企业业务规则** —— 跨任何用例都不变的不变性。`WorkOrder` 的状态机(已关闭单不能再扭、扭转必须按 PENDING→IN_PROGRESS→CLOSED 顺序)。
- **不装**:任何 ORM 注解(`@Entity`、`@Column` 都不许)、任何序列化注解(`@JsonProperty` 不许)、任何 Spring 注解。
- **它依赖谁**:**只依赖 JDK 标准库**。打开 `.entity` 任意一个 .java,顶部不能有 `import org.springframework.*` / `import javax.persistence.*` / `import com.fasterxml.jackson.*`。
- **关联约束**:[C2](#c2--技术栈供应商不可控) + [C4](#c4--测试反馈速度) —— Entity 不依赖任何框架 → 业务核心可单测(0.001s)、可换框架。

### §2.2 Use Case 层(应用业务规则)

- **装**:**单个用例的工作流编排** —— 每个 Use Case 类负责一个用例(`TransitionWorkOrderUseCase`、`DispatchWorkOrderUseCase`、`CloseWorkOrderUseCase`)。
- **不装**:Entity 自身的不变性(那是 Entity 的事)、HTTP/DB/MQ 的具体翻译(那是 Adapter 的事)。
- **它依赖谁**:Entity + 自己定义的输出边界接口(如 `WorkOrderRepository`)。**不依赖任何框架**。
- **关联约束**:[C1](#c1--ocp-失败陷阱) + [C4](#c4--测试反馈速度) —— 一个 Use Case = 一个用例;新需求 = 加一个 Use Case 类(OCP);注假实现可单测。

> **Entity + Use Case 一起构成业务内核**,可独立编译、独立发布 jar(参见 §0.2.0 自检实验)。这是整洁架构最值钱的工程价值 —— 一切其他细节都为这一点服务。

### §2.3 Adapter 层(转接层 / 翻译层)

- **装**:**两类翻译器**:
  - **入站(Driver)**:`WorkOrderController`(HTTP → 命令)、MQ Consumer、定时任务调度器
  - **出站(Driven)**:`OracleWorkOrderRepository`(Entity → SQL)、外部 HTTP 客户端、邮件发送器
- **不装**:业务规则(任何业务规则都该往内层挪)、框架启动器(那是 Framework 的事)。
- **它依赖谁**:Use Case + Entity + 框架的**标准接口**(`javax.servlet.HttpServletRequest`、`javax.sql.DataSource`)。
- **关联约束**:[C1](#c1--ocp-失败陷阱) + [C2](#c2--技术栈供应商不可控) —— 接口在内层定义,Adapter 实现;切实现 = 加一个 Adapter,内层零修改。

#### §2.3.1 信创对照:Oracle → 达梦 = 只改这一层

```
.adapter.persistence/
  ├── OracleWorkOrderRepository.java   ← 旧实现保留(可灰度)
  └── DmWorkOrderRepository.java       ← 新加(实现同一接口)
```

**改动范围**:`.adapter.persistence` 一个包 + `application.yml` 一处 DataSource。

| 改动维度 | 朴素方案(无整洁架构) | 整洁架构 |
|---|---|---|
| 改动包数 | 全项目 | **1 个包** |
| 改动文件数 | 几十~上百 | **2~3 个** |
| 内层(`.entity` + `.usecase`)改动 | 散落 | **0 处** |
| 单测重跑 | 全部 | 仅 `.adapter.persistence` |
| 上线灰度 | 难(改动面广) | 易(同一接口两实现可双跑对比) |
| 回滚 | 改回去依然要改全项目 | 改 `application.yml` 一行 |

> 这是 DIP 的工程价值的一次性兑现 —— 平时多写几行 `WorkOrderRepository` 接口,迁移时省下指数级工作量。这正是 [C2](#c2--技术栈供应商不可控)(技术栈不可控)+ [C5](#c5--改动代价--波及面-元约束)(改动 ∝ 波及面)叠加在一起的实际收益。

### §2.4 Framework 层(最外,最易变)

- **装**:Spring Boot 启动器、`application.yml`、Tomcat / 东方通容器配置、JPA Dialect 配置、`@Configuration` + `@Bean` 装配代码(包括 `UseCaseConfig`,在最外层把 `.usecase` 的纯 Java 类装配进 Spring 容器)。
- **不装**:**任何业务代码**。这一层是"组装厂",不是"工厂车间"。
- **它依赖谁**:所有内层(它装配它们)。
- **关联约束**:[C2](#c2--技术栈供应商不可控) —— 框架/容器隔离在最外层;换框架 = 改 Framework 层,Use Case 零修改。

#### §2.4.1 信创对照:Spring Boot → 东方通 = 只改这一层

| 改动维度 | 改动范围 |
|---|---|
| **Framework 层** | ✅ 重写(启动器换、`@Configuration` 装配代码改) |
| **Adapter 层** | ❌ **零改动**(`@RestController` 是 Servlet 标准接口,东方通也支持) |
| **Use Case + Entity** | ❌ **零改动**(本来就不依赖任何框架) |

> 跟 §2.3.1 信创对照对比看 —— **两类信创迁移改动的层完全不同**:Oracle→达梦 只动 Adapter,Spring Boot→东方通 只动 Framework。这是 4 层分离的工程价值最尖锐的体现。

### §2.5 ⚠️ 常见疑问:Adapter 和 Framework 能合并成一层吗?

**直觉**:Controller(Adapter)已经在用 `@RestController`,Framework 层薄薄一层只放装配 + yml,**合一不行吗**?

**这个直觉来自工程现实**:很多 Spring Boot 教程里两层确实糊在一起 —— `SpringBootApplication.java` 跟 `XxxController.java` 经常在同一个 src 包下。

**戳破**:不行 —— 两层本质不同:

| | Adapter | Framework |
|---|---|---|
| 装什么 | 翻译器(Controller / Repository 实现 / MQ) | 装配 + 启动 + 容器 |
| 改动频率 | **高**(每次新需求改) | **低**(几年改一次) |
| 替换粒度 | **增量**(加新 Adapter 不影响别的) | **整体**(整个换框架) |

**信创证据**:对照 §2.3.1(Oracle→达梦 只动 Adapter)跟 §2.4.1(Spring Boot→东方通 只动 Framework)—— 两类迁移改动的层完全不同。合并就丢了"换 Framework 不震荡 Adapter" 的关键工程价值。

**判别尺子**:你需要"框架可独立替换"(信创、容器升级)吗?
- ✅ 需要 → **必须分 4 层**
- ⚠️ 短期项目 / PoC → 可妥协合并

> 用户公司信创(Oracle→达梦 + Spring Boot→东方通)预期内 → **必须 4 层分离**。
>
> 💬 用户原话(2026-05-06):"adapter 与 framework 层其实可以融合成一层,感觉两层层次没有那么明显。"
> 直觉来自小型项目工程现实(确实很多项目两层混);但对**信创预期内**项目错。

## §3 最小伪代码 demo

```java
// ━━━ .entity/WorkOrder.java —— 不 import 任何框架
package com.workorder.entity;

public class WorkOrder {
    private Long id;
    private WorkOrderStatus status;
    private Long assigneeId;
    private Instant dispatchedAt;

    public void transitionTo(WorkOrderStatus target) {
        if (this.status == WorkOrderStatus.CLOSED) {
            throw new IllegalStateException("已关闭工单不能再扭转");
        }
        if (!isLegalTransition(this.status, target)) {
            throw new IllegalStateException("状态机非法扭转: " + this.status + " → " + target);
        }
        this.status = target;
    }
}

// ━━━ .usecase/WorkOrderRepository.java —— 输出边界(接口在内层)
package com.workorder.usecase;
import com.workorder.entity.WorkOrder;

public interface WorkOrderRepository {
    WorkOrder findById(Long id);
    void save(WorkOrder w);
}

// ━━━ .usecase/TransitionWorkOrderUseCase.java —— 纯 Java,零 Spring
package com.workorder.usecase;

public class TransitionWorkOrderUseCase {
    private final WorkOrderRepository repo;
    private final NotificationGateway notifier;

    public TransitionWorkOrderUseCase(WorkOrderRepository repo, NotificationGateway notifier) {
        this.repo = repo;
        this.notifier = notifier;
    }

    public void execute(Long id, Long currentUserId, WorkOrderStatus target) {
        WorkOrder w = repo.findById(id);
        if (!w.getAssigneeId().equals(currentUserId)) {
            throw new SecurityException("仅派单人可扭转");
        }
        if (Duration.between(w.getDispatchedAt(), Instant.now()).toHours() > 48) {
            throw new IllegalStateException("扭转必须在派单 48h 内");
        }
        w.transitionTo(target);   // ← 进 Entity,不变性由 Entity 守
        repo.save(w);
        notifier.notifyTransition(w);
    }
}

// ━━━ .adapter.web/WorkOrderController.java
package com.workorder.adapter.web;
import org.springframework.web.bind.annotation.*;

@RestController
public class WorkOrderController {
    private final TransitionWorkOrderUseCase useCase;

    @PutMapping("/api/workorders/{id}/transition")
    public ResponseEntity<?> transition(@PathVariable Long id,
                                        @RequestBody TransitionReq req,
                                        @AuthenticationPrincipal User user) {
        useCase.execute(id, user.getId(), req.getTo());
        return ResponseEntity.ok().build();
    }
}

// ━━━ .adapter.persistence/OracleWorkOrderRepository.java
package com.workorder.adapter.persistence;
import com.workorder.usecase.WorkOrderRepository;
import com.workorder.entity.WorkOrder;
import org.springframework.stereotype.Repository;

@Repository
public class OracleWorkOrderRepository implements WorkOrderRepository {
    @Autowired private JdbcTemplate jdbc;

    public WorkOrder findById(Long id) {
        WorkOrderPo po = jdbc.queryForObject(
            "SELECT * FROM WORK_ORDER WHERE ID = ?", new WorkOrderPoMapper(), id);
        return po.toEntity();
    }

    public void save(WorkOrder w) {
        WorkOrderPo po = WorkOrderPo.fromEntity(w);
        jdbc.update("UPDATE WORK_ORDER SET STATUS = ?, ... WHERE ID = ?", po.status, ..., po.id);
    }
}

// ━━━ .framework/UseCaseConfig.java —— 在最外层装配 .usecase 的纯 Java 类
package com.workorder.framework;
import com.workorder.usecase.*;
import org.springframework.context.annotation.*;

@Configuration
public class UseCaseConfig {
    @Bean
    public TransitionWorkOrderUseCase transitionWorkOrderUseCase(
            WorkOrderRepository repo,
            NotificationGateway notifier) {
        return new TransitionWorkOrderUseCase(repo, notifier);
    }
    // 其他 Use Case 在这里逐一 @Bean 装配
}
```

**关键点**:
- `WorkOrder` 和 `TransitionWorkOrderUseCase` **零 Spring import** → 满足 §0.2.0 自检实验 1
- `WorkOrderRepository` **接口在 `.usecase`**(内层),实现在 `.adapter.persistence`(外层) → DIP 反转
- `.entity` + `.usecase` 可单独打 jar → 满足自检实验 2(REP 原则)
- Spring Boot → 东方通时,业务核心(上面前 3 段)一行不动

## §4 三个常见误解

### 误解 1:Use Case 不就是 Service 改了个名?

**戳破**:Spring 的 Service 不区分"应用业务规则"和"协调编排",经常一个 Service 既校验业务又拼数据 —— 100 行起步,慢慢长成 [C3](#c3--复杂度涌现) 的"超级类"。

**Use Case 严格只做协调**:
1. 通过 Repository 接口取 Entity
2. 校验工作流约束(派单人 / 时间窗)
3. 调 Entity 的业务方法(把不变性的校验交给 Entity 自己做)
4. 通过 Repository 接口落库
5. 通过 Notifier 接口发通知

**Entity 自己的不变性(已关闭单不能扭)严禁写在 Use Case**,否则换一个 Use Case 同一条不变性要再写一遍 —— 违反 [C5](#c5--改动代价--波及面-元约束)(改动 ∝ 波及面)。

### 误解 2:Entity 就是 JPA 的 `@Entity`

**戳破**:JPA `@Entity` 是 ORM 的标记,业务上的 Entity 是"企业业务规则的载体"。**两者维度完全正交**。

整洁架构里 Domain Entity (`WorkOrder`) 不能 import `javax.persistence.*` —— 它是纯 Java 类。Adapter 层另写一个 ORM 映射类(称作 PO / `WorkOrderJpaPo`)负责表-类映射 + Entity ↔ Po 的转换。

### 误解 3:Adapter = MVC Controller

**戳破**:Adapter 是更广义的"翻译器"概念,不是 Spring MVC 的 Controller 一种。

| Adapter 子类 | 例子 | 翻译方向 |
|---|---|---|
| **入站 Adapter**(Driver) | `WorkOrderController`(HTTP→命令)| 外→内 |
| | MQ Consumer(消息→命令) | 外→内 |
| | 定时任务(时间触发→命令) | 外→内 |
| **出站 Adapter**(Driven) | `OracleWorkOrderRepository`(Entity→SQL)| 内→外 |
| | 外部 HTTP 客户端(命令→第三方 API)| 内→外 |
| | 邮件 / 短信发送器 | 内→外 |

只把 "Adapter" 等同于 Controller,你就**只看到一半**(入站那一半)。出站 Adapter 才是 DIP 反转的主战场。

## §0 从 How 走到 Origin:三件事记住

How 阶段把 5 条约束精确化成"同心圆四层 + 依赖规则 + DIP 反转"3 个结构 —— 但**一个关键问题没回答**:这套结构是 Bob 大叔凭空发明的吗?他本人凭什么 2017 年还能把这套总结成经典?

Origin 阶段回答这个问题。三件事:

### §0.1 撞墙时刻(1995 前后):方法论会过时,原则更稳定

**因为 [C2](#c2--技术栈供应商不可控)**(技术栈不可控)
   ↓
**Bob 大叔遇到的具体痛点**:1995 年他写了一本书《Designing Object-Oriented C++ Applications using the Booch Method》—— 用 Grady Booch 的方法论。**3 年后 UML 把 Booch method 替代了**,这本书的方法论部分**直接被时代淘汰**。
   ↓
**他领悟到**:**方法论会过时(Booch → UML),但其背后的原则(信息隐藏 / 依赖反转)更稳定**。后来他把精力从"教某种方法论"转向"提炼跨方法论的原则"—— SOLID 5 原则(1998-2001)就是在这个反思下成型的。

### §0.2 顿悟时刻(2012 8/13):4 套架构合一,提炼"依赖规则"

**因为 [C5](#c5--改动代价--波及面-元约束) + [C2](#c2--技术栈供应商不可控)**(改动 ∝ 波及面 + 技术栈不可控)
   ↓
**Bob 大叔遇到的具体场景**:2010 年前后业内已经存在 **4 套很相似但各说各话**的架构 —— Cockburn 的 Hexagonal(2005)、Palermo 的 Onion(2008)、Jacobson 的 BCE(1992)、Coplien & Reenskaug 的 DCI(2009)。每套都在解决"分离关注点"的同一个问题,但**用不同的图、不同的命名、不同的术语**;读者很迷茫。
   ↓
**他做的关键事**:把这 4 套合成一个统一的同心圆图(2012 年 8 月 13 日博客《The Clean Architecture》),提炼出**一条统领规则**:"**依赖规则:同心圆的依赖只能向内而生 —— 外层可以依赖内层,但内层绝对不能依赖外层**(The Dependency Rule: source code dependencies can only point inwards)" —— 这是 Clean Architecture 真正的"原创贡献"。

> **注**:本文档凡提到"向内依赖 / 依赖向内"的地方,**都明确指『向内而生』** —— 即**外层可以依赖内层,但内层绝不依赖外层**;这是 Clean Architecture 的核心方向性,任何反向依赖都破坏整套架构。后文出现"依赖向内而生"短语时,语义同此。

### §0.3 反思时刻(2018 之后):工业界把"原则"误读成"模板"

**因为 [C1](#c1--ocp-失败陷阱) + [C2](#c2--技术栈供应商不可控)**(OCP 失败陷阱 + 技术栈不可控)
   ↓
**Bob 大叔事后看到的现实**:Clean Arch 在工业界**两个核心思想被偷走**:① 工程师把它理解成"4 个文件夹的模板"(违背"依赖规则" 这一本质);② DI framework(尤其 Spring)被滥用,业务代码大量 `import` 框架定义的接口(`JpaRepository<T>`),DIP 失真成"假反转"。**这两个误读今天还在大量发生** —— 你公司的屎山就是这两条的活样本。

**这一条远比表面看起来深** —— 工业界 9 年没好转的根因不是"信息没流通"(这本书全球销量超 50 万册),而是**人性短板**(趋利避害 / 短视 / 想当然 / 没真正理解就自以为是地做)让 Bob 大叔的方法论难以落地。**在 §6 把这条历史性反思深挖到第一性原理高度**;**在 §6.6 桥梁段连到 Synthesis 阶段的 AI 主轴**(AI 工具如何弥补这些人性短板,是软件工程史上的历史拐点)。

### §0.4 三件事横向对照表

| 时刻 | 是什么 | 为什么存在(对应 Cn) |
|-----|-------|------------------|
| **1995 撞墙** | Booch 方法论书被时代淘汰 → 转向"原则优先" | C2:方法论(技术栈)会过时,原则才稳定 |
| **2012 顿悟** | 4 套架构合一,提出"依赖规则" | C5 + C2:依赖规则把"控制波及面"变成可执行的工程纪律 |
| **2018 反思** | 工业界把"依赖规则"误读成"分层模板"+ DI 框架滥用,**根因是人性短板**(§6 深挖) | C1 + C2:OCP 失败 + 技术栈被错误地穿到内层;但人性才是落地失败的元凶(§6) |

## §2 起:1995 一本被时代淘汰的书

### §2.1 那本书

1995 年 Bob 大叔出版《**Designing Object-Oriented C++ Applications using the Booch Method**》(Prentice Hall, ISBN 0-13-203837-4)—— **一本完全建立在 Grady Booch 方法论之上的书**(《Object-Oriented Analysis and Design with Applications》,1991)。Booch method 在 1990s 早期是 OO 设计的主流之一,跟 Rumbaugh 的 OMT、Jacobson 的 OOSE 三足鼎立。

### §2.2 撞墙

1996-1997 年,**UML 1.0 发布** —— Booch、Rumbaugh、Jacobson 三人合作,把 3 套方法论合并成 UML 标准。Booch method 作为独立方法论**被 UML 替代**;Bob 大叔这本 1995 年的书,**核心方法论部分直接过时**。

这是他第一本独立专著,出版 2 年就遭遇这种"被时代淘汰"的事件 —— 这个具体撞墙不像 Doug Lea 写 dlmalloc 时遇到的"碎片严重"那么具体,但**对 Bob 大叔的思想转向有决定性意义**:他后来 多次在博客和访谈里强调 **"原则比方法论更稳定"**,这本 1995 书的命运就是这个反思的源头。

### §2.3 转向:从教方法论 → 提炼原则

1995 年同年他创立 **Object Mentor**(咨询公司),早期主营业务是教 OO/OOAD。但客户的真实问题是 **"OO 写久了照样变屎山"** —— 这跟"用什么方法论画 UML"关系不大,跟"依赖怎么管"关系巨大。**他的核心问题从"工具"转向"原则":什么样的依赖关系下,代码不会变屎山?**

这是后来 SOLID(1998-2001)和 Clean Architecture(2012)的萌生土壤 —— 一切都从"方法论会过时"这个撞墙时刻起步。

> **takeaway**:**方法论是手段,原则是目的**。1995 那本被淘汰的书,逼 Bob 大叔从"教 Booch method"走向"提炼跨方法论的依赖原则"—— 这是 **C2(技术栈不可控)在他个人思想史上的具体撞墙**。

## §3 接力棒前辈:"4 合 1" 的 4 套架构源头

2012 年那张同心圆图,Bob 大叔自己在博客里**明确列出**它合并的前身架构。原话:

> "Though these architectures all vary somewhat in their details, they are very similar.
> They all have the same objective, which is the separation of concerns. They all achieve
> this separation by dividing the software into layers."
> —— Robert C. Martin, *The Clean Architecture*, 2012-08-13

(译:这些架构在细节上虽各有不同,但**非常相似**。它们目标完全一致 —— 分离关注点;它们都通过**把软件分层**来达成这一目的。)

这 4 套架构各自从某个特定角度回答了"分离关注点"。Bob 大叔的合成不是抹平差异,是**找到它们的共性"依赖规则",然后用一张图统一**。

### §3.1 Hexagonal Architecture(Cockburn,2005)

**创作者**:Alistair Cockburn —— Agile Manifesto 17 人中另一位(他和 Bob 大叔同框签 2001 年 Agile Manifesto)
**发表时间**:2005-09-04(此前在 Portland Pattern Repository wiki 上有讨论)
**原始 URL**:`https://alistair.cockburn.us/hexagonal-architecture/`

**Cockburn 当年的具体痛点**(他自己原话):

> "to avoid known structural pitfalls in object-oriented software design,
> such as **undesired dependencies between layers** and **contamination of user
> interface code with business logic**."

(译:为了避免 OO 软件设计的已知结构缺陷 —— **层间不当依赖** + **UI 代码污染业务逻辑**。)

**核心贡献**:**Ports & Adapters** 模型 —— 业务核心是中央六边形(六边形不是因为非要 6 个端口,只是给绘图留空间),外围都是端口(应用程序对外的协议)+ 适配器(端口的具体实现);**端口是业务定义的抽象,适配器是业务的具体实现** —— 这条 30 年后还在每本架构书里被复述。

### §3.2 Onion Architecture(Palermo,2008)

**创作者**:Jeffrey Palermo —— 当时是 .NET 社区资深架构师,Headspring Systems 联合创始人
**发表时间**:2008-07-29(《The Onion Architecture: part 1》;part 2/3 在同年 8 月)
**原始 URL**:`https://jeffreypalermo.com/2008/07/the-onion-architecture-part-1/`

**Palermo 当年的具体痛点**:他在博客中精确指出 —— 传统分层架构(UI → Business → Data Access)创造了"**过度耦合**":每一层都依赖它下面的层,**UI 和 业务逻辑通过传递依赖被绑死到数据访问层**。而**数据访问技术每 3 年左右就变一次**(SQL Server → ORM → NoSQL),这个耦合让应用每隔几年就要重写一次。

**核心贡献**:**同心圆 + 依赖规则** 的雏形(原话):

> "**All code can depend on layers more central, but code cannot depend on layers
> further out from the core.** In other words, all coupling is toward the center."

(译:所有代码可以依赖更靠中心的层,但**不能依赖更外层**;一切耦合都向中心。)

—— 这一句**几乎是 Bob 大叔 2012 "依赖规则" 的直接前身**。Palermo 已经画出了同心圆,Bob 大叔做的是把它和其他 3 套架构合并 + 命名得更响。

### §3.3 BCE / EBI(Jacobson,1992)

**创作者**:Ivar Jacobson —— OOSE 之父,UML 三巨头之一(另两位:Booch、Rumbaugh)
**发表时间**:1992 年,在书《**Object-Oriented Software Engineering: A Use Case Driven Approach**》(Addison-Wesley)
**原始名**:**Entity-Interface-Control(EIC)**;后改名为 **Boundary-Control-Entity(BCE)**,改名原因是"Interface"会跟 Java 等语言里的 `interface` 关键字、跟"User Interface"概念混淆

**核心贡献**:**Use Case 驱动 + 三类对象**:
- **Entity**:跨用例稳定的业务对象(领域模型) —— 这个名字直接被 Bob 大叔保留进了 2012 同心圆图最内层
- **Boundary**(原 Interface):用例与外界的接口(UI / API)
- **Control**:特定用例的协调器(Use Case 内部的工作流)

**给 Clean Arch 的接力棒**:Bob 大叔同心圆中**Use Case 层的概念**直接来自 Jacobson 的 Control + Entity 拆分 —— "**应用业务规则**(Use Case)"和"**企业业务规则**(Entity)"的区分,几乎就是 Jacobson 1992 年 Control / Entity 的现代命名。

### §3.4 DCI(Coplien & Reenskaug,2009)

**创作者**:**Trygve Reenskaug**(MVC 模式的发明人,1979)+ **James Coplien**(《Advanced C++ Programming Styles and Idioms》作者,Pattern 社区核心成员)
**发表时间**:2009 年 3 月,论文《**The DCI Architecture: A New Vision of Object-Oriented Programming**》(Artima)
**核心思想**:**Data**(稳定的数据结构)/ **Context**(用例运行的上下文)/ **Interaction**(用例中对象间的交互角色)

**给 Clean Arch 的接力棒**:DCI 强调**用例(Use Case)在运行时是临时的、由角色组合而成的"剧本"**,而 Data 是跨用例稳定的部分 —— 这跟 Clean Arch 的"Use Case 层薄、Entity 层稳"完全同构。Bob 大叔把 DCI 的"Data"折叠进了 Entity 层,把"Context + Interaction"折叠进了 Use Case 层。

### §3.5 接力棒回看:Parnas + Meyer 是更早的源头

接力棒不只是上面 4 套。Bob 大叔 SOLID 5 原则中最关键的两条 —— **DIP 和 OCP** —— 都有更早的源头(图中顶部橙色):

| 原则 | 接力棒源头 | 年份 |
|-----|-----------|------|
| **DIP**(依赖反转) | David Parnas《On the Criteria To Be Used in Decomposing Systems into Modules》(信息隐藏) | 1972 |
| **OCP**(开闭原则) | Bertrand Meyer《Object-Oriented Software Construction》(命名 OCP 这个名字) | 1986/1988 |

Bob 大叔 1990s 末把这些原则**重新命名 + 重新组合 + 工业化推广**,但思想本身可追溯到 1970s。

> **§3 takeaway**:Clean Architecture 的"分离关注点 + 依赖向内而生 + 4 层同心圆"思想,**没有一条是 Bob 大叔原创的**。Hexagonal 给了 Ports & Adapters,Onion 给了同心圆 + 依赖向内而生(外层依赖内层,内层不依赖外层)的雏形,BCE 给了 Use Case + Entity 拆分,DCI 给了"Data 稳 + Context 短"的思维框架。**Bob 大叔的关键贡献在 §4 那一刻 —— 合成动作本身**。

## §4 转:2012 8/13 那一刻 —— Bob 大叔的"合成动作"

### §4.1 戏剧场景

2012 年 8 月 13 日,Bob 大叔在他个人博客 `blog.cleancoder.com` 发布了一篇短文,标题就叫 **《The Clean Architecture》**(`https://blog.cleancoder.com/uncle-bob/2012/08/13/the-clean-architecture.html`)。

**这篇博客的开篇就在做"合并"动作**:

> "Over the last several years we've seen a whole range of ideas regarding the
> architecture of systems. These include:
> - **Hexagonal Architecture** (a.k.a. Ports and Adapters) by Alistair Cockburn
> - **Onion Architecture** by Jeffrey Palermo
> - **Screaming Architecture** from a blog of mine last year
> - **DCI** from James Coplien, and Trygve Reenskaug
> - **BCE** by Ivar Jacobson
>
> Though these architectures all vary somewhat in their details, they are very similar..."

—— **这就是 Bob 大叔自己宣告"我在做合成动作"的原话**。

### §4.2 关键洞察:依赖规则

合成不是简单"把 4 套画在一起"。Bob 大叔提出了一条**统领所有这些架构的规则** —— **依赖规则(The Dependency Rule)**(原话):

> "The overriding rule that makes this architecture work is **The Dependency Rule**.
> This rule says that **source code dependencies can only point inwards**.
> Nothing in an inner circle can know anything at all about something in an outer circle."

(译:让这个架构起作用的统领规则是**依赖规则**。它说:**同心圆的依赖只能向内而生 —— 外层可以依赖内层,但内层绝对不能依赖外层**。内圈里不能知道外圈的任何东西。)

——这一条 **3 句话**,把 Hexagonal / Onion / BCE / DCI 4 套架构的本质**抽象到极简**:它们都遵守"**依赖向内而生**"(外层依赖内层,内层绝不依赖外层)。这是 Bob 大叔在那一天**真正"创造"的东西**(虽然他自己说"也不是新东西,只是合成命名")。

### §4.3 这一刻为什么是 Origin 的戏剧高潮

3 个理由:

1. **同心圆图第一次被画出来**(此前 Hexagonal 是六边形;Onion 已经有同心圆但只到 4 层;DCI 没图;BCE 是三角形)。Bob 大叔 2012 年那篇博客**第一次**给出了今天我们熟悉的 4 层同心圆(Entities / Use Cases / Interface Adapters / Frameworks & Drivers)
2. **"依赖规则"这个名字第一次被提出**。"Dependency Rule"成为后续 Clean Architecture 教学的核心术语 —— 一个专属命名让概念有了传播抓手(从此读者只要记住一句"**依赖向内而生 —— 外层可依赖内层,内层绝不依赖外层**"就能讲清楚同心圆架构的本质)
3. **"合成 + 命名 + 推广"3 件事被一篇博客同时完成**。这 3 件事单独看每件都不算原创,但**合在一起做并被工业界接受**,是 Clean Architecture 这本书 5 年后能成经典的根本原因

### §4.4 从 2012 博客到 2017 成书

2012 博客发布后 5 年,Bob 大叔把这一思路**扩展成一本完整的书**(2017 出版,512 页)。书里:

- §I-§II 部分:回顾 OOP / 函数式 / 结构化编程的核心(铺垫)
- §III-§IV 部分:**SOLID 5 原则 + 组件 6 原则**(全本的密度最高的章节,大量引用 1995 后他自己 17 年的工作)
- §V-§VI 部分:Clean Architecture 完整论述(2012 博客的扩展版)+ 案例研究

**书 ≠ 博客**:博客只讲合成动作 + 依赖规则;书把 Bob 大叔毕生关于 SOLID + 组件 + 测试 + 边界 + 跨语言模式的思考**全部串到这条主线上** —— 这就是为什么一本"思想都不是新的"的书还能成 2017 年后软件架构界的经典。

## §5 合:2017 成书 + 2018+ 两个核心遗憾

### §5.1 成书:65 岁那年的总结

Bob 大叔生于 1952 年,2017 年出版这本书时 65 岁,**这本书是他 1995-2017 这 22 年思想的集大成**。书的封面像一份建筑图纸 —— Bob 大叔自己在序言里说,他想让读者**像看建筑师的工程图一样看软件架构**。

但这本书出版至今 9 年(2017→2026),**工业界的现实远比这本书复杂** —— Bob 大叔自己也多次反思。下面是两个最核心的遗憾,以及一句话提及的第三个:

### §5.2 遗憾 A:被工业界误读为"4 层文件夹模板"

**这是 Clean Architecture 这本书最大的工业界滥用**:

工程师看到 Bob 大叔的同心圆图,把它**直接翻译成 Maven/Gradle 项目里的 4 个文件夹**(`entity/`、`usecase/`、`adapter/`、`framework/`),然后**就觉得"自己在做 Clean Arch"**。但他们完全没遵守"依赖规则" —— Use Case 类大量 `import` Spring 的 `@Service`、`@Autowired`、`JpaRepository<T>`,**内圈代码物理上"知道"外圈的存在**,Clean Arch 的核心已经被违背。

**Bob 大叔本人的态度**(在多个演讲和博客中反复说):

> "Clean Architecture is **NOT** a folder structure. It's about **dependencies**."

(他在 2017 年后多个演讲中至少 5 次以上说类似的话 —— 这句被他和他的学生 Simon Brown 反复重申,后者甚至给这本书写了一章"missing chapter" 专门讨论这个误读。)

**为什么这是真实的遗憾**:

- **直接连你公司的屎山** —— 你之前提到的"环境监测系统(Spring Boot + Oracle + MyBatis + Vue + 微信小程序)A 区代码 copy 到 B 区"是这条遗憾的活样本。如果原作者按"4 个文件夹"的形式做,但 Service 层 `import org.springframework`,那这个项目的"Clean Arch"是**形似而神离** —— 信创迁移(Spring Boot → 东方通)时,**核心代码同样要重写**,因为它本来就没"独立于框架"
- **回到 [C2](#c2--技术栈供应商不可控)**:形似的分层不能挡住技术栈不可控带来的破坏;能挡住的是"依赖规则"被严格遵守

**这条遗憾对你的可操作启示**:**判断你公司的项目是不是真 Clean Arch,看 Use Case 类的 `import`,不看文件夹分了几个**。这是 [C2](#c2--技术栈供应商不可控) 的工程经济价值的分水岭。

### §5.3 遗憾 B:DI Framework 的滥用 —— 假反转

**这是 Bob 大叔在 2010 年就预警、但工业界几乎完全没听的问题**。

DIP(依赖反转原则)的本意是:**业务定义抽象,框架/底层实现抽象**。但 Spring Data JPA 等框架带来的现实是 **完全相反**:

```java
// ❌ 假 DIP —— 接口由 Spring 定义,业务被锁死到 Spring
public interface WorkOrderRepository extends JpaRepository<WorkOrder, Long> {
}

// 业务核心 import 了 Spring 的接口
// → "依赖向内而生"被破坏:本应外层依赖内层,这里却变成内层 Use Case 反向依赖了外层 Spring
```

```java
// ✓ 真 DIP —— 接口由业务定义,Spring 在 Adapter 层实现
public interface WorkOrderRepository {  // 业务模块自定义,只依赖 JDK
    Optional<WorkOrder> findById(Long id);
    void save(WorkOrder wo);
}

// Adapter 层 implements 这个接口,Spring 在外圈
```

**Bob 大叔 2010 年的原话**(在博客《Dependency Injection Inversion》中):

> "I don't want framework code smeared all through my application. I want to keep
> frameworks **nicely decoupled and at arms-length** from the main body of my code."
>
> "I don't want to have **@Inject attributes everywhere** and bind calls hidden under rocks."
>
> "Dependency Injection doesn't require a framework; it just requires that you
> invert your dependencies and then construct and pass your arguments to deeper layers."
> —— Robert C. Martin, *Dependency Injection Inversion*, 2010-01-17

(译:我不想框架代码到处涂抹我的应用。我想框架被 **干净解耦,跟我代码主体保持手臂长度**。我不想 @Inject 标签遍地都是。DI 不需要框架 —— 你只要反转依赖,然后构造并传递参数到更深层即可。)

**他在 2016 年《A Little Architecture》博客中的精度补强**:

> "At runtime this is true. But at compile time we want the dependencies inverted.
> The source code of the high level policies should not mention the source code of
> the lower level policies."
> —— Robert C. Martin, *A Little Architecture*, 2016-01-04

(译:运行时这[依赖]是成立的。但**编译时我们要依赖反转**。高层策略的源代码不应提到低层策略的源代码。)

**为什么这是真实的遗憾**:

- 工业界把"用了 Spring DI = 做了 DIP"当公理,但 **Bob 大叔的 DIP 是编译时关系**(业务源码不 import 框架),不是运行时(框架在运行时帮忙装配)
- Spring Data JPA 这种 `extends JpaRepository<T>` 的"省事"模式,**把业务接口直接绑死到 Spring 上**,DIP 完全失效;这恰恰是 Bob 大叔反对的"@Inject 遍地"的现代版本
- 你 How 阶段花了大量篇幅讨论的"教科书派 vs 务实派"、"@Bean 装配 vs @Service 注解",根源就是这条遗憾 —— **业内 80% 的"Clean Arch"实现是『假 DIP』**

**这条遗憾对你的可操作启示**:**判断 DIP 是真是假,看 `WorkOrderRepository` 接口在哪个 Maven 模块**。如果在业务模块(只依赖 JDK)→ 真 DIP;如果在 Spring 模块(extends `JpaRepository`)→ 假 DIP。

### §5.4 这本书的"留白":为什么 Bob 大叔没讲"如何从 α 救出"

这本书 2017 年出版后 9 年间,工业界落地的真实分布(经验估计):

| 状态 | 描述 | 工业界占比 | 信创代价 |
|-----|------|----------|---------|
| **α 完全神离** | 连 4 个文件夹都没分,业务全在大 `@Service` 类里 + `extends JpaRepository` | ~50-60% | 几乎重写 |
| **β 形似神离** | 文件夹分了 entity/usecase/adapter/framework,但 Use Case 类内仍 `import org.springframework` + 接口 `extends JpaRepository<T>` | ~30-40%(自称做了 Clean Arch 的几乎都是这层) | 大改 |
| **γ 神似形离** | 没刻意分文件夹,但业务核心确实独立可编译(纯 Java + 自定义 interface) | <5%(罕见) | 小改 |
| **δ 部分到位** | 不同模块状态参差不齐 | ~5-10% | 看模块 |

**这本书的"留白"是 α → β/γ 的迁移路径几乎没讲**。Clean Architecture 这本书写的是 "**绿地理想架构**"(从一开始就建对 = What 阶段用户偏好的 B 路径),**对已有 α 屎山的救援几乎是空白**。Bob 大叔本人在书的 §V-§VI 部分举的所有例子都是"假设你从零开始"的语境。

**为什么这是真实的"留白"?**

1. **Bob 大叔不写"如何救援"的理由**:他在多个演讲里说"救援已有 legacy 代码不是『架构问题』,是『重构问题』",所以**有意把这部分留给重构社区**
2. **真正补上这块留白的人是 Michael Feathers**:2004 年出版《**Working Effectively with Legacy Code**》(Prentice Hall, ISBN 0-13-117705-2)—— 这本书**专门讲怎么把一个 α 状态的屎山改造成有测试 + 有边界的代码**;Bob 大叔自己在 Clean Architecture 的 References 里推荐过这本书(称其为 "essential reading")
3. **结果**:今天读 Clean Arch 的工程师 80% 在面对 α 屎山,但 Clean Arch 这本书**只告诉他『目标态长什么样』、几乎不告诉他『从屎山怎么走过去』** —— 这是这本书工业界最大的 expectation gap

**对 α 项目的可操作启示**(承上 What 阶段的"屎山救援"主题):

- **Clean Architecture 这本书是『目标态』** —— 告诉你信创迁移成功后的代码长什么样
- **《Working Effectively with Legacy Code》是『路径』** —— 告诉你从你今天的 α 状态怎么一步步走到那里
- **两本书要配套读**;只读 Clean Arch 会觉得"理想很美但路径不通",只读 Feathers 会觉得"知道怎么改但不知道改成什么样"
- **现实路径**:**α → β**(先分文件夹,把 `WorkOrder.java` 从 Service 类里拆出来作为 Entity)→ **β → γ**(再倒接口,业务定义 `WorkOrderRepository` 自定义 interface,Adapter 层 `OracleWorkOrderRepository implements`,接口本身只 `import` JDK)—— 信创迁移之前**必须**走完 β → γ,否则 Oracle→达梦 + Spring Boot→东方通时核心仍要重写

—— 这条留白的认知本身比"会用 Clean Arch"更重要 —— **它告诉你这本书不是万能的,要配合 Feathers 才能落到 α 屎山**。

### §5.5 遗憾 C(一句话提及):Agile Industrial Complex

Bob 大叔是 **2001 年 Agile Manifesto 17 位签署人**之一,但他在 2018 年的博客《**The Tragedy of Craftsmanship**》(`https://blog.cleancoder.com/uncle-bob/2018/08/28/CraftsmanshipMovement.html`)中**坦承自己对 Agile 的失望**:

> "The Agile movement got so involved with promoting conferences and with certifying
> Scrum Masters and Project Managers that they **abandoned the programmers**, and the
> values and disciplines of Craftsmanship."
>
> "They pushed so many project managers in, **they pushed the programmers out**."
> —— Robert C. Martin, *The Tragedy of Craftsmanship*, 2018-08-28

—— Agile 被项目管理 / 认证 / 培训机构接管,**程序员被挤出主场**;Bob 大叔从 Agile 转向了 **Software Craftsmanship**(软件匠艺)运动作为他的"复归"。这条遗憾跟 Clean Architecture 这本书的关系较间接(它影响了 Bob 大叔晚年的发声重心,而非这本书的内容),所以本节只一句话提及。

## §6 为什么 9 年了工业界还是 α/β?—— 不是技术问题,是人性短板

§5 那 4 条遗憾(分层模板误读 / 假 DIP / 留白 / Agile)看起来是 4 个独立问题,但**它们指向同一个根因** —— Bob 大叔的方法论假设了人会自律,**但人不自律**。

如果只是"信息没流通到位"的问题,9 年早够了 —— 这本书全球销量超 50 万册,各大公司技术读书会必备,中英文讲解视频上千个。**但工业界落地仍然是 50-60% α / 30-40% β / <5% γ**。这意味着遗憾不是『书没说清楚』,而是**说清楚了人也不会去做**。

下面是 4 条人性短板 —— 它们让"按 Clean Arch 写代码"在历史中始终是少数。**这 4 条不是缺陷,是默认状态**;Bob 大叔的方法论给的是"理性程序员"的设计,而**理性程序员不存在**。

### §6.1 趋利避害 —— 当季的人不承担 5 年后的账

**因为**:`extends JpaRepository<WorkOrder, Long>` 比自定义 `WorkOrderRepository` interface + `OracleWorkOrderRepository implements` **少写 10 行代码 + 少花半小时思考**。
   ↓
**短期账面**:省事 = 收益(下午 6 点能下班 vs 晚上 9 点还在拆接口)。
   ↓
**长期代价**:5 年后信创迁移那一刻代码要重写,但**那时做决策的不是当年写代码的人** —— 当年的工程师可能已经跳槽 / 升职 / 退休 / 换项目。
   ↓
**人性必然**:当季 KPI 视角下,**省事是 dominant strategy**;趋利避害是默认状态,不是"程序员不专业"。

→ 对应 [C2](#c2--技术栈供应商不可控) 留下的代价被时间错位转嫁。

### §6.2 短视 —— 5 年后的代价生理性看不见

**因为**:技术债的代价不在当季显形,**在 5 年后某个特定时刻才结账**(信创迁移 / DB 切换 / 框架升级 / 大并发场景)。
   ↓
**当季视角**:`extends JpaRepository` 跑得通 + 测试过 + 线上没炸 = 没问题。
   ↓
**5 年后视角**:这个项目要换 Spring Boot 为东方通,**所有 Use Case 的 import 都要改**,核心代码要重写 —— 而你在 2026 年这一刻看到的就是这个"5 年后"。
   ↓
**人性必然**:Daniel Kahneman《Thinking, Fast and Slow》(2011)证明的 **discounting bias** —— 人**几乎没有把 5 年后的代价折现到当季决策的能力**。这不是"不想看",是**生理性看不见**。

→ 对应 [C5](#c5--改动代价--波及面-元约束) 在跨时间维度上失效:决策者和承担者错位。

### §6.3 想当然 —— 看图就懂,谁还读 3 句话原文?

**因为**:同心圆图视觉冲击力极强 —— 看一眼 → 4 个文件夹的"直觉翻译"凭直觉就走完了。
   ↓
**几乎没人去查 Bob 大叔 2012 博客原文**里那核心的 3 句话:
> "The overriding rule that makes this architecture work is **The Dependency Rule**.
> This rule says that **source code dependencies can only point inwards**.
> Nothing in an inner circle can know anything at all about something in an outer circle."

**(译:让这个架构起作用的统领规则是『依赖规则』。它说:同心圆的依赖只能向内而生 —— 外层可以依赖内层,但内层绝对不能依赖外层。内圈里不能知道外圈的任何东西。)**
   ↓
**结果**:Bob 大叔精心设计的"依赖规则"3 句话**被绕过**,**只保留了图**。同心圆图 → 4 个文件夹 → 项目结构,链条完成,工程师"觉得自己懂了"。**绕过的代价**:工程师只看图凭直觉,看不出"依赖必须向内而生"这个方向性约束 —— 内层 import 外层在他眼里仍然合理(直觉里图是无方向的,只是"分了 4 层")。
   ↓
**人性必然**:**直觉是 dominant strategy**(看图秒懂 vs 读 3 句话英文原文 + 思考"什么是 source code dependencies");**直觉胜过原文**是默认状态。

→ 这条最让人扎心:**Bob 大叔越是把图画得好,越是被偷换概念**。

### §6.4 没真正理解就自以为是地做 —— "懂了" ≠ "能做"

**因为**:工程师的"懂了"和"能做"之间有一道**鸿沟**。
   ↓
**懂了** = 知道 Clean Arch 长什么样(同心圆 / 依赖规则 / 4 层)
**能做** = 在赶进度 / 加班 / 别人催的现实压力下,**仍然花 30 分钟思考清楚**"这个接口该业务定义还是框架定义",并且**真的把那 10 行多写出来**。
   ↓
**多数工程师停在"懂了"** —— 自以为已经做对,实际写出来还是 α/β。
   ↓
**人性必然**:Daniel Kahneman 的 **System 2 慢思考**(深思考、规划、抽象)**费力**;**System 1 快思考**(直觉、复制、模仿)在工作场景中是省力的 default;人在赶进度时**自动滑向 System 1**,所以"知道该怎么做"不会自动转成"做出来"。

→ 这条是 [C4](#c4--测试反馈速度) 在认知层面的对应:慢思考的反馈也是慢的(代码 5 年后的债),所以人本能避开。

### §6.5 不求甚解 + 变现导向 —— 学了皮毛就鼓吹,快速变现

**这是 4 条短板里最隐蔽、但杀伤力最大的一条** —— 它不是工程师"做错了什么",是**经济激励本身就让人理性地选择不深究**。

**因为**:Clean Arch / SOLID 这些概念在 2017 年 Bob 大叔成书后,在中文互联网+培训市场**变成了简历加分项 + 培训讲师认证 + 公众号流量入口** —— 一个工程师不需要真的写过几行 Clean Arch 代码,**只要能讲出 SOLID 5 条 + 同心圆 4 层,就能赢得"懂架构"的标签**。
   ↓
**经济激励的真实结构**:

| | 投入 | 变现 |
|---|------|------|
| **皮毛** | 看 1-2 篇博客 + 记 5 个英文缩写 | 简历过筛 / 写公众号 / 当讲师 / 面试讲架构 / 获评"高级工程师" |
| **深究** | 读 Bob 大叔原文 + 实战 5 年 + 多次重构 + 撞过若干坑 | 代码写得好(没人付钱)+ 自己心安(不变现) |

   ↓
**结果**:**很多人不是为了把代码写好才去学 Bob 大叔的,是为了能把"我懂 Clean Arch"挂嘴边**。皮毛知识被工业化量产 —— 培训机构的"3 天精通 Clean Architecture" / 公众号的"一文搞懂同心圆" / 面试官的"你能讲讲 SOLID 吗?" —— 这些东西**快速扩散成自相矛盾、半懂不懂的"行业共识"**。

**Spring DI = DIP 的等同关系**(假 DIP 的源头),本质就是这种快餐化传播的产物 —— **没有人真去查 Bob 大叔 2010 年那篇《Dependency Injection Inversion》博客**(它只用了 1 千字就讲清楚 DI 框架不是 DIP),所以"用了 Spring DI 就以为做了 DIP" 这个误读才能在工业界横行 15 年没被纠正。
   ↓
**人性必然**:**理性选择就是不求甚解** —— 在"皮毛高变现 + 深究低变现"的激励结构下,理性的工程师**应该**选皮毛(经济学意义上的最优解)。

> **关键洞察**:这条不是"工程师品德问题",是**激励错位的必然结果**。Bob 大叔方法论假设了"工程师为了把事做好而学习",**但工业界的学习从来都是为了变现而做的** —— 这条假设和经济现实**直接矛盾**。要靠呼吁"求真精神 / 工匠精神"来解决,本质是要工程师**反经济理性**地行动 —— 这条诉求历史上从没成功过(Bob 大叔自己 2018 那篇《The Tragedy of Craftsmanship》就在抱怨这件事)。

→ 对应 [C0](#这条隐性元约束在哪儿) 在认知传播层的具体表现 —— **从"人不自律"延伸到"人按经济激励行动"**;前者是个体短板,后者是结构性短板,**结构性的更难破**。

### §6.6 总结表:Bob 大叔的方法论 vs 现实人性

| Bob 大叔写 Clean Arch 时假设 | 现实 | 后果 |
|---------|------|------|
| 工程师会**读原文** 3 句话再翻译成代码 | 工程师只看图,凭直觉 → §6.3 想当然 | 同心圆 → 4 个文件夹的偷换 |
| 工程师会**为 5 年后考虑** | 工程师只在乎当季 KPI → §6.2 短视 | `extends JpaRepository` 蔓延 |
| 工程师会**把『省事』和『做对』分开权衡** | 工程师赶进度时省事 = 做对 → §6.1 趋利避害 | 假 DIP 成默认 |
| 工程师**懂了之后会按懂的做** | 工程师懂了就以为做了 → §6.4 没真正理解 | β 形似神离 |
| 工程师**为了把事做好而学习** | 工程师**为了变现而学习**(皮毛高变现,深究低变现) → §6.5 不求甚解 + 变现导向 | 培训行业 + 公众号产业 + 面试题文化共同制造皮毛的工业化量产 |

**这本书是给一个『不存在的理性程序员』设计的**。问题不在书,**问题在人性短板让方法论难以落地** —— 这条历史性反思才是 9 年来工业界 α/β 居高不下的根因。

**而且 §6.5 这条更深** —— 即使工程师本人想自律(突破 §6.1-§6.4),工业界激励结构也会**惩罚他自律**(深究低变现)。所以问题不只是"个体不自律",是**整个行业的经济结构让自律无利可图**。

### §6.7 桥梁段 —— 从『人性短板』到『AI 弥补』

**到这里 Origin 阶段所有的遗憾(§5.2 / §5.3 / §5.4 / §6 整章)都指向同一个本质** —— Bob 大叔方法论假设了人会自律,**但人不自律**。

**这条历史性矛盾在 2024 年开始有了新答案** ——

LLM / Claude Code / Cursor 在过去 1 年发生了一件**软件工程史上从没发生过的事**:**它们让"做对"的边际成本第一次低于"省事"的边际成本**。AI 替工程师承担了"思考规划费时"+"重构胆量"这两个最关键的人性卡点 —— 这是软件工程经济学层面的**历史拐点**:

- §6.1 **趋利避害**:AI 让"自定义 interface + 实现类拆分"的额外 10 行从"半小时手写"变成"30 秒补全";**省事的诱因消失**
- §6.2 **短视**:AI 在重构时能**精确预测**"如果 5 年后切换 ORM,这段代码会改多少处" —— 5 年后的代价**从『生理性看不见』变成『当下可见』**
- §6.3 **想当然**:AI 不让你绕过 3 句话原文 —— 它会**主动追问**"你这个接口在哪一层?为什么 import 了 Spring?",直觉翻译被卡住
- §6.4 **没真正理解就自以为是**:AI 让"懂了 → 能做"的鸿沟变窄;System 2 慢思考的成本从"30 分钟" 降到 "30 秒",**人不再需要被迫滑向 System 1**
- §6.5 **不求甚解 + 变现导向**:AI 让**深究的边际成本接近零** —— 你不需要花 5 年读 Bob 大叔全部博客,AI 在你写每一行代码时**即时引用 Bob 大叔原话**;变现成本不变,但深究成本暴跌 → **激励错位被抹平**(深究第一次和皮毛一样便宜)

**Synthesis 阶段会以这个为主轴展开**(占 Synthesis 阶段 60%+ 篇幅),完整论证 **3 条约束 + AI 全部抹平** 的历史拐点:

1. **人性短板**(本节立的 5 条 + AI 弥补对照,以 Deep 阶段一段屎山代码的实际重构作为引子)
2. **组织约束 X1: 领导财务思维 ≠ 工程思维** —— 大多数 leader 受财务训练而不受软件工程训练,看 KPI / 季度营收,不肯为"5 年后才显形的技术债"付当下的成本;AI 让"卓越架构"的边际成本逼近零 → **财务无理由砍**
3. **经济约束 X2: 培养合格架构师成本太高 + 时间太长** —— 一个真正能做 Clean Arch 的架构师要 8-10 年实战 + 撞过坑;一个项目周期 1-2 年;**预算结构永远 cover 不了"等 8 年"**;AI 让"架构师能力"在编码现场**民主化** —— 工程师只需识别 + 接受好建议,门槛大降

**结论**:Bob 大叔的方法论在 1995-2024 这 30 年都不可能大规模实施,**不是因为方法论不好,是经济激励 + 人才稀缺性的双重夹击**。**2024 年起 AI 第一次同时抹平了 5 条人性短板 + 2 条组织/经济约束** —— 软件工程可能正在迎来 1968 年 Dijkstra《Goto Considered Harmful》以来最大的一次利好,**卓越的软件工程从"理想"变成"现实选择"**。

---

> **【Synthesis 阶段还会引出一个最优雅的结论 ——『社会性反转』】**
>
> 这本书 9 年来在**人的社会里**几乎不可能大规模落地 —— 因为它假设了不存在的"理性程序员",而行业激励还**惩罚**自律(§6.5)。这本书是给一群"应当如此但实际不会如此"的工程师写的。
>
> 但**在 AI 的社会里,情况彻底相反**:AI **天然没有**变现压力(它不写公众号 / 不需要简历加分)/ 没有 KPI 焦虑(它不被 leader 砍预算)/ 没有进度恐惧(它不被 deadline 逼到滑向 System 1)/ 没有团队从众心理(它不怕"PR 拖时间被骂")/ 没有不求甚解的经济诱因(它读 Bob 大叔原文跟读维基百科一样快)。
>
> **§6 立的 5 条人性短板 + §6.7 立的 2 条组织/经济约束,对 AI 全部为零**。
>
> **所以 Bob 大叔的方法论对人来说是悖论;对 AI 来说是默认行为。**
>
> 在 AI 主导代码生成的时代,**这本书的"依赖向内而生 / 单一职责 / 接口隔离"会从『难以落地的理想』升格为『软件工程的第一性原理』,被 AI 默认遵守** —— 而这在人的社会里是历史性不可能的。
>
> 这恰好**证明 Bob 大叔的思想本身从来都是正确的,问题始终在"载体是人还是 AI"** —— **同一套方法论,在两个社会里命运彻底相反**。这是 Synthesis 阶段的最终命题。

## §7 约束回扣:Origin 阶段的 5 条 Cn 都怎么对应到这本书?

**Origin 不是技术细节;Origin 是"为什么这本书 2017 年才会成型"的历史解释**。每条 Cn 在历史中如何具体浮现:

| 约束 | 历史中怎么具体浮现 | 对应 Origin §X |
|-----|------------------|--------------|
| [C1](#c1--ocp-失败陷阱) (OCP 失败陷阱) | Meyer 1986 命名 OCP;Bob 大叔 2001 年补成 SOLID 5 之一;2018+ 工业界用了 framework 但没用对(假 DIP)→ 加新需求照样改老代码 | §3.5(OCP 接力棒)+ §5.3(遗憾 B) |
| [C2](#c2--技术栈供应商不可控) (技术栈不可控) | 1995 Booch method 被 UML 替代(撞墙);2012 同心圆图作为对策(框架被推到外圈);2018+ 工业界把 Spring 拉进 Use Case 层(误用) | §2(撞墙)+ §4(顿悟)+ §5.2(遗憾 A) |
| [C3](#c3--复杂度涌现) (复杂度涌现) | Jacobson 1992 BCE 把 Use Case 拆出来 = "对抗复杂度的具体手法";Bob 大叔 2012 把它纳入 Use Case 层 | §3.3(BCE 接力棒) |
| [C4](#c4--测试反馈速度) (测试反馈速度) | Bob 大叔 1990s 末与 Kent Beck 合作推 TDD,2017 这本书把"独立可测"作为 Clean Arch 的核心目标之一 | (本阶段未深展开,见 How 阶段 §3 demo) |
| [C5](#c5--改动代价--波及面-元约束) (改动代价 ∝ 波及面) | Palermo 2008 Onion 已经有"耦合向中心"雏形;Bob 大叔 2012 把它升华成"依赖规则"(统领的元规则) | §3.2(Onion 接力棒)+ §4.2(依赖规则) |
| **C0(隐性约束)** **人性短板** —— 方法论假设了"理性程序员",但人不自律 | 4 条短板(§6.1-§6.4)让 9 年来工业界 α/β 居高不下 —— **这是真正的元约束**;Bob 大叔的全部 5 条 Cn 在历史中失效,根因都在这条隐性约束 | §6 整章 + §6.6 桥梁段(连到 Synthesis 阶段 AI 弥补) |

**关键发现 1**:**每条 Cn 都对应着至少一位前辈的接力棒**。Bob 大叔 2012 年的合成动作,本质是把"5 条约束在不同前辈那儿的部分答案"统一成一张图 + 一条规则。这就是为什么这本书既"没有原创思想"又"成为经典" —— 它**第一次让所有 Cn 在一个工程框架里被同时回答**。

**关键发现 2(2026-05-07 patch-2 加入)**:**C0 是 Why 阶段没立的隐性元约束** —— "人不自律"。这条比 C5(改动代价 ∝ 波及面)更底层,因为 C5 假设了"工程师会理性权衡代价",而这个假设本身就被人性证伪。Bob 大叔在 Clean Arch 这本书里**不可能解决 C0**(他的工具是"原则 + 图 + 命名");**C0 在 2024 年开始有新答案 —— AI 工具,详见 Synthesis 阶段**。

## §8 呼应灵魂问题

灵魂问题:"**完整理解《架构整洁之道》的设计哲学与可落地方法**"

**Origin 阶段把灵魂问题闭环到 ~85%(40% 历史脉络)**:
- ✓ **设计哲学的来历**:思想从 Parnas 1972 → Meyer 1986 → Jacobson 1992 → Cockburn 2005 → Palermo 2008 → DCI 2009 → Bob 大叔 2012 合一,这条接力棒清晰了
- ✓ **2012 那一刻的关键贡献**:不是发明,是**合成 + 命名 + 推广**(依赖规则) —— Bob 大叔的"原创"在合成的方式,不在思想本身
- ✓ **2018+ 工业界的两个核心误读**:被当 4 层文件夹模板 + 假 DIP —— **你公司屎山的根本病灶就在这两条**
- ✓ **可落地方法的根**:依赖规则(2012 提出)是"可落地"的最关键抓手 —— **判断 Clean Arch 是否真落地,看 Use Case 类 import 是否不依赖框架**
- ✓ **9 年没好转的根因(§6 深挖)**:不是技术问题,是**人性短板 5 条**(趋利避害 / 短视 / 想当然 / 没真正理解就自以为是 / 不求甚解 + 变现导向);**Bob 大叔的方法论是给"理性程序员"设计的,但理性程序员不存在 —— 而且行业激励结构惩罚自律**

**剩下主体留给 Deep + Synthesis 阶段**:

**Deep 阶段(实操化)**:用一段真实屎山代码 → 按 Bob 大叔的端口适配器模式重构的完整过程;每一步都暴露具体的"难度落点"(认知 / 时间 / 团队 / 进度压力)。这段重构本身将作为 Synthesis 第一部分的引子。

**Synthesis 阶段主轴(占 60%+ 篇幅 ——『3 条约束 + AI 全部抹平』完整论证)**:

| 阶段 | 内容 | 篇幅 |
|------|------|------|
| **§A 引子** | Deep 阶段那段重构的难度复盘 —— 为什么"做着做着就要向现实低头" | ~15% |
| **§B 5 条人性短板** | §6.1-§6.5 的延展 + 每条 AI 弥补的具体场景(LLM / Claude Code / Cursor 实测) | ~25% |
| **§C 2 条组织/经济约束** | **X1: 领导财务思维 ≠ 工程思维** —— 受财务训练的 leader 不肯为未来投资,KPI 视角下"加 30% 时间做 Clean Arch"是亏 / **X2: 培养架构师成本 + 时间** —— 8-10 年实战 vs 1-2 年项目周期,预算结构 cover 不了"等 8 年" | ~25% |
| **§D AI 抹平 X1+X2** | AI 让"卓越架构"边际成本逼近零 → 财务无理由砍 / AI 让"架构师能力"在编码现场民主化 → 8 年实战的门槛大降 | ~20% |
| **§E 历史性结论** | Bob 大叔方法论 + AI 工具的理想结合 = **卓越软件工程从『理想』变成『现实选择』**;1968 年《Goto Considered Harmful》以来软件工程最大的一次利好 | ~15% |

**辅助内容**(Comparison 视情况补):DDD / Hexagonal-only / Layered Arch 跟 Clean Arch 的对照(可选)。

---

**关键转折(Origin 阶段定下的三条主线)**:

1. **价值不在原创度,在合成度** —— Bob 大叔把分散在 Parnas / Meyer / Jacobson / Cockburn / Palermo / Coplien-Reenskaug 几代人手里的部分答案,**用『依赖规则』+『同心圆图』压缩成一个工业界能消化的产物**;这是工程书写经典的核心路径
2. **方法论 + 人性 = 历史性矛盾** —— 这本书 9 年遗憾不是它讲错了,是它假设了不存在的"理性程序员"+ **行业激励结构惩罚自律**(深究低变现);Bob 大叔的工具是"原则 + 图 + 命名",**根本无法解决经济激励层面的问题**
3. **AI 工具 = 历史性答案** —— 2024 年 AI 第一次同时抹平 5 条人性短板 + 2 条组织/经济约束;**软件工程从"卓越是少数人的奢侈品"走向"卓越是默认选项"** —— Synthesis 阶段把这件事讲透
4. **【最终命题】Bob 大叔方法论的『社会性反转』** —— 在人的社会里它是"**难以落地的理想**"(对抗人性 + 行业激励 + 组织经济三重力量);在 AI 的社会里它会成为"**软件工程的第一性原理**"(因为 AI 天然契合理性 + 无变现压力 + 无进度焦虑 + 无团队从众心理 + 无不求甚解的经济诱因)。**同一套方法论,在两个社会里命运彻底相反** —— 这恰好证明 **Bob 大叔的思想本身从来都是正确的,问题始终在"载体是人还是 AI"**。这是 Synthesis §E 的最终命题

## §0 从 Origin 走到 Deep:三件事记住

Origin §6 立了 **5 条人性短板**(战略级抽象);Deep 阶段把这 5 条**精炼成 3 个具体重构落点**(战术级可落地动作)—— 这 3 件事是从 α 走到 γ 必做的物理动作,**做对一件 = 推进一步,3 件全做对 = 真 Clean Arch**。

**三件事不是 4、5、7 件 —— 是 3 件**(战术级聚焦)。

### §0.1 接口位置反转(对应假 DIP → 真 DIP)

**因为 [C2](#c2--技术栈供应商不可控) + [C5](#c5--改动代价--波及面-元约束)**(技术栈不可控 + 改动 ∝ 波及面)
   ↓
**要解决**:Spring Data JPA 让业务接口 `extends JpaRepository<Order, Long>`,接口由框架定义 → DIP 失真成"假反转";信创时 Spring 换框架 → 接口签名也换 → 业务核心代码全要改
   ↓
**所以引入「接口位置反转」**:`OrderRepository / PaymentGateway / SmsNotifier / InventoryClient` 这 4 个接口**全部由业务定义,放在 Use Case 层**,只 import JDK;Adapter 层 `implements` 它们(Spring 实现 / 微信 SDK 实现 / 阿里云 SDK 实现)。**接口归属层从 Adapter 反转到 Use Case。**

### §0.2 框架边界外推(对应假分层 → 真分层)

**因为 [C2](#c2--技术栈供应商不可控) + [C4](#c4--测试反馈速度)**(技术栈不可控 + 测试反馈速度)
   ↓
**要解决**:`OrderUseCase` 类直接 `import org.springframework.beans.factory.annotation.Autowired`,业务核心**编译时就知道 Spring 存在**;信创时 Spring → 东方通,所有 Use Case 类都要改 import;单测必启 Spring 容器(慢,Cn 4)
   ↓
**所以引入「框架边界外推」**:**Spring 注解(@Service / @Autowired / @Transactional)只允许出现在 Framework 层和 Adapter 层**,Use Case 和 Entity 类**禁止 import 任何 `org.springframework.*`**;Spring 在 Framework 层用 `@Configuration` + `@Bean` 显式装配 Use Case 实例。**Spring 边界从"全家桶"外推到"框架层显式装配点"。**

### §0.3 状态机上提(对应业务规则归属错位 → 归属正确)

**因为 [C3](#c3--复杂度涌现) + [C5](#c5--改动代价--波及面-元约束)**(复杂度涌现 + 改动 ∝ 波及面)
   ↓
**要解决**:订单状态扭转规则散在 `OrderUseCase` 各方法的 `if-else` 里 —— "已关闭单不能再支付" 这种**跨用例稳定的业务规则**(企业业务规则,Entity 该管的)被错放在 Use Case 层(应用业务规则的位置)。新加状态要改 N 处 `if-else`,改一处可能漏一处
   ↓
**所以引入「状态机上提」**:**订单状态扭转规则从 OrderUseCase 上提到 `Order` 实体类**;`order.payTo(paymentGateway, ...)` / `order.ship(...)` / `order.cancel(...)` —— 状态变更**只能在 Entity 内**,Use Case 只编排顺序 + 调外部依赖。**业务规则归属从 Use Case 反向上提到 Entity。**

### §0.4 三件事横向对照表

| # | 战术动作 | 物理变化 | 对应 Origin §6 | 难度等级 |
|---|--------|---------|--------------|---------|
| 1 | **接口位置反转** | 4 个 interface 从 Spring → 业务模块 | §6.5 不求甚解(没读"DI 反转"原文) + §6.3 想当然(以为 `extends JpaRepository` 是 DIP) | ⭐⭐⭐⭐ |
| 2 | **框架边界外推** | Spring 注解只在外两层,内两层零 Spring | §6.4 没真正理解就自以为是 + §6.1 趋利避害(`@Autowired` 比手写 constructor 省事) | ⭐⭐⭐⭐⭐ |
| 3 | **状态机上提** | 状态扭转规则从 UseCase 移到 Entity | §6.3 想当然(以为 Entity 就是 POJO + getter/setter) | ⭐⭐⭐ |

**关键**:每件事**单独做**都不难,**3 件一起做并坚持下来**才难 —— 因为每件都需要克服一条人性短板。

## §1 一张极简概览图

把三步重构(α → β → γ)压成一张三联图,**核心要看出 4 件事**:

![三步重构概览:α 屎山 / β 形似神离 / γ 真做对](stages/05-deep/pics/05-overview.svg)

1. **α 屎山(左)**:`OrderService.java` 单类 ~120 行,4 个 `@Autowired` 全家桶 + `extends JpaRepository` + `if-else` 状态扭转;**0 边界 / 0 接口反转 / 全部 Spring 污染** —— 工业界 50-60% 的活样本
2. **β 形似神离(中)**:**分了 4 个文件夹**(`framework/adapter/usecase/entity/`),看上去合规;但 `OrderUseCase` 类**还 import org.springframework**,`OrderRepository extends JpaRepository<Order, Long>` —— **依赖箭头还反着**,信创代价跟 α 几乎一样;**80% 自称『做了 Clean Arch』的项目就停在这层**
3. **γ 真做对(右)**:4 个 interface 全在 Use Case 层(只 import JDK);`OrderUseCase` 类零 Spring;Spring 在 `.framework/UseCaseConfig.java` 用 `@Bean` 显式装配;`Order.payTo()` / `cancel()` 状态机自封 —— **依赖向内而生**,信创时 Use Case 0 修改
4. **三步中只有 step 2(β → γ)是真重构** —— step 1(α → β)只是**分了文件夹**,视觉合规但本质还是屎山;**这就是为什么很多人重构『一半』就放弃** —— 走了 step 1 觉得已经做完了,看不出 step 2 的必要性

## §2 α 屎山初稿 —— 周五下午 6 点的 OrderService.java

### §2.1 完整代码片段

这是工业界最常见的 α 状态 —— **单一 Service 类承担所有事**:

```java
// com/example/order/OrderService.java
@Service
@Transactional
public class OrderService {

    @Autowired private OrderRepository repo;        // extends JpaRepository<Order, Long>
    @Autowired private WeChatPaymentClient payment; // 微信 SDK 客户端
    @Autowired private AliyunSmsClient sms;          // 阿里云短信 SDK
    @Autowired private InventoryFeignClient inv;    // 内部 RPC

    public void changeStatus(Long orderId, String newStatus) {
        Order order = repo.findById(orderId).orElseThrow();

        if (newStatus.equals("paid")) {
            if (!order.getStatus().equals("created"))
                throw new IllegalStateException("非 created 不能支付");
            payment.pay(order.getAmount(), order.getUserId());
            inv.decrease(order.getProductId(), order.getQty());
            sms.send(order.getUserPhone(), "您的订单已支付成功");
            order.setStatus("paid");
            order.setPaidAt(LocalDateTime.now());
            repo.save(order);
        }
        else if (newStatus.equals("shipped")) {
            if (!order.getStatus().equals("paid"))
                throw new IllegalStateException("非 paid 不能发货");
            // ... 调物流接口、写运单号、发短信
            order.setStatus("shipped");
            repo.save(order);
        }
        else if (newStatus.equals("delivered")) {
            // ... 类似
        }
        else if (newStatus.equals("cancelled")) {
            // 复杂:可能要退款 + 还库存 + 通知用户
            if (order.getStatus().equals("paid")) {
                payment.refund(order.getPaidAmount(), order.getOrderId());
            }
            inv.increase(order.getProductId(), order.getQty());
            sms.send(order.getUserPhone(), "订单已取消");
            order.setStatus("cancelled");
            repo.save(order);
        }
    }
}
```

}
```

### §2.2 工程师内心独白

> *"周五下午 6 点,产品经理刚拍下来一个新需求 —— 订单要加状态扭转功能,带支付 / 发货 / 取消 / 退款。下周一上线。我打开 IDE,新建 `OrderService.java`,@Service 注解,@Autowired 一通,if-else 写起来 —— **这是最快的写法,1 小时能下班**。"*
>
> *"我也听过 Clean Architecture / SOLID 这些词,但那是『理论』,我现在是『实战』。把代码写出来跑通,周一不被骂,这才是当下唯一重要的事。"*
>
> *"@Autowired 多方便啊 —— 一行 `@Autowired private XxxClient`,Spring 帮我注入,我都不用写 constructor。状态扭转 if-else 一通,所有外部调用都串在一个方法里,事务用 `@Transactional` 裹整个方法,反正 Spring 兜底。"*

### §2.3 这段代码暴露了什么?

**5 个具体问题(每个对应一条人性短板)**:

| # | 问题 | 表现 | 对应人性短板 |
|---|------|-----|-----------|
| 1 | **0 接口反转(假 DIP)** | `OrderRepository extends JpaRepository<Order, Long>` | §6.5 不求甚解 + §6.3 想当然 |
| 2 | **0 框架边界(全家桶)** | 4 个 `@Autowired` + `@Service` + `@Transactional` 全在业务核心 | §6.1 趋利避害 + §6.4 没真正理解 |
| 3 | **0 状态机封装(贫血实体)** | `Order` 是纯 POJO + `@Data`,所有状态规则散在 Service 的 if-else | §6.3 想当然(以为 Entity 就是 POJO) |
| 4 | **超级方法**(`changeStatus` ~80 行,5 状态分支) | C3 复杂度涌现的具体表现 | §6.4 没真正理解 |
| 5 | **业务规则不可单测** | 测 Order 状态扭转必启 Spring 容器(因 OrderService 依赖 Spring) | §6.4(因测试慢自动放弃 TDD) |

### §3.4 反事实小试 —— 为什么不能停在 β?

**β 看上去合规,但代价跟 α 几乎一样。两个 trap 让 β 必须走到 γ**:

#### Trap 1:信创迁移代价

| 场景 | α 代价 | β 代价 | γ 代价 |
|-----|------|------|------|
| Spring Boot → 东方通 | Use Case 全部 import 改 | **Use Case 全部 import 改**(因还在 import Spring) | 0 改 Use Case |
| MySQL → 达梦 | extends JpaRepository 重写 | **extends JpaRepository 重写**(因接口仍是 Spring 定义) | 改 Adapter 的 1 个 implements 类 |
| 微信支付 → 支付宝 | @Autowired WeChatPaymentClient 改 | **@Autowired WeChatPaymentClient 改**(因 Use Case 直接 import) | Use Case 看到的还是 PaymentGateway interface;Adapter 换实现 |

**β 跟 α 的真实差距 = 0 工程价值,只是分了 4 个文件夹的视觉魔法**。

#### Trap 2:测试速度

```java
// β 状态:测 Order 的状态扭转规则
@SpringBootTest                                                    // ⚠ 必启 Spring 容器
class OrderUseCaseTest {
    @Autowired OrderUseCase useCase;
    @MockBean OrderRepository repo;                                // ⚠ Mock Bean 复杂
    @MockBean WeChatPaymentClient payment;
    @MockBean AliyunSmsClient sms;
    @MockBean InventoryFeignClient inv;

    @Test
    void test_pay() {
        // 启动需 5-30 秒,运行测试 0.05 秒;
        // 测一遍要 30 秒,改一行代码再测 30 秒。
        // → 团队默认放弃 TDD(C4 测试反馈速度恶性循环)
    }
}
```

```java
// γ 状态(预告):测 Order.payTo() 状态规则
class OrderTest {                                                  // ✓ 纯 JUnit,0 Spring
    @Test
    void test_pay() {
        Order order = new Order(...);
        PaymentGateway pg = mock(PaymentGateway.class);             // ✓ 普通 Mockito
        InventoryClient ic = mock(InventoryClient.class);

        order.payTo(pg, ic);

        assertEquals(OrderStatus.PAID, order.getStatus());
        // 测试运行 < 1 ms,1 秒能跑 1000 个测试 → TDD 才有可能
    }

**β 失去 Bob 大叔方法论 90% 的工程价值**(信创代价 + 测试速度)。视觉合规 ≠ 工程合规。

#### 反事实候选:为什么不直接停在 α?

| 候选 | 立场 | 代价 |
|-----|------|------|
| **停 α**(完全不重构) | "我就是要快" | 信创代价 100%、测试 0、加新状态炸 N 处 |
| **停 β**(只分文件夹) | "我懂 Clean Arch 了" | 信创代价 95%、测试 0、加新状态仍炸 |
| **走 γ**(真做对) | "依赖向内而生" | 信创代价 5%、测试 1ms、加新状态在 Entity 改 1 处 |

**β 的本质 = 安慰剂** —— 让人觉得"我做了"但实际没做。**做着做着停在 β** 是工业界最常见的失败路径,因为 step 1(α → β)看起来已经"完成大部分工作了" —— 这是 §6.4「懂了 ≠ 能做」的最真实演绎:**懂了 4 文件夹布局**,但**不懂依赖方向**。

#### Use Case 类零 Spring(动作 2):框架边界外推

```java
// com/example/usecase/OrderUseCase.java —— 纯 Java,零 Spring 依赖
package com.example.usecase;

import com.example.entity.Order;
import java.util.Objects;

public class OrderUseCase {                                        // ✓ 没 @Service / @Autowired

    private final OrderRepository repo;
    private final PaymentGateway paymentGateway;
    private final SmsNotifier smsNotifier;
    private final InventoryClient inventoryClient;

    public OrderUseCase(OrderRepository repo, PaymentGateway pg,    // ✓ Constructor injection
                        SmsNotifier sn, InventoryClient ic) {
        this.repo = Objects.requireNonNull(repo);
        this.paymentGateway = Objects.requireNonNull(pg);
        this.smsNotifier = Objects.requireNonNull(sn);
        this.inventoryClient = Objects.requireNonNull(ic);
    }

    public void payOrder(Long orderId) {
        Order order = repo.findById(orderId).orElseThrow();
        order.payTo(paymentGateway, inventoryClient);              // ✓ 状态机在 Entity 内
        smsNotifier.notifyOrderPaid(order.getUserPhone(), order.getOrderNo());
        repo.save(order);
    }

    public void shipOrder(Long orderId, String trackingNo) {
        Order order = repo.findById(orderId).orElseThrow();
        order.ship(trackingNo);
        smsNotifier.notifyOrderShipped(order.getUserPhone(), order.getOrderNo(), trackingNo);
        repo.save(order);
    }

    public void cancelOrder(Long orderId) {
        Order order = repo.findById(orderId).orElseThrow();
        order.cancel(paymentGateway, inventoryClient);
        smsNotifier.notifyOrderCancelled(order.getUserPhone(), order.getOrderNo());
        repo.save(order);
    }
}
```

#### 状态机上提到 Entity(动作 3):状态机上提

```java
// com/example/entity/Order.java —— 状态机自封,0 框架依赖
package com.example.entity;

import com.example.usecase.PaymentGateway;
import com.example.usecase.InventoryClient;
import java.time.LocalDateTime;

public class Order {                                               // ✓ 没 @Entity / @Data

    private final Long id;
    private final String orderNo;
    private final String userId;
    private final String userPhone;
    private final String productId;
    private final int qty;
    private final Money amount;
    private OrderStatus status;
    private LocalDateTime paidAt;

    // ... 私有构造 + 工厂方法 createNew(...)

    public void payTo(PaymentGateway pg, InventoryClient ic) {     // ✓ 业务规则上提
        ensureStatus(OrderStatus.CREATED, "已支付/已取消订单不能再支付");
        pg.pay(this.amount, this.userId);
        ic.decrease(this.productId, this.qty);
        this.status = OrderStatus.PAID;
        this.paidAt = LocalDateTime.now();
    }

    public void ship(String trackingNo) {
        ensureStatus(OrderStatus.PAID, "未支付订单不能发货");
        // ... 校验 trackingNo
        this.status = OrderStatus.SHIPPED;
    }

    public void cancel(PaymentGateway pg, InventoryClient ic) {
        if (this.status == OrderStatus.PAID) {
            pg.refund(this.amount, this.orderNo);
        }
        ic.increase(this.productId, this.qty);
        this.status = OrderStatus.CANCELLED;
    }

    private void ensureStatus(OrderStatus expected, String msg) {
        if (this.status != expected)
            throw new IllegalStateException(msg + ":当前 " + this.status);
    }

    // getter 必要的字段(没有 setter,封装强制)
}
```

### §4.3 反事实小试 —— 除了 Bob 端口适配器,还有什么选项?

#### 候选 A:Hexagonal-only(Ports & Adapters,不画同心圆)

- **思路**:用 Cockburn 2005 的六边形(只两层:核心 + 适配器),不分 Use Case / Entity
- **代价**:业务规则没地方放(都堆在 Service);Origin §3.1 讲过 Bob 大叔的同心圆是 Hexagonal 的扩展(更细)
- **现实采用**:中型项目;但订单系统这种含明确 Use Case + Entity 区分的场景,Hexagonal-only 退化到 β 状态

#### 候选 B:DDD(Domain-Driven Design)

- **思路**:聚合根 + 仓储模式 + 领域事件;比 Bob 端口适配器更细化
- **代价**:学习成本高、过度设计风险大;**但概念上是 Bob 同心圆的同构超集**(DDD 聚合根 ≈ Entity 自封,DDD 仓储 ≈ OrderRepository)
- **现实采用**:复杂业务;订单系统中等复杂度,DDD 是 over-engineering

#### 候选 C:Layered Architecture(传统三层)

- **思路**:Controller → Service → Repository,Service 直接 import Repository(Spring Data 风格)
- **代价**:**这就是 α/β 状态的"正典化"** —— Spring Boot 教程 99% 教的是这个
- **现实采用**:工业界 80%+;但**信创代价 100%**

#### 候选 D:Anemic Domain Model(贫血模型)+ Service 厚重

- **思路**:Entity 是 POJO + 全 setter,业务规则全在 Service
- **代价**:违反 §0.3 状态机上提;新增状态炸 N 处
- **现实采用**:90%+ Spring Boot 项目(默认);Bob 大叔在 Clean Architecture §V 章节专门批判过这种做法

### §4.4 结论

| 候选 | 适用场景 | 跟 Bob 端口适配器的关系 |
|------|---------|---------------------|
| Bob 端口适配器(γ) | 中等复杂度 + 信创预期 + 长期项目 | 本节主选 |
| Hexagonal-only | 小型 + 短期 + 无 Use Case 复杂度 | Bob 的简化版 |
| DDD | 高复杂度 + 业务领域专家驻场 | Bob 的复杂超集 |
| Layered Arch (β) | 短期 + 不考虑信创 + 不考虑测试速度 | Bob 反对的反模式 |
| Anemic + Thick Service (α) | 速成 demo / POC | Bob 反对的反模式 |

**对你公司订单系统场景**:**Bob 端口适配器(γ)是局部最优** —— 复杂度匹配 + 信创预期 + 长期项目。
